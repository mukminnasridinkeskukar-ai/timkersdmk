<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAMUNGKAS — Pengelolaan Mutu dan Pengembangan Kompetensi SDM Kesehatan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   PAMUNGKAS — Design Tokens
   ========================================================================== */
:root{
  --color-primary:#0B4F6C;
  --color-primary-dark:#073B52;
  --color-primary-light:#E7F1F5;
  --color-accent:#17A673;
  --color-accent-dark:#128C60;
  --color-accent-light:#E4F7EF;
  --color-bg:#F4F7F9;
  --color-surface:#FFFFFF;
  --color-text:#1E2A32;
  --color-muted:#64757E;
  --color-border:#E2E8ED;
  --color-warning:#F4A93B;
  --color-warning-light:#FDF1DE;
  --color-danger:#E0533D;
  --font-display:'Plus Jakarta Sans',sans-serif;
  --font-body:'Inter',sans-serif;
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:22px;
  --shadow-sm:0 1px 2px rgba(15,41,58,.06);
  --shadow-md:0 8px 24px rgba(15,41,58,.08);
  --shadow-lg:0 24px 56px rgba(15,41,58,.18);
  --sidebar-w:264px;
  --sidebar-w-collapsed:80px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font-body);
  background:var(--color-bg);
  color:var(--color-text);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,h4{font-family:var(--font-display);color:var(--color-primary-dark);}
button{font-family:var(--font-body);cursor:pointer;}
a{color:inherit;}
::selection{background:var(--color-accent-light);color:var(--color-primary-dark);}

/* ==========================================================================
   LANDING PAGE (Splash Screen, tampil 5 detik)
   ========================================================================== */
#landing{
  position:fixed;inset:0;z-index:999;
  background:radial-gradient(circle at 20% 20%, #0E6485 0%, var(--color-primary) 45%, var(--color-primary-dark) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;
  transition:opacity .6s ease, visibility .6s ease;
}
#landing.hide{opacity:0;visibility:hidden;pointer-events:none;}
.landing-mark{
  width:88px;height:88px;border-radius:26px;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;
  border:1px solid rgba(255,255,255,.25);
}
.landing-mark svg{width:44px;height:44px;}
.landing-title{
  font-size:2.4rem;font-weight:800;letter-spacing:.04em;color:#fff;
}
.landing-subtitle{
  margin-top:10px;font-size:.95rem;color:rgba(255,255,255,.82);
  text-align:center;max-width:520px;line-height:1.6;padding:0 24px;
}
/* Signature element: garis "detak" (heartbeat pulse) sebagai indikator loading */
.pulse-wrap{width:260px;margin-top:34px;height:36px;}
.pulse-line{width:100%;height:100%;overflow:visible;}
.pulse-path{
  fill:none;stroke:var(--color-accent);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:340;stroke-dashoffset:340;
  animation:pulseDraw 1.6s ease-in-out infinite;
}
@keyframes pulseDraw{
  0%{stroke-dashoffset:340;opacity:.3;}
  50%{stroke-dashoffset:0;opacity:1;}
  100%{stroke-dashoffset:-340;opacity:.3;}
}
.landing-progress{
  width:260px;height:3px;border-radius:3px;background:rgba(255,255,255,.18);
  margin-top:22px;overflow:hidden;
}
.landing-progress-bar{
  height:100%;width:0%;background:var(--color-accent);border-radius:3px;
  animation:fillBar 5s linear forwards;
}
@keyframes fillBar{ to{ width:100%; } }
.landing-hint{margin-top:14px;font-size:.75rem;color:rgba(255,255,255,.55);letter-spacing:.03em;}

/* ==========================================================================
   APP SHELL
   ========================================================================== */
#app{display:flex;min-height:100vh;opacity:0;transition:opacity .5s ease;}
#app.ready{opacity:1;}

/* ---- Sidebar ---- */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--color-primary-dark);
  color:#fff;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
  transition:width .25s ease;
  z-index:40;
}
.sidebar.collapsed{width:var(--sidebar-w-collapsed);}
.sidebar-brand{
  display:flex;align-items:center;gap:12px;
  padding:22px 20px;border-bottom:1px solid rgba(255,255,255,.08);
}
.sidebar-brand-mark{
  width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sidebar-brand-mark svg{width:20px;height:20px;}
.sidebar-brand-text{overflow:hidden;white-space:nowrap;}
.sidebar-brand-text b{display:block;font-family:var(--font-display);font-size:1.05rem;letter-spacing:.03em;}
.sidebar-brand-text span{display:block;font-size:.68rem;color:rgba(255,255,255,.55);margin-top:2px;}
.sidebar.collapsed .sidebar-brand-text{display:none;}

.sidebar-nav{flex:1;padding:14px 12px;overflow-y:auto;}
.nav-group-label{
  font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.4);padding:14px 12px 6px;
}
.sidebar.collapsed .nav-group-label{display:none;}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:var(--radius-sm);
  color:rgba(255,255,255,.78);
  font-size:.88rem;font-weight:500;
  margin-bottom:2px;
  border:none;background:transparent;width:100%;text-align:left;
  transition:background .15s ease,color .15s ease;
  position:relative;
}
.nav-item svg{width:19px;height:19px;flex-shrink:0;}
.nav-item span{white-space:nowrap;overflow:hidden;}
.sidebar.collapsed .nav-item span{display:none;}
.sidebar.collapsed .nav-item{justify-content:center;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:var(--color-accent);color:#fff;}
.nav-item .badge-dev{
  margin-left:auto;font-size:.6rem;background:rgba(244,169,59,.2);color:var(--color-warning);
  padding:2px 6px;border-radius:20px;font-weight:600;
}
.sidebar.collapsed .badge-dev{display:none;}

.sidebar-admin-group{padding:12px;border-top:1px solid rgba(255,255,255,.08);}

.sidebar-footer{padding:14px 12px;border-top:1px solid rgba(255,255,255,.08);}
.sidebar-toggle{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:9px;border-radius:var(--radius-sm);
  background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.7);
  font-size:.78rem;
}
.sidebar-toggle:hover{background:rgba(255,255,255,.12);}
.sidebar-toggle svg{width:16px;height:16px;}

/* ---- Main column ---- */
.main-col{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  position:sticky;top:0;z-index:30;
  background:var(--color-surface);border-bottom:1px solid var(--color-border);
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.topbar-title h1{font-size:1.25rem;font-weight:700;}
.topbar-title p{font-size:.82rem;color:var(--color-muted);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 16px;border-radius:var(--radius-sm);
  font-size:.85rem;font-weight:600;border:1px solid transparent;
  transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
}
.btn svg{width:16px;height:16px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--color-primary);color:#fff;}
.btn-primary:hover{background:var(--color-primary-dark);}
.btn-accent{background:var(--color-accent);color:#fff;}
.btn-accent:hover{background:var(--color-accent-dark);}
.btn-outline{background:transparent;border-color:var(--color-border);color:var(--color-text);}
.btn-outline:hover{background:var(--color-bg);}
.btn-ghost{background:transparent;color:var(--color-muted);}
.btn-ghost:hover{background:var(--color-bg);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.admin-chip{
  display:flex;align-items:center;gap:8px;background:var(--color-accent-light);
  color:var(--color-accent-dark);padding:6px 12px;border-radius:20px;font-size:.8rem;font-weight:600;
}
.admin-chip svg{width:14px;height:14px;}

.content{padding:26px 28px 60px;max-width:1280px;width:100%;margin:0 auto;}

/* ==========================================================================
   DASHBOARD
   ========================================================================== */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px;}
@media (max-width:1080px){.summary-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.summary-grid{grid-template-columns:1fr;}}
.summary-card{
  background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-md);padding:20px;cursor:pointer;
  box-shadow:var(--shadow-sm);transition:transform .15s ease, box-shadow .15s ease;
  text-align:left;width:100%;
}
.summary-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.summary-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.summary-icon{
  width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
}
.summary-icon svg{width:20px;height:20px;}
.summary-card .value{font-family:var(--font-display);font-size:1.7rem;font-weight:800;color:var(--color-primary-dark);}
.summary-card .label{font-size:.82rem;color:var(--color-muted);margin-top:4px;}
.summary-card .hint{font-size:.72rem;color:var(--color-accent-dark);margin-top:10px;font-weight:600;display:flex;align-items:center;gap:4px;}
.summary-card .hint svg{width:12px;height:12px;}

.panel{
  background:var(--color-surface);border:1px solid var(--color-border);
  border-radius:var(--radius-md);box-shadow:var(--shadow-sm);overflow:hidden;
}
.panel-head{padding:18px 22px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between;}
.panel-head h2{font-size:1.02rem;font-weight:700;}
.panel-head p{font-size:.78rem;color:var(--color-muted);margin-top:2px;}

table{width:100%;border-collapse:collapse;font-size:.85rem;}
thead th{
  text-align:left;padding:12px 22px;background:var(--color-bg);
  color:var(--color-muted);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;
  border-bottom:1px solid var(--color-border);
}
tbody td{padding:13px 22px;border-bottom:1px solid var(--color-border);color:var(--color-text);}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--color-bg);}
.status-pill{
  display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;
}
.status-pill.aktif{background:var(--color-accent-light);color:var(--color-accent-dark);}
.status-pill.proses{background:var(--color-warning-light);color:#9A6414;}
.status-pill.tertunda{background:#F1F3F5;color:var(--color-muted);}
.link-btn{background:none;border:none;color:var(--color-primary);font-weight:600;font-size:.82rem;text-decoration:underline;padding:0;}
.link-btn:hover{color:var(--color-accent-dark);}

.empty-state{padding:48px 24px;text-align:center;color:var(--color-muted);}
.empty-state svg{width:40px;height:40px;margin-bottom:12px;opacity:.5;}
.empty-state p{font-size:.85rem;}

/* ==========================================================================
   PLACEHOLDER VIEWS ("Segera Hadir")
   ========================================================================== */
.page-header{margin-bottom:22px;}
.page-header h1{font-size:1.4rem;font-weight:800;}
.page-header p{color:var(--color-muted);font-size:.88rem;margin-top:6px;max-width:640px;line-height:1.6;}

.dev-ribbon{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--color-warning-light);color:#9A6414;
  padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:700;
  margin-bottom:18px;letter-spacing:.02em;
}
.dev-ribbon svg{width:13px;height:13px;}

.skeleton-card{
  background:var(--color-surface);border:1px dashed var(--color-border);
  border-radius:var(--radius-md);padding:26px;
}
.skeleton-toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.skeleton-input{
  flex:1;min-width:200px;padding:10px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-muted);
  font-size:.85rem;
}
.skeleton-input:disabled, .skeleton-select:disabled{cursor:not-allowed;opacity:.75;}
.skeleton-rows{display:flex;flex-direction:column;gap:10px;}
.skeleton-row{
  height:46px;border-radius:var(--radius-sm);
  background:repeating-linear-gradient(90deg, var(--color-bg) 0px, var(--color-bg) 40px, #ECEFF2 40px, #ECEFF2 80px);
  opacity:.7;
}
.skeleton-form{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media (max-width:640px){.skeleton-form{grid-template-columns:1fr;}}
.skeleton-field label{display:block;font-size:.78rem;font-weight:600;color:var(--color-muted);margin-bottom:6px;}
.skeleton-field input,.skeleton-field select,.skeleton-field textarea{
  width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
  background:var(--color-bg);color:var(--color-muted);font-size:.85rem;font-family:var(--font-body);
}
.skeleton-grid-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media (max-width:900px){.skeleton-grid-cards{grid-template-columns:repeat(2,1fr);}}
@media (max-width:600px){.skeleton-grid-cards{grid-template-columns:1fr;}}
.skeleton-mini-card{
  border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:16px;background:var(--color-bg);
}
.skeleton-mini-card .bar{height:10px;border-radius:6px;background:#DEE5E9;margin-bottom:8px;}
.skeleton-mini-card .bar.w60{width:60%;}
.skeleton-mini-card .bar.w80{width:80%;}
.skeleton-mini-card .bar.w40{width:40%;}

/* ==========================================================================
   ADMIN PANEL
   ========================================================================== */
.admin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media (max-width:900px){.admin-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:600px){.admin-grid{grid-template-columns:1fr;}}
.admin-card{
  background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);
  padding:20px;box-shadow:var(--shadow-sm);
}
.admin-card .summary-icon{margin-bottom:12px;}
.admin-card h3{font-size:.95rem;font-weight:700;margin-bottom:4px;}
.admin-card p{font-size:.78rem;color:var(--color-muted);line-height:1.5;margin-bottom:14px;}

/* ==========================================================================
   MODAL / POP UP
   ========================================================================== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(11,41,58,.5);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  z-index:200;opacity:0;visibility:hidden;transition:opacity .2s ease, visibility .2s ease;
}
.modal-overlay.open{opacity:1;visibility:visible;}
.modal{
  background:var(--color-surface);border-radius:var(--radius-lg);
  width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);
  transform:translateY(14px) scale(.98);transition:transform .2s ease;
}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:20px 22px;border-bottom:1px solid var(--color-border);position:sticky;top:0;background:var(--color-surface);
}
.modal-header h2{font-size:1.05rem;font-weight:700;}
.modal-header p{font-size:.78rem;color:var(--color-muted);margin-top:3px;}
.modal-close{background:var(--color-bg);border:none;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--color-muted);flex-shrink:0;}
.modal-close:hover{background:var(--color-border);}
.modal-close svg{width:15px;height:15px;}
.modal-body{padding:22px;}
.modal-footer{padding:16px 22px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:10px;}

.detail-row{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--color-border);font-size:.85rem;}
.detail-row:last-child{border-bottom:none;}
.detail-row .k{color:var(--color-muted);}
.detail-row .v{font-weight:600;text-align:right;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:.82rem;font-weight:600;margin-bottom:7px;color:var(--color-text);}
.field input{
  width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
  font-size:.9rem;font-family:var(--font-body);background:var(--color-bg);
}
.field input:focus{outline:2px solid var(--color-accent);outline-offset:1px;background:#fff;}
.field select,.field textarea{
  width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
  font-size:.9rem;font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);
}
.field select:focus,.field textarea:focus{outline:2px solid var(--color-accent);outline-offset:1px;background:#fff;}
.field textarea{resize:vertical;min-height:88px;}
.field-error{color:var(--color-danger);font-size:.76rem;margin-top:6px;display:none;}
.field-error.show{display:block;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media (max-width:700px){.form-grid{grid-template-columns:1fr;}}
.form-grid .field.full{grid-column:1/-1;}
.template-link{
  display:inline-flex;align-items:center;gap:7px;background:var(--color-primary-light);color:var(--color-primary);
  padding:8px 13px;border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;margin-bottom:10px;text-decoration:none;
}
.template-link:hover{background:#D6E7EE;}
.template-link svg{width:15px;height:15px;}
.file-drop{
  display:block;border:1.5px dashed var(--color-border);border-radius:var(--radius-sm);padding:18px;text-align:center;
  background:var(--color-bg);cursor:pointer;transition:border-color .15s ease,background .15s ease;
}
.file-drop.has-file{border-color:var(--color-accent);background:var(--color-accent-light);}
.file-drop input[type=file]{display:none;}
.file-drop-label{font-size:.83rem;color:var(--color-muted);line-height:1.5;}
.file-drop-filename{font-size:.85rem;color:var(--color-accent-dark);font-weight:600;margin-top:4px;}

.spinner{
  width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-inline{display:flex;align-items:center;gap:10px;color:var(--color-muted);font-size:.85rem;padding:28px;justify-content:center;}
.loading-inline .dot-spinner{width:16px;height:16px;border-radius:50%;border:2px solid var(--color-border);border-top-color:var(--color-accent);animation:spin .7s linear infinite;}

.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:10px;}
.toast{
  background:var(--color-primary-dark);color:#fff;padding:13px 18px;border-radius:var(--radius-sm);
  font-size:.85rem;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:10px;
  animation:toastIn .25s ease;max-width:320px;
}
.toast.success{background:var(--color-accent-dark);}
.toast.error{background:var(--color-danger);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* mobile sidebar */
@media (max-width:860px){
  .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%);transition:transform .25s ease;}
  .sidebar.mobile-open{transform:translateX(0);}
  .sidebar.collapsed{width:var(--sidebar-w);}
  .mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:35;display:none;}
  .mobile-overlay.show{display:block;}
}
.hamburger{display:none;}
@media (max-width:860px){
  .hamburger{display:flex;}
  .sidebar-toggle{display:none;}
}
</style>
</head>
<body>

<!-- ==========================================================================
     LANDING PAGE — tampil otomatis 5 detik lalu transisi ke halaman utama
     ========================================================================== -->
<div id="landing">
  <div class="landing-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-10-9.3C.3 8 2 4 6 4c2.2 0 3.6 1.3 6 4 2.4-2.7 3.8-4 6-4 4 0 5.7 4 4 7.7-2.5 4.7-10 9.3-10 9.3Z"/></svg>
  </div>
  <div class="landing-title">PAMUNGKAS</div>
  <div class="landing-subtitle">Pengelolaan Mutu dan Pengembangan Kompetensi Sumber Daya Manusia Kesehatan</div>
  <div class="pulse-wrap">
    <svg class="pulse-line" viewBox="0 0 260 36" preserveAspectRatio="none">
      <path class="pulse-path" d="M0 18 H70 L85 4 L100 32 L115 10 L130 18 H190 L200 6 L212 30 L222 18 H260"/>
    </svg>
  </div>
  <div class="landing-progress"><div class="landing-progress-bar"></div></div>

/* -------------------- 2. ABSTRAKSI KOMUNIKASI KE SERVER --------------------
   Di lingkungan Apps Script sesungguhnya, panggilan akan diteruskan ke

const Server = {
  /** Ambil ringkasan data untuk Dashboard */
  getDashboardSummary(){
    if(RUNNING_IN_GAS){
      return new Promise((resolve,reject)=>{
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getDashboardSummary();
      });
    }
    return new Promise(resolve=>setTimeout(()=>{
      resolve({
        totalSDMK: MOCK_DB.sdmk.length,
        totalPendaftaran: MOCK_DB.pendaftaran.length,
        totalSertifikat: MOCK_DB.sertifikat.length,
        totalPengumumanAktif: MOCK_DB.pengumuman.filter(p=>p.status==='Aktif').length,
        recentPendaftaran: MOCK_DB.pendaftaran.slice(0,5)
      });
    },350));
  },
  /** Ambil seluruh baris dari salah satu sheet (dashboard-related) */
  getSheetRecords(sheetName){
    if(RUNNING_IN_GAS){
      return new Promise((resolve,reject)=>{
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getSheetRecords(sheetName);
      });
    }
    return new Promise(resolve=>setTimeout(()=>resolve(MOCK_DB[sheetName]||[]),300));
  },
  /** Ambil satu baris detail berdasarkan id */
  getRecordDetail(sheetName,id){
    if(RUNNING_IN_GAS){
      return new Promise((resolve,reject)=>{
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getRecordDetail(sheetName,id);
      });
    }
    return new Promise(resolve=>setTimeout(()=>{
      const rows = MOCK_DB[sheetName]||[];
      resolve(rows.find(r=>String(r.id)===String(id))||null);
    },250));
  },
  /** Ambil daftar opsi dropdown untuk formulir Pendaftaran + link template surat pernyataan */
  getFormOptions(){
    if(RUNNING_IN_GAS){
      return new Promise((resolve,reject)=>{
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getFormOptions();
      });
    }
    return new Promise(resolve=>setTimeout(()=>resolve(MOCK_DB.opsiForm),250));
  },
  /** Kirim data formulir Pendaftaran (termasuk berkas surat pernyataan) */
  submitPendaftaran(formData){
    if(RUNNING_IN_GAS){
      return new Promise((resolve,reject)=>{
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).submitPendaftaran(formData);
      });
    }
    return new Promise(resolve=>setTimeout(()=>{
      const newId = MOCK_DB.pendaftaran.length ? Math.max(...MOCK_DB.pendaftaran.map(r=>r.id))+1 : 1;
      MOCK_DB.pendaftaran.push(Object.assign({},formData,{

        suratPernyataanUrl:'(pratinjau lokal — berkas tidak benar-benar diunggah)',

      const found = MOCK_DB.admin.find(a=>a.username===username && a.password===password);

/* -------------------- 3. NAVIGASI & STATE -------------------- */
const NAV_ITEMS = [
  {key:'dashboard',label:'Dashboard',icon:'dashboard',ready:true,subtitle:'Ringkasan data mutu dan kompetensi SDM Kesehatan'},
  {key:'pengumuman',label:'Pengumuman',icon:'pengumuman',ready:false,subtitle:'Informasi dan pengumuman terkini seputar SDMK'},

  {key:'pendaftaran',label:'Pendaftaran',icon:'pendaftaran',ready:true,subtitle:'Pendaftaran Sumber Daya Manusia Kesehatan (SDMK) ke dalam sistem PAMUNGKAS'},
  {key:'cek-sertifikat',label:'Cek Sertifikat',icon:'sertifikat',ready:false,subtitle:'Verifikasi keabsahan sertifikat pelatihan'},
  {key:'cek-materi',label:'Cek Materi',icon:'materi',ready:false,subtitle:'Akses materi pelatihan dan kompetensi'}
];

const state = {
  view:'dashboard',
  sidebarCollapsed:false,
  isAdmin:false
};

/* -------------------- 5. MODAL & TOAST -------------------- */
const modalOverlay = document.getElementById('modalOverlay');
function openModal({title,subtitle='',bodyHtml='',footerHtml=''}){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalSubtitle').textContent = subtitle;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml;
  modalOverlay.classList.add('open');
}
function closeModal(){ modalOverlay.classList.remove('open'); }
document.getElementById('modalCloseBtn').addEventListener('click',closeModal);
modalOverlay.addEventListener('click',e=>{ if(e.target===modalOverlay) closeModal(); });

function showToast(message,type='info'){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.innerHTML = (type==='success'?icon('check'):type==='error'?icon('alert'):icon('clock'));
  const span = document.createElement('span'); span.textContent = message;
  el.appendChild(span);
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); },3200);
}

/* -------------------- 4. RENDER: SIDEBAR & TOPBAR -------------------- */
function renderSidebar(){
  const nav = document.getElementById('sidebarNav');
  nav.querySelectorAll('.dyn-item').forEach(n=>n.remove());
  NAV_ITEMS.forEach(item=>{
    const btn = document.createElement('button');
    btn.className = 'nav-item dyn-item' + (state.view===item.key ? ' active' : '');
    btn.innerHTML = icon(item.icon) + '<span>'+item.label+'</span>' + (!item.ready ? '<span class="badge-dev">Segera</span>' : '');
    btn.addEventListener('click',()=>navigateTo(item.key));
    nav.appendChild(btn);
  });

  const adminGroup = document.getElementById('sidebarAdminGroup');
  adminGroup.innerHTML='';
  const adminBtn = document.createElement('button');
  adminBtn.className = 'nav-item' + (state.view==='admin' ? ' active' : '');
  adminBtn.innerHTML = icon('admin') + '<span>Panel Admin</span>';
  adminBtn.addEventListener('click',()=>{
    if(state.isAdmin){ navigateTo('admin'); } else { openAdminLoginModal(); }
  });
  adminGroup.appendChild(adminBtn);
}

function renderTopbarRight(){
  const el = document.getElementById('topbarRight');
  if(state.isAdmin){
    el.innerHTML = '';
    const chip = document.createElement('div');
    chip.className='admin-chip';
    chip.innerHTML = icon('admin') + '<span>Admin</span>';
    const logoutBtn = document.createElement('button');
    logoutBtn.className='btn btn-outline';
    logoutBtn.innerHTML = icon('logout') + '<span>Keluar</span>';
    logoutBtn.addEventListener('click',adminLogout);
    el.appendChild(chip); el.appendChild(logoutBtn);
  } else {
    el.innerHTML = '';
    const loginBtn = document.createElement('button');
    loginBtn.className='btn btn-primary';
    loginBtn.innerHTML = icon('lock') + '<span>Login Admin</span>';
    loginBtn.addEventListener('click',openAdminLoginModal);
    el.appendChild(loginBtn);
  }
}

function navigateTo(viewKey){
  state.view = viewKey;
  const navItem = NAV_ITEMS.find(n=>n.key===viewKey);
  document.getElementById('pageTitle').textContent = viewKey==='admin' ? 'Panel Admin' : (navItem ? navItem.label : viewKey);
  document.getElementById('pageSubtitle').textContent = viewKey==='admin' ? 'Manajemen data aplikasi PAMUNGKAS' : (navItem ? navItem.subtitle : '');
  renderSidebar();
  renderView();
  if(window.innerWidth<=860){ closeMobileSidebar(); }
  document.getElementById('content').scrollTo?.(0,0);
  window.scrollTo(0,0);
}

/* -------------------- 4. RENDER: VIEW ROUTER -------------------- */
function renderView(){
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading-inline"><div class="dot-spinner"></div><span>Memuat data…</span></div>';

  switch(state.view){
    case 'dashboard': return renderDashboard();
    case 'pengumuman': return renderPlaceholder({
      key:'pengumuman', title:'Pengumuman', icon:'pengumuman',
      desc:'Modul ini akan menampilkan seluruh pengumuman resmi terkait pengelolaan mutu dan kompetensi SDM Kesehatan. Admin akan dapat menambah, mengubah, dan mengarsipkan pengumuman langsung dari Panel Admin.',
      type:'list-with-toolbar', addLabel:'Tambah Pengumuman'
    });
    case 'profil-sdmk': return renderPlaceholder({
      key:'profil-sdmk', title:'Profil SDMK Terlatih', icon:'profil',
      desc:'Modul ini akan menampilkan direktori tenaga kesehatan yang telah menyelesaikan pelatihan, lengkap dengan profesi, unit kerja, dan riwayat kompetensi, beserta pencarian dan filter.',
      type:'cards-with-search'
    });
    case 'pendaftaran': return renderPendaftaranView();
    case 'cek-sertifikat': return renderPlaceholder({
      key:'cek-sertifikat', title:'Cek Sertifikat', icon:'sertifikat',
      desc:'Modul ini akan memungkinkan siapa saja memverifikasi keabsahan sertifikat pelatihan dengan memasukkan nomor sertifikat atau nama penerima.',
      type:'search-only'
    });
    case 'cek-materi': return renderPlaceholder({
      key:'cek-materi', title:'Cek Materi', icon:'materi',
      desc:'Modul ini akan menyediakan akses ke materi-materi pelatihan berdasarkan kategori kompetensi.',
      type:'list-with-toolbar', addLabel:'Tambah Materi'
    });
    case 'admin': return renderAdminPanel();
  }
}

/* -------------------- DASHBOARD -------------------- */
async function renderDashboard(){
  const content = document.getElementById('content');
  try{
    const summary = await Server.getDashboardSummary();

function statusPill(status){
  const s = (status||'').toLowerCase();
  const cls = s==='aktif' ? 'aktif' : (s==='proses' ? 'proses' : 'tertunda');
  return `<span class="status-pill ${cls}">${escapeHtml(status||'-')}</span>`;
}

async function openSummaryDetailModal(key,label){
  const sheetMap = {sdmk:'sdmk',pendaftaran:'pendaftaran',sertifikat:'sertifikat',pengumuman:'pengumuman'};
  openModal({title:label,subtitle:'Data langsung dari Google Sheet',bodyHtml:`<div class="loading-inline"><div class="dot-spinner"></div><span>Memuat data…</span></div>`,footerHtml:''});
  try{

          <thead><tr>${cols.map(c=>`<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>

  }catch(err){
    document.getElementById('modalBody').innerHTML = `<div class="empty-state">${icon('alert')}<p>Gagal memuat data.</p></div>`;

}

async function openRecordDetailModal(sheetName,id,title){
  openModal({title:title,subtitle:'ID: '+id,bodyHtml:`<div class="loading-inline"><div class="dot-spinner"></div><span>Memuat detail…</span></div>`,footerHtml:''});

  }catch(err){
    document.getElementById('modalBody').innerHTML = `<div class="empty-state">${icon('alert')}<p>Gagal memuat detail data.</p></div>`;

}

function bindPendaftaranFormEvents(){
  let fileData = null; // {base64, fileName, mimeType} — diisi setelah file dibaca

  const fileInput = document.getElementById('fSurat');
  const dropLabel = document.getElementById('fileDropLabel');
  const dropText = document.getElementById('fileDropText');
  const dropFilename = document.getElementById('fileDropFilename');

  fileInput.addEventListener('change', async ()=>{
    const file = fileInput.files[0];
    clearFieldError('fSurat');
    if(!file){ fileData = null; return; }
    if(file.size > 5*1024*1024){
      showFieldError('fSurat','Ukuran file maksimal 5MB.');
      fileInput.value=''; fileData=null;
      dropLabel.classList.remove('has-file'); dropFilename.style.display='none'; dropText.style.display='block';
      return;
    }
    try{
      const base64 = await readFileAsBase64(file);
      fileData = { base64: base64, fileName: file.name, mimeType: file.type || 'application/octet-stream' };
      dropLabel.classList.add('has-file');
      dropText.style.display='none';
      dropFilename.style.display='block';
      dropFilename.textContent = '✓ '+file.name;
    }catch(err){
      showFieldError('fSurat','Gagal membaca file, coba lagi.');
    }
  });

  document.getElementById('pendaftaranForm').addEventListener('submit', async (e)=>{
    e.preventDefault();

    const values = {
      namaLengkap: document.getElementById('fNamaLengkap').value.trim(),
      unitKerja: document.getElementById('fUnitKerja').value,
      jenisSDMK: document.getElementById('fJenisSDMK').value,
      jenisProfesi: document.getElementById('fJenisProfesi').value,
      nik: document.getElementById('fNIK').value.trim(),
      nip: document.getElementById('fNIP').value.trim(),
      statusPekerjaan: document.getElementById('fStatusPekerjaan').value,
      jenisKelamin: document.getElementById('fJenisKelamin').value,
      tempatLahir: document.getElementById('fTempatLahir').value.trim(),
      tanggalLahir: document.getElementById('fTanggalLahir').value,
      alamatRumah: document.getElementById('fAlamatRumah').value.trim(),
      emailPlataranSehat: document.getElementById('fEmail').value.trim(),
      lamaBekerja: document.getElementById('fLamaBekerja').value
    };

    let valid = true;
    ['fNamaLengkap','fUnitKerja','fJenisSDMK','fJenisProfesi','fStatusPekerjaan','fJenisKelamin','fTempatLahir','fTanggalLahir','fAlamatRumah','fLamaBekerja','fNIK','fNIP','fEmail'].forEach(clearFieldError);

    if(!values.namaLengkap){ showFieldError('fNamaLengkap'); valid=false; }
    if(!values.unitKerja){ showFieldError('fUnitKerja'); valid=false; }
    if(!values.jenisSDMK){ showFieldError('fJenisSDMK'); valid=false; }
    if(!values.jenisProfesi){ showFieldError('fJenisProfesi'); valid=false; }
    if(!values.statusPekerjaan){ showFieldError('fStatusPekerjaan'); valid=false; }
    if(!values.jenisKelamin){ showFieldError('fJenisKelamin'); valid=false; }
    if(!values.tempatLahir){ showFieldError('fTempatLahir'); valid=false; }
    if(!values.tanggalLahir){ showFieldError('fTanggalLahir'); valid=false; }
    if(!values.alamatRumah){ showFieldError('fAlamatRumah'); valid=false; }
    if(values.lamaBekerja===''||isNaN(values.lamaBekerja)||Number(values.lamaBekerja)<0){ showFieldError('fLamaBekerja'); valid=false; }
    if(!/^\d{16}$/.test(values.nik)){ showFieldError('fNIK'); valid=false; }
    if(values.nip && !/^\d+$/.test(values.nip)){ showFieldError('fNIP'); valid=false; }
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(values.emailPlataranSehat)){ showFieldError('fEmail'); valid=false; }
    if(!fileData){ showFieldError('fSurat'); valid=false; }

    if(!valid){ showToast('Periksa kembali isian formulir Anda.','error'); return; }

    const btn = document.getElementById('submitPendaftaranBtn');
    const hint = document.getElementById('submitHint');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div><span>Mengirim…</span>';
    hint.textContent = 'Mengunggah data dan berkas, mohon tunggu…';

    try{
      const payload = Object.assign({}, values, { suratPernyataan: fileData });
      const res = await Server.submitPendaftaran(payload);
      if(res && res.success){
        showToast('Pendaftaran berhasil dikirim.','success');
        openModal({
          title:'Pendaftaran Berhasil',
          subtitle:'Terima kasih, data Anda telah tersimpan.',
          bodyHtml:`<div class="detail-row"><span class="k">Nomor Pendaftaran</span><span class="v">#${escapeHtml(String(res.id))}</span></div><p style="margin-top:14px;font-size:.85rem;color:var(--color-muted);line-height:1.6;">Simpan nomor pendaftaran ini sebagai referensi. Admin akan memverifikasi data Anda selanjutnya.</p>`,
          footerHtml:`<button class="btn btn-primary" id="modalOkBtn">Tutup</button>`
        });
        document.getElementById('modalOkBtn').addEventListener('click',closeModal);
        renderPendaftaranView();
      } else {
        showToast((res && res.message) || 'Gagal mengirim pendaftaran.','error');
      }
    }catch(err){
      showToast('Terjadi kesalahan saat mengirim data. Coba lagi.','error');
    }finally{
      btn.disabled = false;
      btn.innerHTML = icon('check') + '<span>Kirim Pendaftaran</span>';
      hint.textContent = '';
    }
  });
}

function showFieldError(fieldId, customMessage){
  const err = document.querySelector('.field-error[data-for="'+fieldId+'"]');
  if(err){
    if(customMessage) err.textContent = customMessage;
    err.classList.add('show');
  }
  const el = document.getElementById(fieldId);
  if(el) el.style.borderColor = 'var(--color-danger)';
}
function clearFieldError(fieldId){
  const err = document.querySelector('.field-error[data-for="'+fieldId+'"]');
  if(err) err.classList.remove('show');
  const el = document.getElementById(fieldId);
  if(el) el.style.borderColor = '';
}
function readFileAsBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const result = reader.result; // format: data:mime;base64,XXXX
      resolve(result.split(',')[1]);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function submitAdminLogin(){
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginSubmitBtn');
  const errorEl = document.getElementById('loginError');
  errorEl.classList.remove('show');
  if(!username || !password){
    errorEl.textContent = 'Username dan password wajib diisi.';
    errorEl.classList.add('show');
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Memeriksa…</span>';
  try{
    const res = await Server.adminLogin(username,password);
    if(res && res.success){
      state.isAdmin = true;
      closeModal();
      renderSidebar();
      renderTopbarRight();
      navigateTo('admin');
      showToast('Berhasil masuk sebagai Admin.','success');
    } else {
      errorEl.textContent = (res && res.message) || 'Username atau password salah.';
      errorEl.classList.add('show');
    }
  }catch(err){
    errorEl.textContent = 'Terjadi kesalahan saat menghubungi server.';
    errorEl.classList.add('show');
  }finally{
    btn.disabled = false;
    btn.innerHTML = icon('lock') + '<span>Masuk</span>';
  }
}

  state.isAdmin = false;

    {label:'Kelola Pendaftaran',icon:'pendaftaran',desc:'Tinjau dan verifikasi pendaftaran peserta.'},
    {label:'Kelola Sertifikat',icon:'sertifikat',desc:'Terbitkan dan kelola sertifikat pelatihan.'},
    {label:'Kelola Materi',icon:'materi',desc:'Unggah dan atur materi pelatihan.'},
    {label:'Pengaturan Akun Admin',icon:'admin',desc:'Kelola akun admin aplikasi.'}
  ];
  content.innerHTML = `
    <div class="page-header">
      <div class="dev-ribbon">${icon('wrench')}<span>Dalam Pengembangan</span></div>
      <h1>Panel Admin</h1>
      <p>Pusat manajemen data aplikasi PAMUNGKAS. Seluruh modul di bawah ini akan dikembangkan lebih lanjut pada tahap berikutnya.</p>
    </div>
    <div class="admin-grid">
      ${menus.map(m=>`
        <div class="admin-card">
          <div class="summary-icon" style="background:var(--color-primary-light);color:var(--color-primary);">${icon(m.icon)}</div>
          <h3>${m.label}</h3>
          <p>${m.desc}</p>
          <button class="btn btn-outline" disabled style="width:100%;justify-content:center;">Segera Hadir</button>

      `).join('')}
    </div>
  `;
}

/* -------------------- UTIL -------------------- */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* -------------------- 6. INISIALISASI & EVENT BINDING -------------------- */
function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('mobileOverlay').classList.remove('show');
}
document.getElementById('hamburgerBtn').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('mobileOverlay').classList.add('show');
});
document.getElementById('mobileOverlay').addEventListener('click',closeMobileSidebar);

document.getElementById('sidebarToggle').addEventListener('click',()=>{
  state.sidebarCollapsed = !state.sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed',state.sidebarCollapsed);
  document.getElementById('sidebarToggleLabel').textContent = state.sidebarCollapsed ? 'Perluas Menu' : 'Ciutkan Menu';
});

function init(){
  renderSidebar();
  renderTopbarRight();
  renderView();

  // Landing page otomatis hilang setelah 5 detik
  setTimeout(()=>{
    document.getElementById('landing').classList.add('hide');
    document.getElementById('app').classList.add('ready');
  },5000);
}
init();
</script>
