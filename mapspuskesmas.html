<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMANTRI - Peta Puskesmas Kukar</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body { margin:0; font-family: Arial, sans-serif; }
#map { height: 100vh; }
.header {
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#0d6efd;
  color:white;
  padding:10px 20px;
  border-radius:10px;
  z-index:1000;
  font-weight:bold;
}
.legend {
  position:absolute;
  bottom:20px;
  left:20px;
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<div class="header">SIMANTRI v2.0 - Peta Puskesmas Kutai Kartanegara</div>
<div id="map"></div>

<div class="legend">
<b>Legenda:</b><br>
🟢 Puskesmas
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([-0.5, 117.0], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

var data = [
  {name:"Puskesmas Samboja", kec:"Samboja", lat:-1.0545, lng:117.0952},
  {name:"Puskesmas Muara Jawa", kec:"Muara Jawa", lat:-0.9895, lng:117.0487},
  {name:"Puskesmas Loa Janan", kec:"Loa Janan", lat:-0.9872, lng:117.0110},
  {name:"Puskesmas Kota Bangun", kec:"Kota Bangun", lat:-0.3295, lng:116.6280},
  {name:"Puskesmas Mangkurawang", kec:"Tenggarong", lat:-0.4189, lng:116.9815},
  {name:"Puskesmas Rapak Mahang", kec:"Tenggarong", lat:-0.4232, lng:116.9903},
  {name:"Puskesmas Sungai Mariam", kec:"Anggana", lat:-0.7382, lng:117.2125},
  {name:"Puskesmas Muara Badak", kec:"Muara Badak", lat:-0.8075, lng:117.3950},
  {name:"Puskesmas Marangkayu", kec:"Marangkayu", lat:-0.9175, lng:117.3162},
  {name:"Puskesmas Muara Kaman", kec:"Muara Kaman", lat:-0.4385, lng:116.8712}
];

// Marker

data.forEach(function(p){
  var marker = L.marker([p.lat, p.lng]).addTo(map);
  marker.bindPopup("<b>"+p.name+"</b><br>Kecamatan: "+p.kec+"<br><button onclick='detail("+JSON.stringify(p)+")'>Detail</button>");
});

// Detail function
function detail(p){
  alert("Nama: " + p.name + "\nKecamatan: " + p.kec + "\nStatus: Aktif");
}

</script>

</body>
</html>
