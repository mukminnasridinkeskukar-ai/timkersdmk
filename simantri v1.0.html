      </div>
      
      <div class="autocomplete-wrapper">
        <div class="search-box" style="max-width:500px;">
          <i class="fas fa-search"></i>
          <input id="cek-data-nama" type="text" placeholder="Ketik minimal 2 huruf Nama Lengkap..."
                 style="padding-left:48px;" autocomplete="off">
        </div>
        <div class="autocomplete-dropdown" id="cek-data-autocomplete-dropdown"></div>
      </div>
      
      <div id="cek-data-search-info" style="text-align:center;color:#64748B;padding:40px 20px;margin-top:16px;">
        <i class="fas fa-user-md" style="font-size:40px;opacity:0.4;display:block;margin-bottom:10px;"></i>

      </div>
      
      <div id="cek-data-table-wrapper" class="table-wrapper" style="display:none;margin-top:16px;">
        <table id="cek-data-table" style="width:100%;font-size:13px;">
          <thead>
            <tr>
              <th style="width:40px;">No</th>
              <th>Nama Lengkap</th>
              <th>Unit Kerja</th>
              <th>Alamat Unit Kerja</th>
              <th>Jam Operasional/Praktik</th>
              <th>Catatan Rekomendasi</th>
              ${isAdmin ? '<th style="width:90px;">Aksi</th>' : ''}
            </tr>
          </thead>
          <tbody id="cek-data-tbody"></tbody>
        </table>
        <div id="cek-data-count" style="padding:10px;text-align:center;font-size:12px;color:#64748B;"></div>
      </div>
    </div>
  `;

  const searchInput = document.getElementById('cek-data-nama');
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      clearTimeout(cekDataDebounceTimer);
      cekDataDebounceTimer = setTimeout(() => {
        const query = this.value.trim();
        if (query.length >= 2) {
          cekDataAutocomplete(query);
        } else {
          cekDataHideResults();
          cekDataVervalCache = [];
        }
      }, 350);
    });
    searchInput.addEventListener('keydown', function(e) {
      const dropdown = document.getElementById('cek-data-autocomplete-dropdown');
      if (!dropdown || dropdown.style.display !== 'block') return;
      const items = dropdown.querySelectorAll('.item');
      if (e.key === 'ArrowDown') { e.preventDefault(); cekDataSelectedIndex = Math.min(cekDataSelectedIndex + 1, items.length - 1); cekDataHighlight(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); cekDataSelectedIndex = Math.max(cekDataSelectedIndex - 1, 0); cekDataHighlight(); }
      else if (e.key === 'Enter' && cekDataSelectedIndex >= 0) { e.preventDefault(); cekDataSelect(cekDataSelectedIndex); }
      else if (e.key === 'Escape') { dropdown.style.display = 'none'; }
    });
  }
}

function cekDataHighlight() {
  document.querySelectorAll('#cek-data-autocomplete-dropdown .item').forEach((el, i) => {
    el.classList.toggle('active', i === cekDataSelectedIndex);
  });
}

function cekDataHideResults() {
  const si = document.getElementById('cek-data-search-info');
  const tw = document.getElementById('cek-data-table-wrapper');
  const dd = document.getElementById('cek-data-autocomplete-dropdown');
  if (si) si.style.display = 'block';
  if (tw) tw.style.display = 'none';
  if (dd) dd.style.display = 'none';
}

function cekDataShowResults() {
  const si = document.getElementById('cek-data-search-info');
  const tw = document.getElementById('cek-data-table-wrapper');
  if (si) si.style.display = 'none';
  if (tw) tw.style.display = 'block';
}

function cekDataAutocomplete(query) {
  const dropdown = document.getElementById('cek-data-autocomplete-dropdown');
  if (!dropdown) return;
  
  if (!query || query.length < 2) {
    dropdown.style.display = 'none';
    cekDataSelectedIndex = -1;
    return;
  }
  
  apiCall('searchNamaVerval', { q: query }, 'GET').then(res => {
    if (!res.success || !res.data || res.data.length === 0) {
      dropdown.innerHTML = '<div class="no-result">Tidak ada hasil</div>';
      dropdown.style.display = 'block';
      cekDataVervalCache = [];
      cekDataSelectedIndex = -1;
      return;
    }
    
    cekDataVervalCache = res.data;
    cekDataSelectedIndex = -1;
    
    dropdown.innerHTML = res.data.map((item, idx) => {
      const nama = item['Nama Lengkap'] || item.nama_lengkap || '';
      const unit = item['Unit Kerja'] || item.unit_kerja || '';
      const highlight = nama.replace(new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<strong style="color:#0A66C2;">$1</strong>');
      return `<div class="item" data-index="${idx}" onclick="cekDataSelect(${idx})" onmouseover="cekDataSelectedIndex=${idx};cekDataHighlight()">
        <i class="fas fa-user-md" style="color:#0A66C2;width:18px;"></i>
        <div>
          <div class="nama">${highlight}</div>
          <div class="nik">${escapeHtml(unit)}</div>
        </div>
      </div>`;
    }).join('');
    
    dropdown.style.display = 'block';
  });
}

function cekDataSelect(idx) {
  const dropdown = document.getElementById('cek-data-autocomplete-dropdown');
  if (dropdown) dropdown.style.display = 'none';
  
  const item = cekDataVervalCache[idx];
  if (!item) return;
  
  document.getElementById('cek-data-nama').value = item['Nama Lengkap'] || item.nama_lengkap || '';
  
  // Render table with matching data — fetch full detail for this nama
  const nama = item['Nama Lengkap'] || item.nama_lengkap || '';
  cekDataSearchFull(nama);
}

function cekDataSearchFull(nama) {
  const tbody = document.getElementById('cek-data-tbody');
  const count = document.getElementById('cek-data-count');
  if (!tbody) return;
  
  cekDataShowResults();
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#94A3B8;"><i class="fas fa-spinner fa-spin"></i> Memuat detail...</td></tr>';
  
  // Get all data and filter by nama
  apiCall('getAllVerval', {}, 'GET').then(res => {
    if (!res.success || !res.data) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#DC2626;">Gagal memuat data.</td></tr>';
      return;
    }
    
    const query = nama.toLowerCase().trim();
    const matches = res.data.filter(r => {
      const n = String(r['Nama Lengkap'] || r.nama_lengkap || '').toLowerCase().trim();
      return n === query;
    });
    
    if (matches.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#64748B;">Tidak ditemukan data verval untuk nama tersebut.</td></tr>';
      return;
    }
    
    const isAdmin = currentUser && currentUser.role === 'admin';
    tbody.innerHTML = matches.map((r, i) => {
      const id = r._row || r.id || i;
      const namaLengkap = escapeHtml(r['Nama Lengkap'] || r.nama_lengkap || '');
      const unitKerja = escapeHtml(r['Unit Kerja'] || r.unit_kerja || '');
      const alamatUnit = escapeHtml(r['Alamat Unit Kerja'] || r.alamat_unit || '');
      const jam = escapeHtml(r['Jam Operasional Praktik'] || r.jam_operasional || '-');
      const catatan = escapeHtml(r['Catatan Rekomendasi'] || r.catatan_rekomendasi || '-');
      return `<tr>
        <td style="text-align:center;">${i + 1}</td>
        <td><strong>${namaLengkap}</strong></td>
        <td>${unitKerja}</td>
        <td>${alamatUnit}</td>
        <td>${jam}</td>
        <td>${catatan}</td>
        ${isAdmin ? `<td><button onclick="cekDataEditModal('${escapeHtml(r.NIK || r.nik || '').replace(/'/g, "\\'")}', ${i})" class="btn btn-sm btn-outline" style="padding:3px 7px;" title="Edit"><i class="fas fa-edit"></i></button></td>` : ''}
      </tr>`;
    }).join('');
    
    if (count) count.textContent = `Menampilkan ${matches.length} data untuk "${escapeHtml(nama)}"`;
  });
}

function doAdminLogin() {
  const user = document.getElementById('admin-user').value.trim();
  const pass = document.getElementById('admin-pass').value;
  login(user, pass).then(ok => {
    if (ok) {
      const content = document.getElementById('content');
      renderAdmin(content);
    }
  });
}

function showAddUserModal() {
  const body = `
    <div class="form-group"><label>Username</label><input id="new-username"></div>
    <div class="form-group"><label>Password</label><input id="new-password" type="password"></div>
    <div class="form-group"><label>Role</label><select id="new-role"><option value="operator">operator</option><option value="admin">admin</option></select></div>
    <div class="form-group"><label>Nama Lengkap</label><input id="new-fullname"></div>
  `;
  const footer = `<button onclick="closeModal()" class="btn btn-outline">Batal</button>
                  <button onclick="saveNewUser()" class="btn btn-primary">Simpan User</button>`;
  showModal('Tambah User Baru', body, null, footer);
}

function saveNewUser() {
  const username = document.getElementById('new-username').value.trim();
  const password = document.getElementById('new-password').value;
  const role = document.getElementById('new-role').value;
  const full = document.getElementById('new-fullname').value.trim();
  if (!username || !password) { showToast('Username & password wajib', 'error'); return; }
  dataStore.users.push({ username, password, role, full_name: full });
  saveToStorage();
  closeModal();
  showToast('User baru ditambahkan');
  navigateTo('admin');
}

function deleteUser(username) {
  if (username === 'admin') { showToast('Tidak bisa hapus admin utama', 'error'); return; }
  if (!confirm('Hapus user ' + username + '?')) return;
  dataStore.users = dataStore.users.filter(u => u.username !== username);
  saveToStorage();
  navigateTo('admin');
}

function showImportModal() {
  const body = `
    <div style="margin-bottom:14px;">Pilih file CSV untuk import ke tabel tertentu.</div>
    <div class="form-group">
      <label>Target Tabel</label>
      <select id="import-target">
        <option value="profil">profil_sdmk</option>
        <option value="izin">izin_praktik</option>
        <option value="pengumuman">pengumuman</option>
      </select>
    </div>
    <div class="form-group">
      <label>File CSV</label>
      <input type="file" id="import-file" accept=".csv">
    </div>
    <div style="font-size:12px;color:#64748B;">Pastikan baris pertama adalah header yang sesuai.</div>
  `;
  const footer = `<button onclick="closeModal()" class="btn btn-outline">Batal</button>
                  <button onclick="doImportCSV()" class="btn btn-primary">Import Sekarang</button>`;
  showModal('Import Data dari CSV', body, null, footer);
}

function doImportCSV() {
  const fileInput = document.getElementById('import-file');
  const target = document.getElementById('import-target').value;
  if (!fileInput.files.length) { showToast('Pilih file CSV', 'error'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) { showToast('CSV kosong', 'error'); return; }
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
    const rows = lines.slice(1).map(line => {
      const vals = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
      const obj = {};
      headers.forEach((h,i) => obj[h] = (vals[i] || '').replace(/"/g,'').trim());
      return obj;
    });
    if (target === 'profil') dataStore.profil.push(...rows.map(r => ({...r, no: dataStore.profil.length+1})));
    else if (target === 'izin') dataStore.izin.unshift(...rows);
    else if (target === 'pengumuman') dataStore.pengumuman.unshift(...rows);
    saveToStorage();
    closeModal();
    showToast(`${rows.length} baris berhasil diimport ke ${target}`);
    navigateTo(target === 'profil' ? 'profil' : target === 'izin' ? 'cek' : 'pengumuman');
  };
  reader.readAsText(fileInput.files[0]);
}

function exportAllData() {
  const blob = new Blob([JSON.stringify(dataStore, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `simantri_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup JSON berhasil diunduh');
}

// ==================== MODAL SYSTEM ====================
function showModal(title, bodyHTML, onConfirm = null, footerHTML = '') {
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = footerHTML || (onConfirm ? 
    `<button onclick="closeModal()" class="btn btn-outline">Batal</button>
     <button onclick="onConfirm();closeModal()" class="btn btn-primary">Konfirmasi</button>` : '');
  document.getElementById('modal-backdrop').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('modal-large');
  document.getElementById('modal-backdrop').style.display = 'none';
}

// ==================== INIT ====================
function initApp() {
  showLoading(true);
  
  // Load from localStorage or seed demo data
  loadFromStorage();
  if (!dataStore.verval || dataStore.verval.length === 0) {
    seedDemoData();
  }
  
  // Check session
  checkSession();
  
  // Connection badge
  const badge = document.getElementById('connection-badge');
  const connText = document.getElementById('conn-text');
  if (USE_GAS) {
    badge.style.background = '#DCFCE7';
    badge.style.color = '#166534';
    connText.innerHTML = 'TERHUBUNG';
    badge.title = 'Data tersinkron dengan Google Sheet';
  } else {
    connText.innerHTML = 'DEMO MODE';
  }
  
  // Initial navigation
  setTimeout(() => {
    showLoading(false);
    navigateTo('dashboard');
    
    // Warm up ping
    if (USE_GAS) apiCall('ping').catch(() => {});
    
    // Keyboard shortcut hint
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.tagName === 'BODY') {
        e.preventDefault();
        const search = document.getElementById('search-profil') || document.getElementById('search-pengumuman');
        if (search) search.focus();
      }
    });
    
    // Show welcome toast once
    if (!localStorage.getItem('simantri_welcomed')) {
      setTimeout(() => {
        showToast('Selamat datang di SIMANTRI Enterprise Dashboard!');
        localStorage.setItem('simantri_welcomed', '1');
      }, 1600);
    }
  }, 850);
  
  // Make mobile menu button visible on small screens
  if (window.innerWidth < 900) {
    document.getElementById('mobile-menu-btn').style.display = 'block';
  }
  
  // Global error handler
  window.onerror = function(msg) {
    console.error('SIMANTRI Error:', msg);
  };
}

// Boot
document.addEventListener('DOMContentLoaded', initApp);

// Expose for console debug
window.SIMANTRI = { dataStore, navigateTo, apiCall };
</script>
