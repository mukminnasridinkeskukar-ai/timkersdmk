<style>
/* ============================================
   CSS VARIABLES & RESET
   ============================================ */
:root {
  --blue: #0A66C2;
  --blue-dark: #084B8A;
  --cyan: #00B4D8;
  --cyan-light: #90E0EF;
  --white: #FFFFFF;
  --gray-50: #F8FAFC;
  --gray-100: #F1F5F9;
  --gray-200: #E2E8F0;
  --gray-600: #475569;
  --gray-800: #1E293B;
  --shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.25);
  --glow-blue: 0 0 0 3px rgba(10, 102, 194, 0.3), 0 0 20px rgba(0, 180, 216, 0.4);
  --glow-cyan: 0 0 0 3px rgba(0, 180, 216, 0.35), 0 0 25px rgba(0, 180, 216, 0.5);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #F8FAFC 0%, #E0F2FE 100%); color: var(--gray-800); overflow-x:hidden; }
.app { display: flex; min-height: 100vh; }

/* ============================================
   SIDEBAR STYLES
   ============================================ */
.sidebar {
  width: 260px; background: linear-gradient(180deg, #0A66C2 0%, #084B8A 100%);
  color: white; position: fixed; top:0; left:0; bottom:0; z-index: 1000;
  box-shadow: 4px 0 20px rgba(0,0,0,0.3);
  display: flex; flex-direction: column;
}
.sidebar .logo {
  padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; gap: 12px;
}
.sidebar .logo i { font-size: 28px; color: var(--cyan-light); }
.sidebar .logo div { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.sidebar .logo small { font-size: 11px; opacity: 0.7; font-weight: 400; }

.sidebar nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.sidebar nav a {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  color: rgba(255,255,255,0.85); text-decoration: none; border-radius: 10px;
  font-size: 14px; font-weight: 500; transition: all 0.2s ease; margin-bottom: 4px;
}
.sidebar nav a:hover, .sidebar nav a.active {
  background: rgba(255,255,255,0.15); color: white;
}
.sidebar nav a.active { background: rgba(255,255,255,0.2); font-weight: 600; }
.sidebar nav a i { width: 20px; text-align: center; font-size: 15px; }

.sidebar .user-panel {
  padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.1);
}
.sidebar .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.sidebar .avatar {
  width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--blue));
  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
}
.sidebar .user-text h4 { font-size: 13px; font-weight: 600; }
.sidebar .user-text p { font-size: 11px; opacity: 0.7; }
.sidebar .conn-badge {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
  background: rgba(255,255,255,0.1); border-radius: 20px; font-size: 11px; font-weight: 600;
}

/* ============================================
   MAIN CONTENT AREA
   ============================================ */
.main { flex: 1; margin-left: 260px; padding: 24px 32px; min-height: 100vh; }
.main-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
  flex-wrap: wrap; gap: 16px;
}
.main-header h1 { font-size: 26px; font-weight: 800; color: var(--blue-dark); }
.main-header .header-actions { display: flex; gap: 10px; align-items: center; }

/* Mobile menu button */
#mobile-menu-btn { display: none; position: fixed; top: 16px; left: 16px; z-index: 1001;
  background: var(--blue); color: white; border: none; padding: 10px 14px; border-radius: 8px;
  cursor: pointer; font-size: 16px; box-shadow: var(--shadow);
}

/* ============================================
   CARD & COMPONENT STYLES
   ============================================ */
.card {
  background: white; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  padding: 20px; margin-bottom: 18px; border: 1px solid var(--gray-100);
}
.stat-card {
  background: white; border-radius: 14px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  border: 1px solid var(--gray-100); transition: transform 0.2s, box-shadow 0.2s;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
.stat-card .stat-icon {
  width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-size: 20px; margin-bottom: 12px;
}
.stat-card h3 { font-size: 28px; font-weight: 800; color: var(--gray-800); }
.stat-card p { font-size: 13px; color: var(--gray-600); margin-top: 2px; }

/* ============================================
   BUTTON STYLES
   ============================================ */
.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease; text-decoration: none;
}
.btn-primary { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; }
.btn-primary:hover { box-shadow: var(--glow-blue); transform: translateY(-1px); }
.btn-cyan { background: linear-gradient(135deg, var(--cyan), #0891b2); color: white; }
.btn-cyan:hover { box-shadow: var(--glow-cyan); transform: translateY(-1px); }
.btn-outline {
  background: white; color: var(--gray-600); border: 1.5px solid var(--gray-200);
}
.btn-outline:hover { border-color: var(--blue); color: var(--blue); }
.btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
.btn-danger:hover { box-shadow: 0 0 0 3px rgba(239,68,68,0.3); }
.btn-sm { padding: 6px 14px; font-size: 12.5px; border-radius: 8px; }
.btn-glow { animation: pulse-glow 2s infinite; }
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(10,102,194,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(10,102,194,0); }
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* ============================================
   FORM STYLES
   ============================================ */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 13px; font-weight: 600; color: var(--gray-600);
  margin-bottom: 6px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200);
  border-radius: 9px; font-size: 14px; transition: border-color 0.2s;
  font-family: inherit;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,102,194,0.1);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.readonly { background: var(--gray-50); color: var(--gray-600); }
.search-box {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  background: white; border: 1.5px solid var(--gray-200); border-radius: 10px;
  min-width: 280px; transition: border-color 0.2s;
}
.search-box:focus-within { border-color: var(--blue); }
.search-box i { color: var(--gray-600); }
.search-box input {
  border: none; outline: none; flex: 1; font-size: 14px; background: transparent;
}

/* ============================================
   TABLE STYLES
   ============================================ */
.table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid var(--gray-200); }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead { background: linear-gradient(135deg, var(--gray-50), var(--gray-100)); }
th { padding: 12px 14px; text-align: left; font-weight: 700; color: var(--gray-600);
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 2px solid var(--gray-200);
}
td { padding: 11px 14px; border-bottom: 1px solid var(--gray-100); color: var(--gray-800); }
tbody tr:hover { background: var(--gray-50); }
tbody tr:last-child td { border-bottom: none; }

/* ============================================
   BADGE STYLES
   ============================================ */
.badge {
  display: inline-flex; align-items: center; padding: 3px 10px;
  border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
}
.badge-success { background: #DCFCE7; color: #166534; }
.badge-warning { background: #FEF3C7; color: #92400E; }
.badge-danger { background: #FEE2E2; color: #991B1B; }
.badge-info { background: #DBEAFE; color: #1E40AF; }
.badge-secondary { background: var(--gray-100); color: var(--gray-600); }

/* ============================================
   MODAL STYLES
   ============================================ */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.6);
  backdrop-filter: blur(4px); z-index: 2000; display: none; align-items: center;
  justify-content: center; padding: 20px;
}
.modal-overlay.modal-large .modal-container { max-width: 900px; width: 95%; max-height: 90vh; overflow-y: auto; }
.modal-container {
  background: white; border-radius: 18px; width: 100%; max-width: 560px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.3); animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px; border-bottom: 1px solid var(--gray-100);
}
.modal-header h2 { font-size: 18px; font-weight: 700; color: var(--blue-dark); }
.modal-close {
  background: none; border: none; font-size: 20px; cursor: pointer;
  color: var(--gray-600); padding: 4px 8px; border-radius: 6px; transition: all 0.2s;
}
.modal-close:hover { background: var(--gray-100); color: var(--gray-800); }
.modal-body { padding: 24px; max-height: 60vh; overflow-y: auto; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px;
  border-top: 1px solid var(--gray-100); background: var(--gray-50);
  border-radius: 0 0 18px 18px;
}

/* Verval-specific modal styles */
.modal-verval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.modal-verval-field label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 4px; }
.modal-verval-field input, .modal-verval-field select, .modal-verval-field textarea {
  width: 100%; padding: 8px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px;
  font-size: 13px;
}

/* ============================================
   TOAST NOTIFICATION STYLES
   ============================================ */
.toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 3000;
  display: flex; flex-direction: column; gap: 10px;
}
.toast {
  display: flex; align-items: center; gap: 12px; padding: 14px 20px;
  background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  border-left: 4px solid var(--blue); min-width: 300px; max-width: 420px;
  animation: toastIn 0.3s ease; font-size: 14px;
}
.toast.toast-success { border-left-color: #22c55e; }
.toast.toast-error { border-left-color: #ef4444; }
.toast.toast-warning { border-left-color: #f59e0b; }
.toast i { font-size: 18px; }
.toast-success i { color: #22c55e; }
.toast-error i { color: #ef4444; }
.toast-warning i { color: #f59e0b; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(50px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ============================================
   LOADING & UTILITY STYLES
   ============================================ */
.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2500;
}
.spinner {
  width: 48px; height: 48px; border: 4px solid var(--gray-200);
  border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.flex { display: flex; }
.gap-10 { gap: 10px; }
.text-center { text-align: center; }
.mt-10 { margin-top: 10px; }
.mb-10 { margin-bottom: 10px; }

/* Login page specific */
.login-container {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0A66C2 0%, #084B8A 50%, #0c4a6e 100%);
}
.login-card {
  background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.3);
}
.login-card h1 { text-align: center; font-size: 26px; color: var(--blue-dark); margin-bottom: 8px; }
.login-card p { text-align: center; color: var(--gray-600); margin-bottom: 28px; font-size: 14px; }

  .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 20px 16px; }
  #mobile-menu-btn { display: block; }
  .main-header h1 { font-size: 20px; margin-top: 50px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
}
@media (max-width: 600px) {
  .stat-grid { grid-template-columns: 1fr !important; }
  .modal-container { margin: 10px; border-radius: 14px; }
  .login-card { margin: 16px; padding: 28px; }
}
</style>

<script>
// ============================================================
// HELPER FUNCTIONS
// ============================================================

/**
 * Generate a unique ID with prefix
 * @param {string} prefix - ID prefix
 * @returns {string} Unique identifier
 */
function generateId(prefix = 'ID') {
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

/**
 * Escape HTML to prevent XSS attacks
 * @param {string} str - String to escape
 * @returns {string} Escaped string
 */
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/**
 * Format date to Indonesian locale
 * @param {string|Date} dateVal - Date value
 * @returns {string} Formatted date string
 */
function formatDate(dateVal) {
  if (!dateVal) return '-';
  try {
    const d = new Date(dateVal);
    if (isNaN(d.getTime())) return dateVal;
    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch (e) {
    return dateVal;
  }
}

/**
 * Show toast notification
 * @param {string} message - Message to display
 * @param {string} type - Toast type: 'success', 'error', 'warning', 'info'
 */
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
  
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i><span>${escapeHtml(message)}</span>`;
  
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(50px)';
    toast.style.transition = 'all 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

/**
 * Show/hide loading overlay
 * @param {boolean} show - Whether to show loading
 */
function showLoading(show) {
  document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
}

/**
 * Toggle mobile sidebar menu
 */
function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
// ROLE-BASED ACCESS CONTROL
// ============================================================

/**
 * Check if current user is admin or operator
 * Used for controlling access to sensitive operations like:
 * - Add/Create buttons (Tambah)
 * - Export functions (Export CSV/PDF)
 * - Import functions (Import CSV)
 * - Download functions
 * 
 * @returns {boolean} True if user is admin or operator
 */
function isAdminOrOperator() {
  return currentUser && (currentUser.role === 'admin' || currentUser.role === 'operator');
}

/**
 * Check if current user is admin only
 * For strictly admin-only features like user management
 * 
 * @returns {boolean} True if user is admin
 */
function isAdmin() {
  return currentUser && currentUser.role === 'admin';
}

/**
 * Get restricted action HTML wrapper
 * Returns empty string if user doesn't have permission
 * 
 * @param {string} html - HTML content to conditionally render
 * @param {boolean} [adminOnly=false] - If true, requires admin role specifically
 * @returns {string} HTML string or empty string
 */
function restrictHtml(html, adminOnly = false) {
  if (adminOnly) {
    return isAdmin() ? html : '';
  }
  return isAdminOrOperator() ? html : '';
}
</script>

<script>
// ============================================================
// API CALL FUNCTION WITH CORS HANDLING
// ============================================================

/**
 * Make API call to Google Apps Script backend
 * Features:
 * - Automatic CORS handling with fallback options
 * - Retry mechanism for transient failures
 * - Graceful fallback to local demo data on failure
 * - Support for CORS proxy configuration
 * 
 * @param {string} action - API action name
 * @param {object} payload - Request payload/data
 * @param {string} method - HTTP method ('POST' or 'GET')
 * @returns {Promise<object>} API response
 */
async function apiCall(action, payload = {}, method = 'POST') {
  // Use local demo mode if GAS is disabled
  if (!USE_GAS) {
    console.log('[SIMANTRI] Backend disabled, using local demo mode');
    showToast('Backend tidak tersedia, menggunakan mode demo offline', 'error');
    return mockApi(action, payload);
  }

  try {
    const isRead = READ_ACTIONS.has(action);
    const finalMethod = isRead ? 'GET' : method;

    // Build URL with query parameters
    let url = GAS_WEB_APP_URL;
    
    // Apply CORS proxy if configured
    if (CORS_PROXY && !url.includes(CORS_PROXY)) {
      url = CORS_PROXY + encodeURIComponent(url);
    }

    // Parse and modify URL
    let urlObj;
    try {
      urlObj = new URL(url);
    } catch (e) {
      // If URL parsing fails (might be a proxy URL), construct manually
      urlObj = { searchParams: new URLSearchParams(), toString: () => url };
      urlObj.searchParams = {
        _params: new URLSearchParams(),
        set: function(k, v) { this._params.set(k, v); },
        toString: function() { return this._params.toString(); }
      };
    }
    
    urlObj.searchParams.set('action', action);

    // Configure fetch options
    const options = {
      method: finalMethod,
      mode: 'cors',
      redirect: 'follow',
      credentials: 'omit',
      headers: {
        'Accept': 'application/json'
      }
    };

    // Handle GET vs POST request body
    if (finalMethod === 'GET') {
      Object.keys(payload).forEach(key => {
        if (payload[key] !== undefined && payload[key] !== null) {
          urlObj.searchParams.set(key, typeof payload[key] === 'object' ? JSON.stringify(payload[key]) : payload[key]);
        }
      });
    } else {
      options.headers['Content-Type'] = 'text/plain;charset=utf-8';
      options.body = JSON.stringify({ action, ...payload });
    }

    // Build final URL string
    const finalUrl = urlObj.toString();

    // Attempt fetch with retry
    const res = await fetchWithRetry(finalUrl, options, 3);
    
    // Check if response is ok and parse JSON
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    }
    
    // Handle opaque responses from no-cors mode
    if (res.type === 'opaque') {
      console.warn('[SIMANTRI] Received opaque response, falling back to local data');
      throw new Error('CORS blocked - received opaque response');
    }
    
    return await res.json();

  } catch (err) {
    console.error('[SIMANTRI] API Error:', err.message || err);
    
    // Provide user-friendly error message
    const isCorsError = err.message?.includes('CORS') || 
                        err.message?.includes('Failed to fetch') ||
                        err.message?.includes('NetworkError') ||
                        err.message?.includes('opaque') ||
                        err.message?.includes('cross-origin');
    
    if (isCorsError) {
      showToast('CORS Error: Tidak dapat terhubung ke server. Menggunakan data lokal.', 'warning');
      console.log('[SIMANTRI] CORS Error detected. Tips:');
      console.log('- Pastikan Google Apps Script di-deploy dengan CorsMode.ANONYMOUS');
      console.log('- Atau gunakan CORS Proxy dengan mengatur variabel CORS_PROXY');
    } else {
      showToast(`API Error: ${err.message}. Menggunakan data lokal.`, 'warning');
    }
    
    // Fallback to local mock data
    return mockApi(action, payload);
  }
}

/**
 * Fetch with automatic retry mechanism
 * @param {string} url - Request URL
 * @param {object} options - Fetch options
 * @param {number} retries - Number of retry attempts
 * @returns {Promise<Response>} Fetch response
 */
async function fetchWithRetry(url, options, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 second timeout
      
      const res = await fetch(url, { ...options, signal: controller.signal });
      clearTimeout(timeoutId);
      
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res;
      
    } catch (e) {
      if (i === retries) throw e;
      // Exponential backoff: 800ms, 1600ms, 2400ms
      await new Promise(r => setTimeout(r, 800 * (i + 1)));
    }
  }
}

// ============================================================
// MOCK API (Local Demo Mode)

/**
 * Mock API that simulates backend responses
 * Used when GAS is unavailable or in demo mode
 * @param {string} action - API action
 * @param {object} payload - Request payload
 * @returns {Promise<object>} Mock response
 */
function mockApi(action, payload) {
  return new Promise(resolve => {
    setTimeout(() => {
      let result = { success: false, error: 'Unknown action' };
      
      switch (action) {
        case 'ping':
          result = { success: true, message: 'Local Demo OK', mode: 'offline' };
          break;

        case 'getPengumuman':
          result = { success: true, data: dataStore.pengumuman, count: dataStore.pengumuman.length };
          break;

        case 'addPengumuman':
          const newP = { 
            id: generateId('PENG'), 
            tanggal: payload.tanggal || new Date().toISOString().split('T')[0], 
            judul: payload.judul, 
            isi: payload.isi, 
            is_penting: payload.is_penting ? 1 : 0, 
            created_by: currentUser?.username || 'demo' 
          };
          dataStore.pengumuman.unshift(newP);
          saveToStorage();
          result = { success: true, message: 'Pengumuman ditambahkan', id: newP.id };
          break;

        case 'deletePengumuman':
          dataStore.pengumuman = dataStore.pengumuman.filter(p => p.id !== payload.id);
          saveToStorage();
          result = { success: true, message: 'Dihapus' };
          break;

        case 'updatePengumuman':
          const pIdx = dataStore.pengumuman.findIndex(p => p.id === payload.id);
          if (pIdx >= 0) {
            Object.assign(dataStore.pengumuman[pIdx], payload);
            saveToStorage();
            result = { success: true, message: 'Pengumuman diperbarui' };
          } else {
            result = { success: false, error: 'Pengumuman tidak ditemukan' };
          }
          break;

        case 'getProfil':
          result = { success: true, data: dataStore.profil, count: dataStore.profil.length };
          break;

        case 'saveProfil':
          if (payload.nik) {
            const existingIdx = dataStore.profil.findIndex(p => p.nik === payload.nik);
            if (existingIdx >= 0) {
              Object.assign(dataStore.profil[existingIdx], payload);
              result = { success: true, message: 'Data diperbarui' };
            } else {
              dataStore.profil.push(payload);
              result = { success: true, message: 'Data ditambahkan' };
            }
            saveToStorage();
          } else {
            result = { success: false, error: 'NIK wajib diisi' };
          }
          break;

        case 'deleteProfil':
          dataStore.profil = dataStore.profil.filter(p => p.nik !== payload.nik);
          saveToStorage();
          result = { success: true, message: 'Data profil dihapus' };
          break;

        case 'getIzin':
          result = { success: true, data: dataStore.izin, count: dataStore.izin.length };
          break;

        case 'submitVerval':
          result = { 
            success: true, 
            message: 'Data verval berhasil disimpan (local)', 
            timestamp: new Date().toLocaleString('id-ID'),
            verifyCode: `SIMANTRI-VERVAL-${payload.nik}-${Date.now()}`
          };
          break;

        case 'getAllVervalFasyankes':
          result = { success: true, data: dataStore.verval || [], count: (dataStore.verval || []).length };
          break;

        case 'getVervalByNik':
          const matches = (dataStore.verval || []).filter(v => (v.NIK || v.nik) === payload.nik);
          result = { 
            success: true, 
            data: matches,
            latest: matches.length > 0 ? matches[matches.length - 1] : null,
            count: matches.length 
          };
          break;

        case 'login':
          const user = dataStore.users.find(u => u.username === payload.username && u.password === payload.password);
          if (user) {
            result = { 
              success: true, 
              user: { username: user.username, role: user.role, full_name: user.full_name },
              token: 'demo-token-' + Date.now(),
              expires: new Date(Date.now() + 8*3600*1000).toISOString()
            };
          } else {
            result = { success: false, error: 'Username atau password salah' };
          }
          break;

        default:
          result = { success: false, error: `Action '${action}' not implemented in demo mode` };
      }
      
      resolve(result);
    }, 300); // Simulate network delay
  });
}

<script>

/**
 * Check for existing session on app load
 */
function checkSession() {
  try {
    const sessionStr = localStorage.getItem('simantri_session');
    if (sessionStr) {
      const s = JSON.parse(sessionStr);
      if (new Date(s.expires) > new Date()) {
        currentUser = s.user;
        updateUserUI();
        return true;
      } else {
        // Session expired
        localStorage.removeItem('simantri_session');
      }
    }
  } catch (e) {
    console.warn('[SIMANTRI] Session check error:', e);
  }
  return false;
}

/**
 * Update UI elements based on current user
 */
function updateUserUI() {
  if (!currentUser) return;
  
  document.getElementById('user-name').textContent = currentUser.full_name || currentUser.username;
  document.getElementById('user-role').textContent = getRoleDisplayText(currentUser.role);
  document.getElementById('user-avatar').textContent = (currentUser.full_name || currentUser.username)
    .split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
  
  // Update sidebar visibility based on role
  updateSidebarForRole();
}

/**
 * Get display text for user role
 * @param {string} role - User role
 * @returns {string} Display text
 */
function getRoleDisplayText(role) {
  switch (role) {
    case 'admin': return 'Administrator';
    case 'operator': return 'Operator';
    case 'viewer': return 'Pemantau';
    default: return role || 'Unknown';
  }
}

/**
 * Update sidebar links visibility based on user role
 */
function updateSidebarForRole() {
  // All roles can see basic navigation
  // Admin panel link could be hidden for non-admin users if needed
}

/**
 * Perform login
 * @param {string} username - Username
 * @param {string} password - Password
 * @returns {Promise<boolean>} Login success
 */
async function login(username, password) {
  const res = await apiCall('login', { username, password });
  
  if (res.success) {
    currentUser = res.user;
    const session = { 
      user: currentUser, 
      token: res.token, 
      expires: res.expires || new Date(Date.now() + 8*3600*1000).toISOString() 
    };
    localStorage.setItem('simantri_session', JSON.stringify(session));
    updateUserUI();
    showToast(`Selamat datang, ${currentUser.full_name || currentUser.username}!`);
    return true;
  } else {
    showToast(res.error || 'Login gagal', 'error');
    return false;
  }
}

/**
 * Logout current user
 */
function logout() {
  currentUser = null;
  localStorage.removeItem('simantri_session');
  
  document.getElementById('user-name').textContent = 'Guest';
  document.getElementById('user-role').textContent = 'Silakan login';
  document.getElementById('user-avatar').textContent = 'GU';
  
  navigateTo('dashboard');
  showToast('Anda telah logout');
}
</script>

/**

function animateCounter(elementId, target) {

  let current = 0;
  const increment = Math.ceil(target / 30);
  const timer = setInterval(() => {
    current += increment;
    if (current >= target) {
      current = target;
      clearInterval(timer);
    }
    el.textContent = current;
  }, 30);
}

/**
 * Render activity table
 */
function renderActivityTable() {
  const tbody = document.getElementById('activity-table-body');
  if (!tbody) return;

  const activities = (dataStore.logs || []).slice(0, 8);
  
  if (activities.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94A3B8;padding:20px;">Belum ada aktivitas</td></tr>';
    return;
  }

  tbody.innerHTML = activities.map(a => `
    <tr>
      <td>${escapeHtml(a.nama || '-')}</td>
      <td>${escapeHtml(a.profesi || '-')}</td>
      <td><span class="badge badge-info">${escapeHtml(a.aktivitas || '-')}</span></td>
      <td>${formatDate(a.tanggal)}</td>
    </tr>
  `).join('');
}

/**
 * Refresh all dashboard data
 */
async function refreshAllData() {
  showToast('Memperbarui data...', 'info');
  
  try {
    const [profilRes, vervalRes] = await Promise.all([
      apiCall('getProfil'),
      apiCall('getAllVervalFasyankes')
    ]);
    
    if (profilRes.success) {
      dataStore.profil = profilRes.data || [];
      profilData = [...dataStore.profil];
    }
    if (vervalRes.success) {
      dataStore.verval = vervalRes.data || [];
    }
    
    saveToStorage();
    navigateTo('dashboard');
    showToast('Data berhasil diperbarui!', 'success');
  } catch (e) {
    showToast('Gagal memperbarui data', 'error');
  }
}
</script>

  };
}

/**
 * Submit verval form
 * @param {Event} e - Form submit event
 * @param {boolean} fromPreview - Whether called from preview modal
 */
async function submitVervalForm(e, fromPreview = false) {
  if (e) e.preventDefault();
  
  const data = collectVervalData();
  
  // Validation
  if (!data.nik || data.nik.length !== 16) {
    showToast('NIK harus 16 digit', 'error');
    return;
  }
  if (!data.nama_lengkap || !data.unit_kerja) {
    showToast('Nama Lengkap dan Unit Kerja wajib diisi', 'error');
    return;
  }

  // Disable buttons during submission
  const btns = document.querySelectorAll('#verval-form button');
  btns.forEach(b => b.disabled = true);

  try {
    const res = await apiCall('submitVerval', data, 'GET');
    
    if (res.success) {
      // Clear draft on successful submission
      localStorage.removeItem('simantri_verval_draft');
      showToast('Data Verval berhasil dikirim!', 'success');
      showVervalSuccessModal(data, res.timestamp || new Date().toLocaleString('id-ID'));
    } else {
      showToast(res.error || 'Gagal submit data verval', 'error');
    }
  } catch (err) {
    showToast('Terjadi kesalahan saat submit data', 'error');
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

/**
 * Save verval form as draft
 */
function saveVervalDraft() {
  const data = collectVervalData();
  localStorage.setItem('simantri_verval_draft', JSON.stringify(data));
  showToast('Draft berhasil disimpan', 'success');
}

/**
 * Load saved verval draft
 */
function loadVervalDraft() {
  try {
    const draft = localStorage.getItem('simantri_verval_draft');
    if (draft) {
      const data = JSON.parse(draft);
      
      // Fill form fields
      Object.keys(data).forEach(key => {
        const fieldId = 'vf-' + key.replace(/_/g, '-');
        const el = document.getElementById(fieldId);
        if (el) el.value = data[key];
      });
      
      showToast('Draft dimuat. Lanjutkan atau edit data.', 'info');
    }
  } catch (e) {
    console.warn('Could not load verval draft:', e);

}
</script>

  loadAndRenderProfil();
}

/**
 * Populate unit kerja filter dropdown
 */
function populateUnitFilter() {
  const select = document.getElementById('filter-unit');
  if (!select) return;
  
  const units = [...new Set((dataStore.profil || []).map(p => p.unit_kerja || p['Nama Unit'] || '').filter(Boolean))];
  units.sort();
  
  units.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u;
    select.appendChild(opt);
  });
}

/**
 * Load profile data from API/local storage
 */
async function loadAndRenderProfil() {
  try {
    if (USE_GAS) {
      const res = await apiCall('getProfil');
      if (res.success) {
        dataStore.profil = res.data || [];
        profilData = [...dataStore.profil];
      }
    } else {
      profilData = [...dataStore.profil];
    }
    
    renderProfilTable();
  } catch (e) {
    console.error('Error loading profil data:', e);
    renderProfilTable();
  }
}

/**
 * Filter and render profile table
 */
function filterProfilTable() {
  renderProfilTable();
}

/**
 * Render profile table with current filters
 */
function renderProfilTable() {
  const tbody = document.getElementById('profil-table-body');
  const countEl = document.getElementById('profil-count');
  
  if (!tbody) return;
  
  let data = filteredData || profilData;
  
  // Apply filters
  const searchTerm = (document.getElementById('search-profil')?.value || '').toLowerCase();
  const unitF = document.getElementById('filter-unit')?.value || '';
  const jenisF = document.getElementById('filter-jenis')?.value || '';
  const strF = document.getElementById('filter-str')?.value || '';
  
  if (unitF) data = data.filter(d => (d.unit_kerja || d['Nama Unit']) === unitF);
  if (jenisF) data = data.filter(d => (d.profesi || d['Profesi']) === jenisF);
  if (strF) data = data.filter(d => (d.status_str || d['Status STR']) === strF);
  if (searchTerm) {
    data = data.filter(d => 
      (d.nik || d['NIK'] || '').toLowerCase().includes(searchTerm) ||
      (d.nama_lengkap || d['Nama Lengkap'] || '').toLowerCase().includes(searchTerm) ||
      (d.unit_kerja || d['Unit Kerja'] || '').toLowerCase().includes(searchTerm)
    );
  }
  
  // Update count
  if (countEl) {
    countEl.textContent = `Menampilkan ${data.length} dari ${(filteredData || profilData).length} data`;
  }
  
  // Render rows
  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--gray-600);"><i class="fas fa-inbox" style="font-size:32px;display:block;margin-bottom:10px;"></i>Tidak ada data ditemukan</td></tr>`;
    return;
  }
  
  const hasEditAccess = isAdminOrOperator();
  
  tbody.innerHTML = data.map((row, idx) => {
    const nik = row.nik || row['NIK'] || '';
    const nama = escapeHtml(row.nama_lengkap || row['Nama Lengkap'] || '-');
    const profesi = escapeHtml(row.profesi || row['Profesi'] || '-');
    const unit = escapeHtml(row.unit_kerja || row['Unit Kerja'] || '-');
    const strStatus = row.status_str || row['Status STR'] || '-';
    const sipStatus = row.status_sip || row['Status SIP'] || '-';
    
    const strBadgeClass = strStatus === 'Aktif' ? 'badge-success' : strStatus === 'Expired' ? 'badge-danger' : 'badge-warning';
    const sipBadgeClass = sipStatus === 'Aktif' ? 'badge-success' : sipStatus === 'Expired' ? 'badge-danger' : 'badge-warning';
    
    return `
      <tr>
        <td><strong>${nik}</strong></td>
        <td>${nama}</td>
        <td>${profesi}</td>
        <td>${unit}</td>
        <td><span class="badge ${strBadgeClass}">${strStatus}</span></td>
        <td><span class="badge ${sipBadgeClass}">${sipStatus}</span></td>
        <td>
          ${hasEditAccess ? `
            <button onclick="editProfilRow('${nik}')" class="btn btn-sm btn-outline" style="padding:3px 7px;margin-right:3px;" title="Edit"><i class="fas fa-edit"></i></button>
            <button onclick="deleteProfilRow('${nik}')" class="btn btn-sm btn-danger" style="padding:3px 7px;" title="Hapus"><i class="fas fa-trash"></i></button>
          ` : '<span style="color:#94A3B8;font-size:11px;">View Only</span>'}
        </td>
      </tr>
    `;
  }).join('');
}

/**
 * Refresh profile data from server
 */
async function refreshProfilData() {
  showToast('Memperbarui data profil...', 'info');
  
  try {
    const res = await apiCall('getProfil');
    if (res.success) {
      dataStore.profil = res.data || [];

/**
 * Open edit modal for a profile row
 * @param {string} nik - NIK of profile to edit
 */
function editProfilRow(nik) {
  const row = (profilData || dataStore.profil).find(p => (p.nik || p['NIK']) === nik);
  if (row) showAddProfilModal(row);
}

/**
 * Save profile data (add or update)
 * @param {string|null} originalNik - Original NIK for updates, null for new records
 */
async function saveProfil(originalNik) {
  const data = {
    nik: document.getElementById('pf-nik').value.trim(),
    nama_lengkap: document.getElementById('pf-nama').value.trim(),
    jenis_kelamin: document.getElementById('pf-jk').value,
    profesi: document.getElementById('pf-profesi').value,
    nomor_str: document.getElementById('pf-str').value.trim(),
    status_str: document.getElementById('pf-status-str').value,
    nomor_sip: document.getElementById('pf-sip').value.trim(),
    status_sip: document.getElementById('pf-status-sip').value,
    unit_kerja: document.getElementById('pf-unit').value.trim(),
    alamat_unit: document.getElementById('pf-alamat').value.trim()
  };
  
  // Validation
  if (!data.nik || data.nik.length !== 16) {
    showToast('NIK harus 16 digit', 'error');
    return;
  }
  if (!data.nama_lengkap) {
    showToast('Nama lengkap wajib diisi', 'error');
    return;
  }
  
  // Disable buttons during save
  const btns = document.querySelectorAll('#modal-footer .btn');
  btns.forEach(b => b.disabled = true);
  
  try {
    const res = await apiCall('saveProfil', data);
    
    if (res.success) {
      // Update local data
      if (originalNik) {
        const idx = dataStore.profil.findIndex(p => (p.nik || p['NIK']) === originalNik);
        if (idx >= 0) dataStore.profil[idx] = { ...dataStore.profil[idx], ...data };
      } else {
        dataStore.profil.push(data);
      }
      
      saveToStorage();
      closeModal();
      loadAndRenderProfil();
      showToast(res.message || 'Data berhasil disimpan!', 'success');
    } else {
      showToast(res.error || 'Gagal menyimpan data', 'error');
    }
  } catch (e) {
    showToast('Terjadi kesalahan saat menyimpan', 'error');
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

/**
 * Delete a profile record
 * @param {string} nik - NIK of profile to delete
 */
async function deleteProfilRow(nik) {
  if (!confirm(`Hapus data profil dengan NIK ${nik}?`)) return;
  
  try {
    const res = await apiCall('deleteProfil', { nik });
    
    if (res.success) {
      dataStore.profil = dataStore.profil.filter(p => (p.nik || p['NIK']) !== nik);
      saveToStorage();
      loadAndRenderProfil();
      showToast('Data profil dihapus', 'success');
    } else {
      showToast(res.error || 'Gagal menghapus data', 'error');
    }
  } catch (e) {
    showToast('Terjadi kesalahan', 'error');
  }
}

/**
 * Export profile data as CSV
 */
function exportProfilCSV() {
  const data = filteredData || profilData || dataStore.profil;
  
  if (data.length === 0) {
    showToast('Tidak ada data untuk diekspor', 'warning');
    return;
  }
  
  const headers = ['NIK', 'Nama Lengkap', 'Jenis Kelamin', 'Profesi', 'Nomor STR', 'Status STR', 'Nomor SIP', 'Status SIP', 'Unit Kerja'];
  const rows = data.map(r => [
    r.nik || r['NIK'] || '',
    `"${(r.nama_lengkap || r['Nama Lengkap'] || '').replace(/"/g, '""')}"`,
    r.jenis_kelamin || r['Jenis Kelamin'] || '',
    r.profesi || r['Profesi'] || '',
    r.nomor_str || r['Nomor STR'] || '',
    r.status_str || r['Status STR'] || '',
    r.nomor_sip || r['Nomor SIP'] || '',
    r.status_sip || r['Status SIP'] || '',
    `"${(r.unit_kerja || r['Unit Kerja'] || '').replace(/"/g, '""')}"`
  ]);
  
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  downloadFile(csv, `simantri_profil_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
  showToast('Export CSV berhasil!', 'success');
}

/**
 * Export profile data as PDF
 */
function exportProfilPDF() {
  const data = filteredData || profilData || dataStore.profil;
  
  if (data.length === 0) {
    showToast('Tidak ada data untuk diekspor', 'warning');
    return;
  }
  
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('landscape', 'mm', 'a4');
    
    // Title
    doc.setFontSize(16);
    doc.setTextColor(10, 102, 194);
    doc.text('SIMANTRI - Data Profil SDMK', 14, 15);
    
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text(`Diekspor pada: ${new Date().toLocaleString('id-ID')} | Total: ${data.length} record`, 14, 22);
    
    // Table headers
    doc.setFontSize(8);
    doc.setTextColor(0);
    doc.setFillColor(240, 245, 250);
    
    const cols = ['NIK', 'Nama', 'JK', 'Profesi', 'STR', 'Sts STR', 'SIP', 'Sts SIP', 'Unit Kerja'];
    const colWidths = [25, 45, 12, 35, 25, 18, 25, 18, 55];
    const startX = 14;
    let startY = 30;
    const rowHeight = 7;
    
    // Header row
    let x = startX;
    cols.forEach((col, i) => {
      doc.rect(x, startY, colWidths[i], rowHeight, 'FD');
      doc.text(col, x + 2, startY + 5);
      x += colWidths[i];
    });
    
    // Data rows
    doc.setTextColor(0);
    data.slice(0, 50).forEach((r, idx) => {
      if (startY > 180) {
        doc.addPage();
        startY = 20;
      }
      startY += rowHeight;
      x = startX;
      
      const rowData = [
        r.nik || r['NIK'] || '',
        (r.nama_lengkap || r['Nama Lengkap'] || '').substring(0, 25),
        (r.jenis_kelamin || r['Jenis Kelamin'] || '').substring(0, 2),
        (r.profesi || r['Profesi'] || '').substring(0, 18),
        r.nomor_str || r['Nomor STR'] || '',
        (r.status_str || r['Status STR'] || '').substring(0, 6),
        r.nomor_sip || r['Nomor SIP'] || '',
        (r.status_sip || r['Status SIP'] || '').substring(0, 6),
        (r.unit_kerja || r['Unit Kerja'] || '').substring(0, 30)
      ];
      
      rowData.forEach((cell, i) => {
        doc.rect(x, startY, colWidths[i], rowHeight);
        doc.text(cell, x + 2, startY + 5);
        x += colWidths[i];
      });
    });
    
    doc.save(`simantri_profil_${new Date().toISOString().slice(0,10)}.pdf`);
    showToast('Export PDF berhasil!', 'success');
  } catch (e) {
    console.error('PDF export error:', e);
    showToast('Gagal export PDF. Pastikan library jsPDF terload.', 'error');
  }
}

/**
 * Helper: Trigger file download
 * @param {string} content - File content
 * @param {string} filename - File name
 * @param {string} mimeType - MIME type
 */
function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>

  if (!query || query.length < 2) {
    if (tbody) tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--gray-600);">Minimal 2 karakter untuk pencarian</td></tr>`;

  try {
    // Try API first, fallback to local data

      const nama = (r['Nama Lengkap'] || r.nama_lengkap || '').toLowerCase();

      const unit = (r['Unit Kerja'] || r.unit_kerja || '').toLowerCase();

  if (matches.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${hasAccess ? 6 : 5}" style="text-align:center;padding:30px;color:var(--gray-600);"><i class="fas fa-search" style="font-size:32px;display:block;margin-bottom:10px;"></i>Data tidak ditemukan</td></tr>`;

/**
 * Open edit modal for cek data record
 * @param {string} nik - NIK of record
 * @param {number} index - Record index
 */
function cekDataEditModal(nik, index) {
  // Check access
  if (!isAdminOrOperator()) {
    showToast('Akses ditolak. Hanya admin dan operator yang bisa mengedit.', 'error');
    return;
  }
  
  // Find the full row data from cache
  let row = null;
  const stored = cekDataVervalCache.find(r => (r.NIK || r.nik) === nik);
  if (stored) row = stored;
  
  if (!row) {
    // Fetch from API if not in cache
    apiCall('getVervalByNik', { nik }, 'GET').then(res => {
      if (res.success && res.latest) {
        cekDataShowEditForm(res.latest);
      } else {
        showToast('Data tidak ditemukan', 'error');
      }
    });
    return;
  }
  
  cekDataShowEditForm(row);
}

/**
 * Show edit form for cek data
 * @param {object} data - Record data
 */
function cekDataShowEditForm(data) {
  const fieldDefs = [
    { label: 'Timestamp', id: 'ce-timestamp', type: 'text', value: data['Timestamp'] || data.timestamp || '', ro: true },
    { label: 'NIK', id: 'ce-nik', type: 'text', value: data['NIK'] || data.nik || '', ro: true },
    { label: 'Nama Lengkap', id: 'ce-nama', type: 'text', value: data['Nama Lengkap'] || data.nama_lengkap || '' },
    { label: 'Jenis Kelamin', id: 'ce-jk', type: 'select', value: data['Jenis Kelamin'] || data.jenis_kelamin || 'Laki-laki', opts: ['Laki-laki', 'Perempuan'] },
    { label: 'Tempat Lahir', id: 'ce-tempat-lahir', type: 'text', value: data['Tempat Lahir'] || '' },
    { label: 'Tanggal Lahir', id: 'ce-tgl-lahir', type: 'date', value: data['Tanggal Lahir'] || '' },
    { label: 'Alamat Sesuai KTP', id: 'ce-alamat-ktp', type: 'textarea', value: data['Alamat Sesuai KTP'] || '', full: true },
    { label: 'Nomor STR', id: 'ce-nomor-str', type: 'text', value: data['Nomor STR'] || data.nomor_str || '' },
    { label: 'Status STR', id: 'ce-status-str', type: 'select', value: data['Status STR'] || data.status_str || 'Aktif', opts: ['Aktif', 'Tidak Aktif', 'Expired'] },
    { label: 'Status SIP', id: 'ce-status-sip', type: 'select', value: data['Status SIP'] || data.status_sip || 'Aktif', opts: ['Aktif', 'Proses', 'Expired', 'Tidak Ada'] },
    { label: 'Nomor SIP', id: 'ce-nomor-sip', type: 'text', value: data['Nomor SIP'] || data.nomor_sip || '' },
    { label: 'Masa Berlaku SIP', id: 'ce-masa-sip', type: 'date', value: data['Masa Berlaku SIP'] || '' },
    { label: 'Unit Kerja', id: 'ce-unit-kerja', type: 'text', value: data['Unit Kerja'] || data.unit_kerja || '' },
    { label: 'Alamat Unit Kerja', id: 'ce-alamat-unit', type: 'textarea', value: data['Alamat Unit Kerja'] || '', full: true },
    { label: 'Desa/Kelurahan Unit Kerja', id: 'ce-desa', type: 'text', value: data['Desa Kelurahan Unit Kerja'] || '' },
    { label: 'Status SatuSehat SDMK', id: 'ce-satu-sehat', type: 'select', value: data['Status Unit Praktik di SatuSehat SDMK'] || 'Sudah', opts: ['Sudah', 'Belum'] },
    { label: 'SOP Pelayanan', id: 'ce-sop1', type: 'select', value: data['SOP Pelayanan'] || 'Ada', opts: ['Ada', 'Tidak Ada'] },
    { label: 'SOP Profesi', id: 'ce-sop2', type: 'select', value: data['SOP Profesi'] || 'Ada', opts: ['Ada', 'Tidak Ada'] },
    { label: 'SOP Etika', id: 'ce-sop3', type: 'select', value: data['SOP Etika'] || 'Ada', opts: ['Ada', 'Tidak Ada'] },
    { label: 'SDMK Named', id: 'ce-sdmk-named', type: 'select', value: data['SDMK Named'] || 'Ada', opts: ['Ada', 'Tidak Ada'] },
    { label: 'SDMK Nakes', id: 'ce-sdmk-nakes', type: 'select', value: data['SDMK Nakes'] || 'Ada', opts: ['Ada', 'Tidak Ada'] },
    { label: 'SDMK Admin', id: 'ce-sdmk-admin', type: 'select', value: data['SDMK Admin'] || 'Ada', opts: ['Ada', 'Tidak Ada'] },
    { label: 'Jam Operasional/Praktik', id: 'ce-jam', type: 'text', value: data['Jam Operasional Praktik'] || '' },
    { label: 'Pendidikan Sesuai STR', id: 'ce-pendidikan', type: 'text', value: data['Pendidikan Sesuai STR'] || '', full: true },
    { label: 'Catatan Rekomendasi', id: 'ce-catatan', type: 'textarea', value: data['Catatan Rekomendasi'] || '', full: true }
  ];
  
  let html = `<div class="modal-verval-grid">`;
  fieldDefs.forEach(f => {
    const span = f.full ? ' style="grid-column:1/-1;"' : '';
    html += `<div class="modal-verval-field"${span}><label>${f.label}</label>`;
    if (f.type === 'select') {
      html += `<select id="${f.id}">${(f.opts || []).map(o => `<option ${o === f.value ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
    } else if (f.type === 'textarea') {
      html += `<textarea id="${f.id}" rows="2" ${f.ro ? 'readonly class="readonly"' : ''}>${escapeHtml(f.value)}</textarea>`;
    } else {
      html += `<input type="${f.type === 'date' ? 'date' : 'text'}" id="${f.id}" value="${escapeHtml(f.value)}" ${f.ro ? 'readonly class="readonly"' : ''}>`;
    }
    html += `</div>`;
  });
  html += `<input type="hidden" id="ce-original-nik" value="${escapeHtml(data.NIK || data.nik || '')}">`;
  html += `<input type="hidden" id="ce-original-row" value="${data._row || ''}">`;
  html += `</div>`;
  
  document.getElementById('modal-backdrop').classList.add('modal-large');
  
  showModal('Edit Data Verval Izin Praktik', html, null, `
    <button onclick="closeModal()" class="btn btn-outline">Batal</button>
    <button onclick="cekDataSaveEdit()" class="btn btn-primary"><i class="fas fa-save"></i> Simpan Perubahan</button>
  `);
}

/**
 * Save edited cek data
 */
async function cekDataSaveEdit() {
  const originalNik = document.getElementById('ce-original-nik').value;
  
  const payload = {
    nik: originalNik,
    username: currentUser?.username || 'admin',
    'Nama Lengkap': document.getElementById('ce-nama').value,
    'Jenis Kelamin': document.getElementById('ce-jk').value,
    'Tempat Lahir': document.getElementById('ce-tempat-lahir').value,
    'Tanggal Lahir': document.getElementById('ce-tgl-lahir').value,
    'Alamat Sesuai KTP': document.getElementById('ce-alamat-ktp').value,
    'Nomor STR': document.getElementById('ce-nomor-str').value,
    'Status STR': document.getElementById('ce-status-str').value,
    'Status SIP': document.getElementById('ce-status-sip').value,
    'Nomor SIP': document.getElementById('ce-nomor-sip').value,
    'Masa Berlaku SIP': document.getElementById('ce-masa-sip').value,
    'Unit Kerja': document.getElementById('ce-unit-kerja').value,
    'Alamat Unit Kerja': document.getElementById('ce-alamat-unit').value,
    'Desa Kelurahan Unit Kerja': document.getElementById('ce-desa').value,
    'Status Unit Praktik di SatuSehat SDMK': document.getElementById('ce-satu-sehat').value,
    'SOP Pelayanan': document.getElementById('ce-sop1').value,
    'SOP Profesi': document.getElementById('ce-sop2').value,
    'SOP Etika': document.getElementById('ce-sop3').value,
    'SDMK Named': document.getElementById('ce-sdmk-named').value,
    'SDMK Nakes': document.getElementById('ce-sdmk-nakes').value,
    'SDMK Admin': document.getElementById('ce-sdmk-admin').value,
    'Jam Operasional Praktik': document.getElementById('ce-jam').value,
    'Pendidikan Sesuai STR': document.getElementById('ce-pendidikan').value,
    'Catatan Rekomendasi': document.getElementById('ce-catatan').value
  };
  
  const btns = document.querySelectorAll('#modal-footer .btn');
  btns.forEach(b => b.disabled = true);
  
  try {
    const res = await apiCall('updateVervalByNik', payload, 'POST');
    
    btns.forEach(b => b.disabled = false);
    
    if (res.success) {
      showToast('Data verval berhasil diperbarui!', 'success');
      closeModal();
      
      // Re-trigger search to refresh view
      const nama = document.getElementById('cek-data-nama')?.value;
      if (nama && nama.length >= 2) cekDataSearchFull(nama);
    } else {
      showToast(res.error || 'Gagal memperbarui data', 'error');
    }
  } catch (e) {
    btns.forEach(b => b.disabled = false);
    showToast('Gagal menyimpan perubahan', 'error');
  }
}
</script>

<!-- ============================================
     JAVASCRIPT - PENGUMUMAN PAGE
     ============================================ -->
<script>
// ============================================================
// PENGUMUMAN (ANNOUNCEMENTS) PAGE
// ============================================================

/**
 * Render Pengumuman page
 * @param {HTMLElement} container - Container element
 */
function renderPengumumanPage(container) {
  const hasAccess = isAdmin();
  
  container.innerHTML = `
    <div class="main-header">
      <div>
        <h1><i class="fas fa-bullhorn" style="color:var(--blue);margin-right:10px;"></i>Pengumuman</h1>
        <p style="color:var(--gray-600);font-size:14px;margin-top:4px;">Informasi dan pengumuman terkait izin praktik</p>
      </div>
    </div>

    <div class="card" style="padding:18px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="search-box" style="min-width:250px;">
          <i class="fas fa-search"></i>
          <input type="text" id="search-pengumuman" placeholder="Cari pengumuman..." onkeyup="loadPengumumanList()">
        </div>
        
        ${hasAccess ? `
          <button onclick="showAddPengumumanModal()" class="btn btn-sm btn-primary">
            <i class="fas fa-plus"></i> Tambah
          </button>
        ` : ''}
      </div>
      
      <div id="pengumuman-list"></div>
    </div>
  `;
  
  // Load announcements
  loadPengumumanList();
}

/**
 * Load and render announcement list
 */
async function loadPengumumanList() {
  try {
    if (USE_GAS) {
      const res = await apiCall('getPengumuman');
      if (res.success) {
        dataStore.pengumuman = res.data || [];
        pengumumanData = [...dataStore.pengumuman];
      }
    } else {
      pengumumanData = [...dataStore.pengumuman];
    }
    
    renderPengumumanItems();
  } catch (e) {
    console.error('Error loading pengumuman:', e);
    renderPengumumanItems();
  }
}

/**
 * Render announcement items with search filter
 */
function renderPengumumanItems(filtered) {
  const listEl = document.getElementById('pengumuman-list');
  if (!listEl) return;
  
  const hasAccess = isAdmin();
  const searchTerm = (document.getElementById('search-pengumuman')?.value || '').toLowerCase();
  let items = filtered || pengumumanData;
  
  // Apply search filter
  if (searchTerm && !filtered) {
    items = items.filter(p => 
      (p.judul || '').toLowerCase().includes(searchTerm) ||
      (p.isi || '').toLowerCase().includes(searchTerm)
    );
  }
  
  if (!items || items.length === 0) {
    listEl.innerHTML = '<div class="card" style="padding:40px;text-align:center;color:#64748B;"><i class="fas fa-bullhorn" style="font-size:40px;display:block;margin-bottom:12px;opacity:0.3;"></i>Belum ada pengumuman.</div>';
    return;
  }
  
  listEl.innerHTML = items.map(item => {
    const id = item.id || '';
    const isPenting = item.is_penting == 1;
    const tanggal = formatDate(item.tanggal);
    
    return `
      <div class="card" style="margin-bottom:14px;padding:18px;border-left:4px solid ${isPenting ? '#ef4444' : 'var(--blue)'};">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:10px;">
          <div>
            <h3 style="font-size:16px;font-weight:700;color:var(--gray-800);margin-bottom:4px;">
              ${escapeHtml(item.judul)}
              ${isPenting ? '<span class="badge badge-danger" style="margin-left:8px;">PENTING</span>' : ''}
            </h3>
            <span style="font-size:12px;color:var(--gray-600);"><i class="far fa-calendar"></i> ${tanggal}</span>
          </div>
          
          ${hasAccess ? `
            <div style="display:flex;gap:6px;">
              <button onclick="editPengumuman('${id}')" class="btn btn-sm btn-outline">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button onclick="deletePengumuman('${id}')" class="btn btn-sm btn-danger">
                <i class="fas fa-trash"></i> Hapus
              </button>
            </div>
          ` : ''}
        </div>
        
        <p style="color:var(--gray-700);line-height:1.6;font-size:14px;">${escapeHtml(item.isi)}</p>
        
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--gray-100);font-size:11px;color:var(--gray-500);">
          Oleh: ${escapeHtml(item.created_by || '-')}
        </div>
      </div>
    `;
  }).join('');
}

/**
 * Show add/edit pengumuman modal
 * @param {object|null} editItem - Item to edit, null for new
 */
function showAddPengumumanModal(editItem = null) {
  const isEdit = !!editItem;
  const title = isEdit ? 'Edit Pengumuman' : 'Tambah Pengumuman Baru';
  const today = new Date().toISOString().split('T')[0];
  
  const body = `
    <div class="form-group">
      <label>Tanggal</label>
      <input type="date" id="pg-tanggal" value="${isEdit ? (editItem?.tanggal || '') : today}">
    </div>
    <div class="form-group">
      <label>Judul Pengumuman <span style="color:red">*</span></label>
      <input type="text" id="pg-judul" value="${isEdit ? escapeHtml(editItem?.judul || '') : ''}" placeholder="Judul pengumuman" required>
    </div>
    <div class="form-group">
      <label>Isi Pengumuman <span style="color:red">*</span></label>
      <textarea id="pg-isi" rows="5" placeholder="Tulis isi pengumuman di sini..." required>${isEdit ? escapeHtml(editItem?.isi || '') : ''}</textarea>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="pg-penting" ${isEdit && editItem?.is_penting ? 'checked' : ''} style="width:18px;height:18px;">
        Tandai sebagai Pengumuman Penting
      </label>
    </div>
  `;
  
  const footer = `
    <button onclick="closeModal()" class="btn btn-outline">Batal</button>
    <button onclick="savePengumuman('${isEdit ? editItem?.id : ''}')" class="btn btn-primary">${isEdit ? 'Simpan Perubahan' : 'Publikasikan'}</button>
  `;
  
  showModal(title, body, null, footer);
}

/**
 * Save pengumuman (add or update)
 * @param {string} existingId - Existing ID for updates
 */
async function savePengumuman(existingId) {
  const tanggal = document.getElementById('pg-tanggal').value;
  const judul = document.getElementById('pg-judul').value.trim();
  const isi = document.getElementById('pg-isi').value.trim();
  const isPenting = document.getElementById('pg-penting').checked;
  
  if (!judul || !isi) {
    showToast('Judul dan isi wajib diisi', 'error');
    return;
  }
  
  const btns = document.querySelectorAll('#modal-footer .btn');
  btns.forEach(b => b.disabled = true);
  
  try {
    let res;
    
    if (existingId) {
      // Update existing
      res = await apiCall('updatePengumuman', { id: existingId, judul, isi, is_penting: isPenting ? 1 : 0 });
    } else {
      // Add new
      res = await apiCall('addPengumuman', { tanggal, judul, isi, is_penting: isPenting ? 1 : 0 });
    }
    
    if (res.success) {
      closeModal();
      
      // Refresh local data
      if (USE_GAS) {
        const refreshRes = await apiCall('getPengumuman');
        if (refreshRes.success) {
          dataStore.pengumuman = refreshRes.data || [];
          pengumumanData = [...dataStore.pengumuman];
        }
      }
      
      saveToStorage();
      loadPengumumanList();
      showToast(existingId ? 'Pengumuman diperbarui!' : 'Pengumuman dipublikasikan!', 'success');
    } else {
      showToast(res.error || 'Gagal menyimpan pengumuman', 'error');
    }
  } catch (e) {
    showToast('Terjadi kesalahan', 'error');
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

/**
 * Open edit modal for pengumuman
 * @param {string} id - Pengumuman ID
 */
function editPengumuman(id) {
  const item = dataStore.pengumuman.find(p => p.id === id);
  if (item) showAddPengumumanModal(item);
}

/**
 * Delete pengumuman
 * @param {string} id - Pengumuman ID
 */
async function deletePengumuman(id) {
  if (!confirm('Hapus pengumuman ini?')) return;
  
  try {
    const res = await apiCall('deletePengumuman', { id });
    
    if (res.success) {
      dataStore.pengumuman = dataStore.pengumuman.filter(p => p.id !== id);
      saveToStorage();
      loadPengumumanList();
      showToast('Pengumuman dihapus', 'success');
    } else {
      showToast(res.error || 'Gagal menghapus', 'error');
    }
  } catch (e) {
    showToast('Terjadi kesalahan', 'error');
  }
}
</script>

/**
 * Execute CSV import
 */
function doImportCSV() {
  const fileInput = document.getElementById('import-file');
  const target = document.getElementById('import-target').value;
  
  if (!fileInput.files.length) {
    showToast('Pilih file CSV terlebih dahulu', 'error');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const lines = text.trim().split(/\r?\n/);
      
      if (lines.length < 2) {
        showToast('CSV kosong atau tidak valid', 'error');
        return;
      }
      
      // Parse CSV
      const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
      const rows = lines.slice(1).map(line => {
        const vals = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
        const obj = {};
        headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/"/g, '').trim());
        return obj;
      }).filter(row => Object.values(row).some(v => v));
      
      // Import to appropriate store
      if (target === 'profil') {
        dataStore.profil.push(...rows.map(r => ({ ...r, no: dataStore.profil.length + 1 })));
      } else if (target === 'izin') {
        dataStore.izin.unshift(...rows);
      } else if (target === 'pengumuman') {
        dataStore.pengumuman.unshift(...rows);
      }
      
      saveToStorage();
      closeModal();
      showToast(`${rows.length} baris berhasil diimport ke ${target}`, 'success');
      
      // Navigate to imported section
      if (target === 'profil') navigateTo('profil');
      else if (target === 'izin') navigateTo('cek');
      else navigateTo('pengumuman');
      
    } catch (err) {
      console.error('Import error:', err);
      showToast('Gagal membaca file CSV', 'error');
    }
  };
  
  reader.onerror = () => showToast('Gagal membaca file', 'error');
  reader.readAsText(fileInput.files[0]);
}

/**

 */
function filterAdminVerval() {
  const search = (document.getElementById('admin-verval-search')?.value || '').toLowerCase();
  const statusFilter = document.getElementById('admin-verval-filter')?.value || '';
  
  let filtered = (dataVervalFasyankes || []).filter(row => {
    const matchSearch = !search || 
      (row.NIK || row.nik || '').toLowerCase().includes(search) ||
      (row['Nama Lengkap'] || row.nama_lengkap || '').toLowerCase().includes(search) ||
      (row['Unit Kerja'] || row.unit_kerja || '').toLowerCase().includes(search);
    
    const matchStatus = !statusFilter || (row['Status SIP'] || row.status_sip || '') === statusFilter;
    
    return matchSearch && matchStatus;
  });
  
  renderAdminVervalRows(filtered);
}

    username: currentUser?.username || 'system'
  };
  
  const btns = document.querySelectorAll('#modal-footer .btn');
  btns.forEach(b => b.disabled = true);
  
  try {
    let res;
    
    if (USE_GAS) {
      res = await apiCall('updateVervalFasyankes', payload, 'POST');
    } else {
      // Local update
      const idx = dataVervalFasyankes.findIndex(r => (r['ID'] || r.id) === id);
      if (idx >= 0) {
        Object.keys(payload).forEach(k => {
          if (k !== 'ID' && k !== '_row' && k !== 'username') {
            dataVervalFasyankes[idx][k] = payload[k];
          }
        });
        res = { success: true };
      } else {
        res = { success: false, error: 'Not found' };
      }
    }
    
    btns.forEach(b => b.disabled = false);
    
    if (res.success) {
      closeModal();
      loadAdminVervalTable();
      showToast('Data verval diperbarui!', 'success');
    } else {
      showToast(res.error || 'Gagal memperbarui', 'error');
    }
  } catch (e) {
    btns.forEach(b => b.disabled = false);
    showToast('Terjadi kesalahan', 'error');
  }
}

/**
 * Export verval data as CSV
 */
function exportVervalCSV() {
  if (!isAdminOrOperator()) {
    showToast('Akses ditolak', 'error');
    return;
  }
  
  const data = dataVervalFasyankes || [];
  
  if (data.length === 0) {
    showToast('Tidak ada data untuk diekspor', 'warning');
    return;
  }
  
  // Get all unique keys from data
  const allKeys = new Set();
  data.forEach(row => Object.keys(row).forEach(k => allKeys.add(k)));
  const headers = Array.from(allKeys);
  
  const csvRows = data.map(row => {
    return headers.map(h => {
      let val = row[h] || '';
      val = String(val).replace(/"/g, '""');
      if (val.includes(',') || val.includes('"') || val.includes('\n')) {
        val = `"${val}"`;
      }
      return val;
    }).join(',');
  });
  
  const csv = [headers.join(','), ...csvRows].join('\n');
  downloadFile(csv, `simantri_verval_${new Date().toISOString().slice(0, 10)}.csv`, 'text/csv');
  showToast('Export CSV verval berhasil!', 'success');
}

    return;
  }
  
  const data = dataVervalFasyankes || [];
  
  if (data.length === 0) {
    showToast('Tidak ada data untuk diekspor', 'warning');
    return;
  }
  
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('landscape', 'mm', 'a4');
    
    // Title
    doc.setFontSize(16);
    doc.setTextColor(10, 102, 194);
    doc.text('SIMANTRI - Data Verval Izin Praktik', 14, 15);
    
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text(`Diekspor: ${new Date().toLocaleString('id-ID')} | Total: ${data.length} record`, 14, 22);
    
    // Table setup
    doc.setFontSize(8);
    doc.setTextColor(0);
    
    const cols = ['NIK', 'Nama', 'Unit Kerja', 'Status SIP', 'Status STR', 'Verifikator'];
    const colWidths = [30, 50, 60, 25, 25, 35];
    const startX = 14;
    let startY = 30;
    const rowHeight = 7;
    
    // Header
    let x = startX;
    cols.forEach((col, i) => {
      doc.setFillColor(240, 245, 250);
      doc.rect(x, startY, colWidths[i], rowHeight, 'FD');
      doc.text(col, x + 2, startY + 5);
      x += colWidths[i];
    });
    
    // Data rows
    data.slice(0, 40).forEach((r, idx) => {
      if (startY > 180) {
        doc.addPage();
        startY = 20;
      }
      startY += rowHeight;
      x = startX;
      
      const rowData = [
        (r.NIK || r.nik || '').substring(0, 15),
        (r['Nama Lengkap'] || r.nama_lengkap || '').substring(0, 25),
        (r['Unit Kerja'] || r.unit_kerja || '').substring(0, 32),
        (r['Status SIP'] || r.status_sip || '').substring(0, 10),
        (r['Status STR'] || r.status_str || '').substring(0, 10),
        (r.Verifikator || '').substring(0, 16)
      ];
      
      rowData.forEach((cell, i) => {
        doc.rect(x, startY, colWidths[i], rowHeight);
        doc.text(cell, x + 2, startY + 5);
        x += colWidths[i];
      });
    });
    
    doc.save(`simantri_verval_${new Date().toISOString().slice(0, 10)}.pdf`);
    showToast('Export PDF verval berhasil!', 'success');
  } catch (e) {
    console.error('PDF export error:', e);
    showToast('Gagal export PDF', 'error');
  }
}
</script>

<!-- ============================================
     JAVASCRIPT - MODAL SYSTEM
     ============================================ -->
<script>
// ============================================================
// MODAL FUNCTIONS
// ============================================================

/**
 * Show modal dialog
 * @param {string} title - Modal title
 * @param {string} bodyHTML - Modal body HTML
 * @param {Function|null} onConfirm - Confirm callback
 * @param {string} footerHTML - Custom footer HTML
 */
function showModal(title, bodyHTML, onConfirm = null, footerHTML = '') {
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = footerHTML || (onConfirm ? 
    `<button onclick="closeModal()" class="btn btn-outline">Batal</button>
     <button onclick="onConfirm();closeModal()" class="btn btn-primary">Konfirmasi</button>` : '');
  document.getElementById('modal-backdrop').style.display = 'flex';
}

/**
 * Close modal dialog
 */
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('modal-large');
  document.getElementById('modal-backdrop').style.display = 'none';
}
</script>

<!-- ============================================
     JAVASCRIPT - APPLICATION INITIALIZATION
     ============================================ -->
<script>
// ============================================================
// APP INITIALIZATION
// ============================================================

/**
 * Initialize the SIMANTRI application
 */
function initApp() {
  showLoading(true);
  
  // Load saved data from localStorage
  loadFromStorage();
  
  // Seed demo data if empty
  if (!dataStore.verval || dataStore.verval.length === 0) {
    seedDemoData();
  }
  
  // Check for existing session
  checkSession();
  
  // Update connection badge
  const badge = document.getElementById('connection-badge');
  const connText = document.getElementById('conn-text');
  
  if (USE_GAS) {
    badge.style.background = '#DCFCE7';
    badge.style.color = '#166534';
    connText.innerHTML = '<i class="fas fa-circle" style="font-size:8px;margin-right:4px;"></i>TERHUBUNG';
    badge.title = 'Data tersinkron dengan Google Sheet';
  } else {
    connText.innerHTML = '<i class="fas fa-circle" style="font-size:8px;margin-right:4px;"></i>DEMO MODE';
    badge.title = 'Menggunakan data lokal';
  }
  
  // Initialize after short delay for smooth loading
  setTimeout(() => {
    showLoading(false);
    
    // Navigate to dashboard
    navigateTo('dashboard');
    
    // Warm up connection with ping
    if (USE_GAS) {
      apiCall('ping').catch(err => {
        console.warn('[SIMANTRI] Ping failed (this is normal if CORS is blocked):', err.message);
      });
    }
    
    // Keyboard shortcut: focus search on "/" keypress
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.tagName === 'BODY') {
        e.preventDefault();
        const search = document.getElementById('search-profil') || 
                        document.getElementById('search-pengumuman') ||
                        document.getElementById('cek-data-nama');
        if (search) search.focus();
      }
      
      // ESC to close modal
      if (e.key === 'Escape') {
        const modal = document.getElementById('modal-backdrop');
        if (modal.style.display === 'flex') {
          closeModal();
        }
      }
    });
    
    // Show welcome toast once per session
    if (!localStorage.getItem('simantri_welcomed')) {
      setTimeout(() => {
        showToast('Selamat datang di SIMANTRI Enterprise Dashboard! Gunakan / untuk pencarian cepat.', 'info');
        localStorage.setItem('simantri_welcomed', '1');
      }, 1600);
    }
    
    // Handle window resize for mobile menu
    window.addEventListener('resize', () => {
      const mobileBtn = document.getElementById('mobile-menu-btn');
      if (mobileBtn) {
        mobileBtn.style.display = window.innerWidth < 900 ? 'block' : 'none';
      }
    });
    
  }, 850);
  
  // Show mobile menu button on small screens initially
  if (window.innerWidth < 900) {
    document.getElementById('mobile-menu-btn').style.display = 'block';
  }
  
  // Global error handler
  window.onerror = function(msg, src, line, col, error) {
    console.error('[SIMANTRI] Error:', msg, '\nAt:', src, ':', line);
    return false;
  };
}

// ============================================================
// BOOT APPLICATION
// ============================================================

// Start app when DOM is ready
document.addEventListener('DOMContentLoaded', initApp);

// Expose useful functions for debugging
window.SIMANTRI = {
  version: '2.0.0-cleaned',
  dataStore,
  navigateTo,
  apiCall,
  currentUser: () => currentUser,
  isAdmin: isAdmin,
  isAdminOrOperator: isAdminOrOperator,
  refreshAllData
};

console.log('%c🏥 SIMANTRI v2.0', 'font-size:24px;font-weight:bold;color:#0A66C2;');
console.log('%cPlatform Digital Pengelolaan Izin Praktik', 'font-size:12px;color:#64748B;');
console.log('%c⚠️ Jangan paste kode di sini kecuali Anda tahu apa yang Anda lakukan!', 'font-size:11px;color:#f59e0b;');
</script>
