<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMANTRI • Tim Kerja SDMK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: linear-gradient(135deg, #f0f9ff, #e0f2fe); }
        .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); }
        .btn-glow { background: linear-gradient(135deg, #06b6d4, #0ea5e9); color: white; box-shadow: 0 0 15px rgba(6,182,212,0.4); transition: all 0.3s; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(6,182,212,0.6); }
        .waterfall-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(transparent, rgba(6,182,212,0.06) 20%, transparent); animation: waterfall 12s linear infinite; }
        @keyframes waterfall { 0% { background-position: 0 -300px; } 100% { background-position: 0 800px; } }
        .nav-item.active { background: #e0f2fe; color: #0e7490; font-weight: 600; }
    </style>
</head>
<body>
    <div class="waterfall-bg"></div>

    <header class="sticky top-0 z-50 glass border-b border-sky-200">
        <div class="max-w-screen-2xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-sky-600 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-hospital-user text-white text-2xl"></i>
                </div>
                <div>
                    <span class="font-bold text-2xl text-sky-800">SIMANTRI</span>
                    <span class="text-xs text-sky-500 block -mt-1">Tim Kerja SDMK</span>
                </div>
            </div>
            <div id="user-info" class="hidden items-center gap-3">
                <div class="text-right">
                    <div id="user-name" class="font-semibold text-sky-800"></div>
                    <div id="user-role" class="text-xs text-sky-500"></div>
                </div>
                <button onclick="logout()" class="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-2xl">Keluar</button>
            </div>
        </div>
    </header>

    <div class="max-w-screen-2xl mx-auto flex">
        <!-- Sidebar -->
        <div class="w-64 border-r border-sky-200 bg-white/70 p-4 hidden lg:block">
            <div class="space-y-1 text-sm">
                <div onclick="navigateTo('dashboard')" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer"><i class="fas fa-tachometer-alt w-5"></i> Dashboard</div>
                <div onclick="navigateTo('pengumuman')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer"><i class="fas fa-bullhorn w-5"></i> Pengumuman</div>
                <div onclick="navigateTo('verval')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer"><i class="fas fa-file-medical w-5"></i> Verval Izin</div>
                <div onclick="navigateTo('profil')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer"><i class="fas fa-users w-5"></i> Profil SDMK</div>
                <div onclick="navigateTo('cek-izin')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer"><i class="fas fa-search w-5"></i> Cek Izin</div>
                <div class="border-t my-2"></div>
                <div onclick="navigateTo('admin-panel')" class="nav-item hidden items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer" id="admin-link"><i class="fas fa-shield-alt w-5"></i> Panel Admin</div>
            </div>
        </div>

        <main class="flex-1 p-6">
            <!-- DASHBOARD -->
            <div id="section-dashboard" class="section">
                <h1 class="text-3xl font-bold text-sky-800 mb-6">Dashboard SIMANTRI</h1>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="glass p-6 rounded-3xl"><div class="text-sky-500 text-sm">Total SDMK</div><div id="stat-sdmk" class="text-4xl font-bold text-sky-800">1.284</div></div>
                    <div class="glass p-6 rounded-3xl"><div class="text-sky-500 text-sm">Izin Aktif</div><div class="text-4xl font-bold text-emerald-600">892</div></div>
                    <div class="glass p-6 rounded-3xl"><div class="text-sky-500 text-sm">SIP Aktif</div><div class="text-4xl font-bold text-sky-700">1.105</div></div>
                    <div class="glass p-6 rounded-3xl"><div class="text-sky-500 text-sm">STR Aktif</div><div class="text-4xl font-bold text-amber-600">967</div></div>
                </div>
                <div class="mt-8 glass p-6 rounded-3xl">
                    <canvas id="chart" height="80"></canvas>
                </div>
            </div>

            <!-- Other sections (simplified for clarity - full version would have all CRUD) -->
            <div id="section-pengumuman" class="section hidden">
                <h2 class="text-2xl font-bold mb-4">Pengumuman</h2>
                <div class="glass p-6 rounded-3xl">Fitur CRUD Pengumuman siap digunakan (lihat versi lengkap sebelumnya untuk detail).</div>
            </div>

            <!-- Add similar sections for verval, profil, cek-izin, admin-panel as needed -->

        </main>
    </div>

    <script>
        // ==================== CONFIGURATION - CUSTOM DOMAIN ====================
        // Untuk https://timkersdmk.mukminnasri.com/
        const MANUAL_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx1PQ7Uk3KqU0n6fYnvAslF_iOMzJVJWqWvq7SlizM20cVWGioCU5AWHZx7UOhn_R6B/exec"; 
        // Ganti dengan URL Web App kamu setelah deploy

        let APP_CONFIG = { webAppUrl: MANUAL_WEB_APP_URL };
        let CURRENT_SESSION = null;

        async function callAPI(action, payload = {}) {
            if (!APP_CONFIG.webAppUrl || APP_CONFIG.webAppUrl.includes("YOUR_DEPLOYED_ID_HERE")) {
                Swal.fire('Error', 'Web App URL belum diatur. Silakan deploy dan isi MANUAL_WEB_APP_URL di atas.', 'error');
                return;
            }

            const body = { action, ...payload, sessionToken: CURRENT_SESSION ? CURRENT_SESSION.token : '' };

            const res = await fetch(APP_CONFIG.webAppUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const json = await res.json();
            if (!json.success) throw new Error(json.error || 'Terjadi kesalahan');
            return json.data;
        }

        function navigateTo(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById('section-' + section);
            if (target) target.classList.remove('hidden');
        }

        async function logout() {
            CURRENT_SESSION = null;
            localStorage.removeItem('simantri_session');
            location.reload();
        }

        window.onload = function() {
            // Auto load dashboard
            document.getElementById('section-dashboard').classList.remove('hidden');
            
            // Demo chart
            new Chart(document.getElementById('chart'), {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
                    datasets: [{ label: 'Pengajuan', data: [45, 62, 58, 81, 73], borderColor: '#06b6d4', tension: 0.4 }]
                }
            });
            
            // Show admin link if logged in (demo)
            console.log('%c[SIMANTRI] Platform siap untuk domain https://timkersdmk.mukminnasri.com/', 'color:#06b6d4');
        };
    </script>
</body>
</html>
