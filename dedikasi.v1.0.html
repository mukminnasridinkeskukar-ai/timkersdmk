<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEDIKASI - Pengabdian Masyarakat SDM Kesehatan</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* --- CSS VARIABLES & RESET --- */
    :root {
      --primary: #0ea5e9; /* Sky Blue */
      --primary-dark: #0284c7;
      --secondary: #6366f1; /* Indigo */
      --accent: #10b981; /* Emerald */
      --danger: #ef4444;
      --dark: #0f172a;
      --light: #f8fafc;
      --glass: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.5);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --sidebar-width: 260px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      background-color: #f1f5f9;
      color: #334155;
      overflow-x: hidden;
    }

    /* --- LAYOUT UTILITIES --- */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-2 { gap: 0.5rem; }
    .gap-4 { gap: 1rem; }
    .p-4 { padding: 1rem; }
    .p-6 { padding: 1.5rem; }
    .p-8 { padding: 2rem; }
    .mt-4 { margin-top: 1rem; }
    .mb-4 { margin-bottom: 1rem; }
    .w-full { width: 100%; }
    .h-screen { height: 100vh; }
    .grid { display: grid; }
    .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
    .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .hidden { display: none !important; }

    @media (min-width: 768px) {
      .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .md\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .md\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .md\:flex-row { flex-direction: row; }
    }

    /* --- GLASSMORPHISM & CARDS --- */
    .glass-panel {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 1rem;
      box-shadow: var(--shadow);
    }

    .card {
      background: white;
      border-radius: 0.75rem;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    /* --- BUTTONS --- */
    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--secondary); color: white; }
    .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }

    /* --- FORMS --- */
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; }
    .form-input, .form-select {
      width: 100%;
      padding: 0.625rem;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: var(--sidebar-width);
      background: linear-gradient(180deg, var(--dark) 0%, #1e293b 100%);
      color: white;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 50;
      transition: transform 0.3s ease;
    }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .nav-link {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.5rem;
      color: #94a3b8;
      text-decoration: none;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(255,255,255,0.05);
      color: white;
      border-left-color: var(--primary);
    }
    .nav-link i { width: 24px; margin-right: 0.75rem; }

    .main-content {
      margin-left: var(--sidebar-width);
      padding: 2rem;
      min-height: 100vh;
      transition: margin-left 0.3s ease;
    }

    /* --- MOBILE TOGGLE --- */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 60;
      background: var(--dark);
      color: white;
      padding: 0.5rem;
      border-radius: 0.5rem;
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 1rem; padding-top: 4rem; }
      .mobile-toggle { display: block; }
      .grid-cols-3, .grid-cols-4 { grid-template-columns: 1fr; }
    }

    /* --- TABLES --- */
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background-color: #f8fafc; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:hover { background-color: #f1f5f9; }
    
    .badge { padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef9c3; color: #854d0e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #e0f2fe; color: #075985; }

    /* --- ANIMATIONS & LOADERS --- */
    .loader-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; justify-content: center; align-items: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* --- TOAST --- */
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 99; }
    .toast {
      background: white; padding: 1rem; border-radius: 0.5rem;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      margin-top: 0.5rem; display: flex; align-items: center; gap: 0.75rem;
      animation: slideIn 0.3s ease-out; border-left: 4px solid var(--primary);
      max-width: 300px;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* --- HERO SECTION --- */
    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border-radius: 1rem;
      padding: 3rem 2rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      animation: pulse 10s infinite;
    }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    /* --- MODAL --- */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 90;
      display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: white; width: 90%; max-width: 600px;
      border-radius: 1rem; padding: 2rem;
      transform: translateY(20px); transition: transform 0.3s;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-overlay.active .modal-content { transform: translateY(0); }

    /* --- ADMIN SPECIFIC --- */
    .stat-card { display: flex; align-items: center; gap: 1rem; }
    .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: white;
    }
    .bg-blue { background: var(--primary); }
    .bg-green { background: var(--accent); }
    .bg-purple { background: var(--secondary); }
    .bg-orange { background: #f97316; }

  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loader" class="loader-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Mobile Toggle -->
  <button class="mobile-toggle" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header flex items-center gap-2">
      <i class="fas fa-heartbeat fa-2x" style="color: var(--primary);"></i>
      <div>
        <div style="font-weight:800;font-size:22px;letter-spacing:-1px;">DEDIKASI</div>
        <div style="font-size:10px;color:#64748b;">Kementerian Kesehatan RI</div>
      </div>
      <div style="margin-left:12px;background:#e0f2fe;color:#0369a1;padding:2px 10px;border-radius:9999px;font-size:10px;font-weight:600;">
        <a href="https://script.google.com/macros/s/AKfycbxQAJfn1a2ycyDiEXA8ltg55WDwYRbaBWC0_Gwxc6Sr5jZ5SYh3OtGpWsA9iogz21s7/exec" target="_blank" style="color:inherit;text-decoration:none;">Web App URL</a>
      </div>
    </div>
    
    <div class="mt-4">
      <!-- Public Menu -->
      <div id="public-menu">
        <a href="#" class="nav-link active" onclick="navigate('dashboard')"><i class="fas fa-home"></i> Dashboard</a>
        <a href="#" class="nav-link" onclick="navigate('pengumuman')"><i class="fas fa-bullhorn"></i> Pengumuman</a>
        <a href="#" class="nav-link" onclick="navigate('jadwal')"><i class="fas fa-calendar-alt"></i> Jadwal Kegiatan</a>
        <a href="#" class="nav-link" onclick="navigate('pendaftaran')"><i class="fas fa-user-plus"></i> Pendaftaran</a>
        <a href="#" class="nav-link" onclick="navigate('status')"><i class="fas fa-search"></i> Cek Status</a>
        <a href="#" class="nav-link" onclick="navigate('kontak')"><i class="fas fa-address-book"></i> Kontak PIC</a>
      </div>

      <!-- Admin Menu (Hidden by default) -->
      <div id="admin-menu" class="hidden">
        <div class="px-6 py-2 text-xs font-bold text-gray-500 uppercase">Admin Panel</div>
        <a href="#" class="nav-link" onclick="navigate('admin-dashboard')"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="#" class="nav-link" onclick="navigate('admin-kegiatan')"><i class="fas fa-tasks"></i> Manajemen Kegiatan</a>
        <a href="#" class="nav-link" onclick="navigate('admin-peserta')"><i class="fas fa-users"></i> Manajemen Peserta</a>
        <a href="#" class="nav-link" onclick="navigate('admin-pengumuman')"><i class="fas fa-newspaper"></i> Manajemen Info</a>
        <a href="#" class="nav-link" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
      
      <div class="mt-8 px-6">
        <button id="btn-login-admin" class="btn btn-outline w-full text-sm" onclick="showLoginModal()">Login Admin</button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    
    <!-- Header Running Text -->
    <div class="glass-panel mb-4 p-2 overflow-hidden whitespace-nowrap relative">
      <div class="inline-block animate-marquee" id="running-text">
        Memuat pengumuman...
      </div>
    </div>

    <!-- DYNAMIC CONTENT AREA -->
    <div id="app">
      <!-- Content will be injected here via JavaScript -->
    </div>

  </main>

  <!-- Login Modal -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold">Login Admin</h3>
        <button onclick="closeModal('login-modal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="admin-password" class="form-input" placeholder="Masukkan password admin" required>
        </div>
        <button type="submit" class="btn btn-primary w-full">Masuk</button>
      </form>
    </div>
  </div>

  <!-- Generic Modal for Details -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold" id="modal-title">Detail</h3>
        <button onclick="closeModal('detail-modal')" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <div id="modal-body">
        <!-- Dynamic Content -->
      </div>
    </div>
  </div>

  <script>
    // --- GLOBAL STATE ---
    let appData = {
      kegiatan: [],
      pengumuman: [],
      pic: [],
      peserta: [], // Admin only
      logs: []     // Admin only
    };
    let isAdmin = false;

    // --- INITIALIZATION ---
    window.addEventListener('load', () => {
      // Check URL params for routing
      const urlParams = new URLSearchParams(window.location.search);
      const page = urlParams.get('page') || 'dashboard';
      
      // Load Data
      loadPublicData().then(() => {
        navigate(page);
        document.getElementById('loader').classList.add('hidden');
      });
    });

    // --- DATA LOADING ---
    async function loadPublicData() {
      try {
        const response = await google.script.run.withSuccessHandler(data => {
          appData.kegiatan = data.kegiatan;
          appData.pengumuman = data.pengumuman;
          appData.pic = data.pic;
          
          // Set Running Text
          const settings = data.pengaturan;
          const runningText = settings.find(s => s[0] === 'RunningText');
          if (runningText) {
            document.getElementById('running-text').textContent = runningText[1];
          } else {
            document.getElementById('running-text').textContent = "Selamat Datang di Platform DEDIKASI - SDM Kesehatan";
          }
        }).getPublicData();
      } catch (e) {
        showToast('Gagal memuat data', 'error');
      }
    }

    async function loadAdminData() {
      showLoader(true);
      try {
        await google.script.run.withSuccessHandler(data => {
          appData.peserta = data.peserta;
          appData.logs = data.logs;
          // Refresh other data too
          appData.kegiatan = data.kegiatan;
          appData.pengumuman = data.pengumuman;
          showLoader(false);
        }).getAdminData();
      } catch (e) {
        showToast('Gagal memuat data admin', 'error');
        showLoader(false);
      }
    }

    // --- NAVIGATION & ROUTING ---
    function navigate(page) {
      // Update Sidebar Active State
      document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
      const activeLink = document.querySelector(`.nav-link[onclick="navigate('${page}')"]`);
      if (activeLink) activeLink.classList.add('active');

      // Render Content
      const appDiv = document.getElementById('app');
      appDiv.innerHTML = ''; // Clear content
      
      // Close sidebar on mobile
      if(window.innerWidth < 768) {
        document.getElementById('sidebar').classList.remove('open');
      }

      switch(page) {
        case 'dashboard': renderDashboard(appDiv); break;
        case 'pengumuman': renderPengumuman(appDiv); break;
        case 'jadwal': renderJadwal(appDiv); break;
        case 'pendaftaran': renderPendaftaran(appDiv); break;
        case 'status': renderStatus(appDiv); break;
        case 'kontak': renderKontak(appDiv); break;
        
        // Admin Pages
        case 'admin-dashboard': 
          if(!checkAdmin()) return;
          renderAdminDashboard(appDiv); 
          break;
        case 'admin-kegiatan': 
          if(!checkAdmin()) return;
          renderAdminKegiatan(appDiv); 
          break;
        case 'admin-peserta': 
          if(!checkAdmin()) return;
          renderAdminPeserta(appDiv); 
          break;
        case 'admin-pengumuman':
          if(!checkAdmin()) return;
          renderAdminPengumuman(appDiv);
          break;
        default: renderDashboard(appDiv);
      }
    }

    function checkAdmin() {
      if (!isAdmin) {
        showLoginModal();
        return false;
      }
      return true;
    }

    // --- UI RENDERERS ---

    function renderDashboard(container) {
      const totalKegiatan = appData.kegiatan.length;
      const totalPeserta = 0; // Peserta count hidden on public dashboard for privacy usually, or calculated if needed
      
      container.innerHTML = `
        <div class="hero text-center">
          <h1 class="text-3xl md:text-5xl font-bold mb-2">DEDIKASI</h1>
          <p class="text-lg md:text-xl opacity-90">Platform Integrasi Kegiatan Pengabdian Masyarakat SDM Kesehatan</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
          <div class="card stat-card">
            <div class="stat-icon bg-blue"><i class="fas fa-calendar-check"></i></div>
            <div>
              <h3 class="text-2xl font-bold">${totalKegiatan}</h3>
              <p class="text-gray-500 text-sm">Kegiatan Aktif</p>
            </div>
          </div>
          <div class="card stat-card">
            <div class="stat-icon bg-green"><i class="fas fa-users"></i></div>
            <div>
              <h3 class="text-2xl font-bold">1,250+</h3>
              <p class="text-gray-500 text-sm">Peserta Terdaftar</p>
            </div>
          </div>
          <div class="card stat-card">
            <div class="stat-icon bg-purple"><i class="fas fa-hospital"></i></div>
            <div>
              <h3 class="text-2xl font-bold">45</h3>
              <p class="text-gray-500 text-sm">Instansi Mitra</p>
            </div>
          </div>
        </div>

        <h2 class="text-xl font-bold mb-4">Kegiatan Terbaru</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          ${appData.kegiatan.slice(0, 3).map(k => createKegiatanCard(k)).join('')}
        </div>
      `;
    }

    function renderPengumuman(container) {
      container.innerHTML = `
        <h2 class="text-2xl font-bold mb-6">Pengumuman & Informasi</h2>
        <div class="mb-4">
          <input type="text" id="search-pengumuman" class="form-input" placeholder="Cari pengumuman..." onkeyup="filterPengumuman()">
        </div>
        <div class="grid grid-cols-1 gap-4" id="pengumuman-list">
          ${appData.pengumuman.map(p => createPengumumanCard(p)).join('')}
        </div>
      `;
    }

    function renderJadwal(container) {
      // Group activities by date or just list them
      container.innerHTML = `
        <h2 class="text-2xl font-bold mb-6">Jadwal Kegiatan</h2>
        <div class="card">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Kegiatan</th>
                  <th>Tanggal</th>
                  <th>Lokasi</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody>
                ${appData.kegiatan.map(k => `
                  <tr>
                    <td><strong>${k[1]}</strong><br><small class="text-gray-500">${k[2]}</small></td>
                    <td>${formatDate(k[3])}</td>
                    <td>${k[5]}</td>
                    <td>${getStatusBadge(k[8])}</td>
                    <td><button class="btn btn-sm btn-primary" onclick="navigate('pendaftaran')">Daftar</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderPendaftaran(container) {
      container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="md:col-span-2">
            <div class="card">
              <h2 class="text-xl font-bold mb-4">Form Pendaftaran</h2>
              <form id="form-daftar" onsubmit="handleRegistration(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div class="form-group">
                    <label class="form-label">NIK</label>
                    <input type="number" name="nik" class="form-input" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" name="nama" class="form-input" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Profesi</label>
                    <select name="profesi" class="form-select" required>
                      <option value="">Pilih Profesi</option>
                      <option value="Dokter">Dokter</option>
                      <option value="Perawat">Perawat</option>
                      <option value="Bidan">Bidan</option>
                      <option value="Apoteker">Apoteker</option>
                      <option value="Tenaga Kesehatan Lain">Tenaga Kesehatan Lain</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Instansi</label>
                    <input type="text" name="instansi" class="form-input" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">No HP / WhatsApp</label>
                    <input type="tel" name="noHp" class="form-input" required>
                  </div>
                  <div class="form-group">

    function getStatusBadge(status) {
      let cls = 'badge-info';
      if (status === 'Aktif' || status === 'Diterima' || status === 'Selesai') cls = 'badge-success';
      if (status === 'Menunggu Verifikasi') cls = 'badge-warning';
      if (status === 'Ditolak' || status === 'Batal') cls = 'badge-danger';
      return `<span class="badge ${cls}">${status}</span>`;
    }

    function formatDate(dateObj) {
      if (!dateObj) return '-';
      // Handle string date from spreadsheet
      const d = new Date(dateObj);
      return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function showLoader(show) {
      const loader = document.getElementById('loader');
      if (show) loader.classList.remove('hidden');
      else loader.classList.add('hidden');
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.borderLeftColor = type === 'error' ? 'var(--danger)' : 'var(--primary)';
      toast.innerHTML = `
        <i class="fas ${type === 'error' ? 'fa-exclamation-circle text-red-500' : 'fa-check-circle text-blue-500'}"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function showLoginModal() {
      document.getElementById('login-modal').classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function showPengumumanDetail(title, content) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-body').innerHTML = `<p class="whitespace-pre-wrap">${content}</p>`;
      document.getElementById('detail-modal').classList.add('active');
    }
    
    function viewFiles(link1, link2) {
       let html = '<div class="grid grid-cols-1 gap-4">';
       if(link1) html += `<a href="${link1}" target="_blank" class="btn btn-outline"><i class="fas fa-file"></i> Lihat Surat Tugas</a>`;
       if(link2) html += `<a href="${link2}" target="_blank" class="btn btn-outline"><i class="fas fa-id-card"></i> Lihat Identitas</a>`;
       html += '</div>';
       
       document.getElementById('modal-title').innerText = "Dokumen Peserta";
       document.getElementById('modal-body').innerHTML = html;
       document.getElementById('detail-modal').classList.add('active');
    }

    // --- HANDLERS ---

    function handleLogin(e) {
      e.preventDefault();
      const pass = document.getElementById('admin-password').value;
      showLoader(true);
      
      google.script.run.withSuccessHandler(res => {
        showLoader(false);
        if (res.success) {
          isAdmin = true;
          closeModal('login-modal');
          document.getElementById('public-menu').classList.add('hidden');
          document.getElementById('admin-menu').classList.remove('hidden');
          document.getElementById('btn-login-admin').classList.add('hidden');
          showToast('Login Admin Berhasil');
          loadAdminData().then(() => navigate('admin-dashboard'));
        } else {
          showToast(res.error, 'error');
        }
      }).adminLogin(pass);
    }

    function logoutAdmin() {
      isAdmin = false;
      document.getElementById('public-menu').classList.remove('hidden');
      document.getElementById('admin-menu').classList.add('hidden');
      document.getElementById('btn-login-admin').classList.remove('hidden');
      navigate('dashboard');
      showToast('Logout Berhasil');
    }

    function handleRegistration(e) {
      e.preventDefault();
      const form = e.target;
      const fileSurat = form.fileSurat.files[0];
      const fileIdentitas = form.fileIdentitas.files[0];

      if (fileSurat.size > 2 * 1024 * 1024 || fileIdentitas.size > 2 * 1024 * 1024) {
        showToast('Ukuran file maksimal 2MB', 'error');
        return;
      }

      showLoader(true);
      
      // Helper to read file as base64 for GAS
      const reader1 = new FileReader();
      const reader2 = new FileReader();
      
      let dataReady = { surat: false, identitas: false };
      let formData = {
        nik: form.nik.value,
        nama: form.nama.value,
        profesi: form.profesi.value,
        instansi: form.instansi.value,
        noHp: form.noHp.value,
        email: form.email.value,
        idKegiatan: form.idKegiatan.value
      };

      const checkAndSubmit = () => {
        if (dataReady.surat && dataReady.identitas) {
          google.script.run.withSuccessHandler(res => {
            showLoader(false);
            if (res.success) {
              showToast(`Pendaftaran Berhasil! ID: ${res.regId}`);
              form.reset();
              // Show result modal
              document.getElementById('modal-title').innerText = "Registrasi Berhasil";
              document.getElementById('modal-body').innerHTML = `
                <div class="text-center">
                  <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
                  <p class="text-lg">Simpan Nomor Registrasi Anda:</p>
                  <h2 class="text-2xl font-bold my-2 text-blue-600">${res.regId}</h2>
                  <p class="text-gray-500">Gunakan nomor ini untuk mengecek status pendaftaran.</p>
                </div>
              `;
              document.getElementById('detail-modal').classList.add('active');
            } else {
              showToast(res.error, 'error');
            }
          }).handleFormSubmit(formData);
        }
      };

      reader1.onload = (e) => {
        formData.fileSurat = { fileName: fileSurat.name, mimeType: fileSurat.type, bytes: e.target.result.split(',')[1] };
        dataReady.surat = true;
        checkAndSubmit();
      };
      reader2.onload = (e) => {
        formData.fileIdentitas = { fileName: fileIdentitas.name, mimeType: fileIdentitas.type, bytes: e.target.result.split(',')[1] };
        dataReady.identitas = true;
        checkAndSubmit();
      };

      reader1.readAsDataURL(fileSurat);
      reader2.readAsDataURL(fileIdentitas);
    }

    function handleCheckStatus(e) {
      e.preventDefault();
      const input = document.getElementById('check-input').value;
      if (!input) return;

      showLoader(true);
      google.script.run.withSuccessHandler(data => {
        showLoader(false);
        const resultDiv = document.getElementById('status-result');
        
        if (data) {
          resultDiv.classList.remove('hidden');
          resultDiv.innerHTML = `
            <div class="card">
              <div class="flex justify-between items-start mb-4 border-b pb-4">
                <div>
                  <h3 class="text-xl font-bold">${data['Nama']}</h3>
                  <p class="text-gray-500">${data['Instansi']} - ${data['Profesi']}</p>
                </div>
                ${getStatusBadge(data['Status'])}
              </div>
              
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                  <p class="text-xs text-gray-400">ID Registrasi</p>
                  <p class="font-mono font-bold">${data['ID Registrasi']}</p>
                </div>
                <div>
                  <p class="text-xs text-gray-400">Kegiatan</p>
                  <p class="font-medium">${data['Nama Kegiatan']}</p>
                </div>
                <div>
                  <p class="text-xs text-gray-400">Keterangan Admin</p>
                  <p class="font-medium">${data['Keterangan Admin']}</p>
                </div>
              </div>

              ${data['Status'] === 'Diterima' ? 
                `<button class="btn btn-primary w-full" onclick="alert('Mengunduh Bukti Pendaftaran...')"><i class="fas fa-download"></i> Download Bukti Pendaftaran</button>` : 
                `<button class="btn btn-outline w-full" disabled>Download Bukti (Menunggu Verifikasi)</button>`
              }
            </div>
          `;
        } else {
          resultDiv.classList.add('hidden');
          showToast('Data tidak ditemukan', 'error');
        }
      }).checkStatus(input);
    }

    function verifyPeserta(id, status) {
      if(!confirm(`Ubah status peserta ${id} menjadi ${status}?`)) return;
      
      showLoader(true);
      google.script.run.withSuccessHandler(res => {
        showLoader(false);
        if(res.success) {
          showToast(`Status peserta diperbarui: ${status}`);
          loadAdminData().then(() => navigate('admin-peserta'));
        } else {
          showToast(res.error, 'error');
        }
      }).updatePesertaStatus(id, status, status === 'Diterima' ? 'Lengkapi persyaratan di lokasi' : 'Berkas tidak memenuhi syarat');
    }
    
    function deleteKegiatan(id) {
      if(!confirm('Hapus kegiatan ini?')) return;
      showLoader(true);
      google.script.run.withSuccessHandler(res => {
        showLoader(false);
        if(res.success) {
          showToast('Kegiatan dihapus');
          loadAdminData().then(() => navigate('admin-kegiatan'));
        }
      }).saveKegiatan({ mode: 'delete', id: id });
    }

    // --- CLIENT SIDE SEARCH ---
    function filterPengumuman() {
      const input = document.getElementById('search-pengumuman').value.toLowerCase();
      const cards = document.querySelectorAll('.pengumuman-item');
      cards.forEach(card => {
        const title = card.getAttribute('data-title');
        card.style.display = title.includes(input) ? 'block' : 'none';
      });
    }

    function filterPesertaTable() {
      const input = document.getElementById('search-peserta').value.toLowerCase();
      const rows = document.querySelectorAll('.peserta-row');
      rows.forEach(row => {
        const text = row.getAttribute('data-search');
        row.style.display = text.includes(input) ? '' : 'none';
      });
    }

  </script>
