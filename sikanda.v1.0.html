<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SiKANDA v3.0 MEGA PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ===============================
   GLOBAL THEME
================================== */
:root {
    --primary: #0a7cff;
    --primary-dark: #0059c8;
    --bg: #f2f6fc;
    --white: #ffffff;
    --text: #222;
    --card: #ffffff;
}

[data-theme="dark"] {
    --bg: #1a1a1a;
    --card: #262626;
    --text: #e0e0e0;
    --primary: #4da1ff;
}

body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
}

#app {
    display: flex;
    height: 100vh;
}

/* ===============================
   SIDEBAR
================================== */
.sidebar {
    width: 260px;
    background: var(--primary);
    color: white;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
}

.sidebar h2 {
    text-align: center;
    margin: 10px 0 20px;
    font-weight: 700;
}

.sidebar a {
    padding: 15px 25px;
    color: white;
    text-decoration: none;
    display: block;
    font-weight: 500;
}
.sidebar a:hover, .sidebar a.active {
    background: var(--primary-dark);
}

/* ===============================
   CONTENT
================================== */
.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.05);
}

/* ===============================
   TABLE
================================== */
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}
th {
    background: var(--primary);
    color: white;
    position: sticky;
    top: 0;
}

/* ===============================
   BUTTONS
================================== */
.btn {
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    font-weight: 600;
}
.btn-primary {
    background: var(--primary);
    color: white;
}
.btn-danger {
    background: #e63946;
    color: white;
}
.btn-warning {
    background: #f4a62a;
    color: white;
}
.btn-secondary {
    background: #bfbfbf;
}

/* ===============================
   MODAL
================================== */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    backdrop-filter: blur(3px);
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
}
.modal-content {
    width: 60%;
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
}

/* ===============================
   LOGIN SCREEN
================================== */
#login-screen {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}
.login-box {
    width: 400px;
    background: var(--card);
    padding: 40px;
    text-align: center;
    border-radius: 15px;
    box-shadow: 0px 5px 12px rgba(0,0,0,0.1);
}
</style>
</head>

<body>
<div id="login-screen">
    <div class="login-box">
        <h2>SiKANDA v3.0</h2>
        <p>Sistem Informasi Kepegawaian & Data SDMK</p>
        <button id="google-login" class="btn btn-primary">Login dengan Google</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="sidebar">
        <h2>SiKANDA</h2>
        <a href="#dashboard" class="menu-link active">Dashboard</a>
        <a href="#pegawai" class="menu-link">Data Pegawai</a>
        <a href="#mutasi" class="menu-link">Mutasi</a>
        <a href="#diklat" class="menu-link">Diklat</a>
        <a href="#log" class="menu-link">Log Aktivitas</a>
        <a href="#settings" class="menu-link">Pengaturan</a>
        <a href="#" onclick="logout()" style="margin-top:auto;">Logout</a>
    </div>

    <div class="content" id="content"></div>
</div>

<script>
// ======================================================
// KONFIGURASI
// ======================================================
const API_URL = "YOUR_WEBAPP_URL";
let USER_EMAIL = "";
let USER_ROLE = "";


// ======================================================
// LOGIN GOOGLE
// ======================================================
document.getElementById("google-login").addEventListener("click", async () => {
    google.accounts.id.initialize({
        client_id: "YOUR_GOOGLE_CLIENT_ID",
        callback: handleGoogleLogin
    });
    google.accounts.id.prompt();
});

function handleGoogleLogin(response) {
    const jwt = response.credential;
    const payload = JSON.parse(atob(jwt.split(".")[1]));
    USER_EMAIL = payload.email;

    verifyUser(USER_EMAIL);
}

async function verifyUser(email) {
    const res = await fetch(API_URL + "?mode=auth&email=" + email);
    const data = await res.json();

    if (!data.allowed) {
        alert("Akses ditolak! Email tidak terdaftar.");
        return;
    }

    USER_ROLE = data.role;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    loadPage("dashboard");
}


// LOGOUT
function logout() {
    google.accounts.id.disableAutoSelect();
    location.reload();
}


// ======================================================
// ROUTING HALAMAN
// ======================================================
window.onhashchange = () => {
    const page = location.hash.replace("#", "") || "dashboard";
    loadPage(page);
};

function loadPage(page) {
    document.querySelectorAll(".menu-link").forEach(a => a.classList.remove("active"));
    document.querySelector(`a[href="#${page}"]`)?.classList.add("active");

    if (page === "dashboard") return loadDashboard();
    if (page === "pegawai") return loadPegawai();
    if (page === "mutasi") return loadMutasi();
    if (page === "diklat") return loadDiklat();
    if (page === "log") return loadLog();
    if (page === "settings") return loadSettings();
}


// ======================================================
// DASHBOARD
// ======================================================
async function loadDashboard() {
    document.getElementById("content").innerHTML = `
        <h1>Dashboard</h1>
        <div class='card'><h3>Memuat statistik...</h3></div>
    `;

    const res = await fetch(API_URL + "?mode=dashboard");
    const d = await res.json();

    document.getElementById("content").innerHTML = `
      <h1>Dashboard</h1>
      <div class="card">
        <h2>Ringkasan</h2>
        <p>Total Pegawai: <b>${d.totalPegawai}</b></p>
        <p>STR Aktif: <b>${d.strAktif}</b></p>
        <p>Tenaga Kesehatan: <b>${d.totalNakes}</b></p>
      </div>
    `;
}


// ======================================================
// DATA PEGAWAI
// ======================================================
async function loadPegawai() {
    document.getElementById("content").innerHTML = `
        <h1>Data Pegawai</h1>
        <button class="btn btn-primary" onclick="openModalPegawai()">Tambah Pegawai</button>
        <div class="card"><table id="tblPegawai"></table></div>
    `;

    const res = await fetch(API_URL + "?mode=pegawai");
    const data = await res.json();

    let html = `
        <tr>
            <th>No</th><th>Nama</th><th>NIP</th><th>Profesi</th><th>Unit</th><th>STR</th><th>Aksi</th>
        </tr>
    `;

    data.forEach((p,i)=> {
        html += `
        <tr>
            <td>${i+1}</td>
            <td>${p.nama}</td>
            <td>${p.nip}</td>
            <td>${p.profesi}</td>
            <td>${p.unit}</td>
            <td>${p.str}</td>
            <td>
                <button class='btn btn-warning' onclick='editPegawai("${p.id}")'>Edit</button>
                <button class='btn btn-danger' onclick='hapusPegawai("${p.id}")'>Hapus</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("tblPegawai").innerHTML = html;
}


// Modal tambah/edit (placeholder, backend siap di Code.gs)
function openModalPegawai() {
    alert("Form tambah pegawai akan aktif setelah backend siap (Code.gs).");
}


// ======================================================
// MUTASI
// ======================================================
async function loadMutasi() {
    document.getElementById("content").innerHTML = `
        <h1>Mutasi Pegawai</h1>
        <div class='card'>Fitur mutasi aktif setelah backend siap.</div>
    `;
}


// ======================================================
// DIKLAT
// ======================================================
async function loadDiklat() {
    document.getElementById("content").innerHTML = `
        <h1>Manajemen Diklat</h1>
        <div class='card'>Fitur diklat aktif setelah backend siap.</div>
    `;
}


// ======================================================
// LOG USER
// ======================================================
async function loadLog() {
    document.getElementById("content").innerHTML = `
        <h1>Log Aktivitas</h1>
        <div class='card'>Memuat log...</div>
    `;

    const res = await fetch(API_URL + "?mode=log");
    const data = await res.json();

    let html = "<table><tr><th>Waktu</th><th>User</th><th>Aksi</th></tr>";

    data.forEach(l=> {
        html += `<tr><td>${l.time}</td><td>${l.user}</td><td>${l.action}</td></tr>`;
    });

    html += "</table>";

    document.querySelector(".card").innerHTML = html;
}


// ======================================================
// PENGATURAN
// ======================================================
function loadSettings() {
    document.getElementById("content").innerHTML = `
        <h1>Pengaturan</h1>
        <div class='card'>
            <button class='btn btn-secondary' onclick="toggleTheme()">Toggle Dark/Light Mode</button>
        </div>
    `;
}

function toggleTheme() {
    const theme = document.body.getAttribute("data-theme");
    document.body.setAttribute("data-theme", theme==="dark" ? "light" : "dark");
}


</script>

<script src="https://accounts.google.com/gsi/client" async></script>

</body>
</html>
