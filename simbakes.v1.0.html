  <style>
    :root {
      --primary: #2563eb;

      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;

      --gray-100: #f1f5f9;

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-50); color: var(--gray-800); }
    .app-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 1000; transition: transform 0.3s; }

    .sidebar-menu { list-style: none; padding: 1rem 0; }

      z-index: 999;
      opacity: 0;
      animation: fadeIn 0.2s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    .card { background: white; border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--gray-200); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }

    .stat-card.danger { border-left-color: var(--danger); }

    .stat-card .value { font-size: 2rem; font-weight: 700; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: var(--radius); font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
    .btn-block { width: 100%; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; }
    .required { color: var(--danger); }
    .form-control { width: 100%; padding: 0.625rem 0.875rem; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 0.875rem; }
    .form-control:focus { outline: none; border-color: var(--primary); }
    textarea.form-control { min-height: 80px; resize: vertical; }
    select.form-control { background: white; cursor: pointer; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

    .badge-processed { background: #dbeafe; color: #1e40af; }
    .badge-approved { background: #d1fae5; color: #065f46; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }
    .text-center { text-align: center; }
    .text-muted { color: var(--gray-500); }
    .text-sm { font-size: 0.875rem; }
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }
    .hidden { display: none; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 1rem; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-3 { margin-top: 1rem; }
    .mt-4 { margin-top: 1.5rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 1rem; }
    .mb-4 { margin-bottom: 1.5rem; }
    .p-2 { padding: 0.5rem; }
    .p-3 { padding: 1rem; }
    .p-4 { padding: 1.5rem; }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 10000; }
    .toast { background: var(--success); color: white; padding: 1rem 1.5rem; border-radius: var(--radius); margin-top: 0.5rem; animation: slideIn 0.3s; }
    .toast.error { background: var(--danger); }

    .alert { padding: 1rem; border-radius: var(--radius); margin-bottom: 1rem; border-left: 4px solid; }
    .alert-info { background: #dbeafe; border-color: var(--primary); color: #1e40af; }
    .alert-success { background: #d1fae5; border-color: var(--success); color: #065f46; }
    .alert-error { background: #fee2e2; border-color: var(--danger); color: #991b1b; }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10001; }
    .modal.hidden { display: none; }

.grid-2, .grid-3 { grid-template-columns: 1fr; }

     }

    <script>
    function formatDocumentLinks(linksStr) {
      if (!linksStr) return '';
      return linksStr.split(' | ').map(function(link) {
        var parts = link.split(': ');
        if (parts.length < 2) return escapeHtml(link);
        var field = parts[0];
        var urls = parts[1].split(', ').map(function(u) { 
          return '<a href="' + u.trim() + '" target="_blank" style="color:var(--primary);text-decoration:underline;">📎 ' + field + '</a>'; 
        }).join(', ');
        return field + ': ' + urls;
      }).join('<br>');
    }
    
    function getDriveImageUrl(fotoData, fallbackIdx) {
      // Handle null/undefined
      if (!fotoData) {
        console.log('getDriveImageUrl: fotoData is null/undefined');
        return '';
      }
      // Handle string format (legacy)
      if (typeof fotoData === 'string') {
        console.log('getDriveImageUrl: fotoData is string:', fotoData.substring(0, 50));
        return fotoData;
      }
      // Handle object format {primary: 'url', fallback: 'url'}
      if (typeof fotoData === 'object' && fotoData.primary) {
        console.log('getDriveImageUrl: fotoData is object, primary:', fotoData.primary.substring(0, 50));
        if (fallbackIdx === 1 && fotoData.fallback) {
          console.log('getDriveImageUrl: returning fallback');
          return fotoData.fallback;
        }
        console.log('getDriveImageUrl: returning primary');
        return fotoData.primary || '';
      }
      console.log('getDriveImageUrl: unknown format', typeof fotoData, fotoData);
      return '';
    }
    </script>
    <script>
    // ========================================
    // CONFIG
    // ========================================
    var API_URL = 'https://script.google.com/macros/s/AKfycbwzWNWsQfjRgA82TthJl7DdYKspLgYrf0mKtSH0kk-oGt8Y85rbrpMd9IgSwiUfSO1p/exec';
    var currentPage = 'dashboard';
    var currentUser = null;
    var isAdminLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';

document.addEventListener('DOMContentLoaded', function() {
      var urlParams = new URLSearchParams(window.location.search);
      currentPage = urlParams.get('page') || 'dashboard';
      updateCurrentDate();
      navigate(currentPage);
      
      // Fix onclick handlers - replace with addEventListener
      // Setup menu navigation (prevent # jumping)
      document.querySelectorAll('.sidebar-menu a').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var page = this.dataset.page;
          if (page) navigate(page);
        });
      });
      document.querySelector('.menu-toggle').addEventListener('click', toggleSidebar);
    });

    function updateCurrentDate() {
      var d = new Date();
      document.getElementById('currentDate').textContent = d.toLocaleDateString('id-ID', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});
    }

    function toggleSidebar() {
      var sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('active');
      console.log('Menu toggled:', sidebar.classList.contains('active') ? 'OPEN' : 'CLOSED');
      
      // Add backdrop for mobile
      if (window.innerWidth <= 768) {
        if (sidebar.classList.contains('active')) {
          var backdrop = document.createElement('div');
          backdrop.className = 'sidebar-backdrop';
          backdrop.onclick = closeSidebar;
          document.body.appendChild(backdrop);
        } else {
          var backdrop = document.querySelector('.sidebar-backdrop');
          if (backdrop) backdrop.remove();
        }
      }
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('active');
      var backdrop = document.querySelector('.sidebar-backdrop');
      if (backdrop) backdrop.remove();
    }

    function navigate(page) {
      console.log('Navigating to:', page);
      currentPage = page;
      document.getElementById('pageTitle').textContent = getPageTitle(page);
      updateActiveMenu();
      var html = '';
      switch(page) {
        case 'dashboard': html = renderDashboard(); break;
        case 'form': html = renderForm(); break;
        case 'roadmap': html = renderRoadmap(); break;
        case 'status': html = renderStatus(); break;
        case 'admin': html = renderAdmin(); break;
        default: html = renderDashboard();
      }
      document.getElementById('content').innerHTML = html;
      initPage(page);
      document.getElementById('sidebar').classList.remove('active');
    }

    function getPageTitle(page) {
      var titles = {dashboard: 'Dashboard', form: 'Ajukan Rekomendasi', roadmap: 'Roadmap', status: 'Cek Status', admin: 'Panel Admin'};
      return titles[page] || 'Dashboard';
    }

    function updateActiveMenu() {
      document.querySelectorAll('.sidebar-menu a').forEach(function(link) {
        link.classList.remove('active');
        if (link.dataset.page === currentPage) link.classList.add('active');
      });
    }

    // ========================================
    // API CALLS
    // ========================================
    function apiCall(action, callback, errorCallback) {
      var cbName = 'jsonp_' + Date.now();
      var url = API_URL + '?action=' + action + '&callback=' + cbName;
      window[cbName] = function(data) {
        if (callback) callback(data);
        cleanup();
      };
      function cleanup() {
        try { delete window[cbName]; } catch(e) {}
      }
      var script = document.createElement('script');
      script.src = url;
      script.onerror = function() {
        showToast('Gagal koneksi ke server', 'error');
        if (errorCallback) errorCallback();
        cleanup();
      };
      document.head.appendChild(script);
    }

    function apiCallWithData(action, data, callback, errorCallback) {
      var cbName = 'jsonp_' + Date.now();
      var url = API_URL + '?action=' + action;
      for (var key in data) {
        if (data.hasOwnProperty(key) && data[key] !== null && data[key] !== undefined) {
          url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(String(data[key]));
        }
      }
      url += '&callback=' + cbName;
      window[cbName] = function(resp) {
        if (callback) callback(resp);
        try { delete window[cbName]; } catch(e) {}
      };
      var script = document.createElement('script');
      script.src = url;
      script.onerror = function() {
        showToast('Gagal koneksi', 'error');
        if (errorCallback) errorCallback();
        try { delete window[cbName]; } catch(e) {}
      };
      document.head.appendChild(script);
    }

    function initPage(page) {
      if (page === 'dashboard') loadDashboard();
      if (page === 'roadmap') loadRoadmap();
      if (page === 'admin' && isAdminLoggedIn) loadApplications();
      
      // Setup roadmap filter listeners
      if (page === 'roadmap') {
        ['filterJurusan', 'filterJenis', 'filterKampus', 'filterTahun', 'filterTujuan'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.addEventListener('change', applyFilters);
        });
        var searchEl = document.getElementById('filterSearch');
        if (searchEl) {
          searchEl.addEventListener('input', function() {
            clearTimeout(window.roadmapTimeout);
            window.roadmapTimeout = setTimeout(applyFilters, 300);
          });
        }
      }
       
       // Setup admin filter listeners
       if (page === 'admin' && isAdminLoggedIn) {
         setupAdminFilters();
         loadAdminAnnouncement();
       }
     }
     
     function setupAdminFilters() {
      var searchEl = document.getElementById('adminSearch');
      if (searchEl) {
        searchEl.addEventListener('input', function() {
          clearTimeout(window.adminFilterTimeout);
          window.adminFilterTimeout = setTimeout(applyAdminFilters, 300);
        });
      }
      ['adminStatusFilter', 'adminInstansiFilter', 'adminJurusanFilter'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('change', applyAdminFilters);
      });
    }

    function loadRoadmap() {
      apiCall('getRoadmap', function(res) {
        var tbody = document.getElementById('roadmapTable');
        var filtersDiv = document.getElementById('roadmapFilters');
        if (!tbody || !filtersDiv) return;
        
        if (res && res.success && res.data) {
          window.roadmapData = res.data;
          populateFilters();
          filtersDiv.style.display = 'block';
          applyFilters();
        } else {
          tbody.innerHTML = '<tr><td colspan="' + (isAdminLoggedIn ? 8 : 7) + '" class="text-center">Belum ada data roadmap</td></tr>';
          filtersDiv.style.display = 'none';
        }

    function populateFilters() {
      var data = window.roadmapData;
      
      // Get unique values
      var jurusan = [...new Set(data.map(d => d.posisi).filter(Boolean))].sort();
      var jenis = [...new Set(data.map(d => d.jenis_pendidikan).filter(Boolean))].sort();
      var kampus = [...new Set(data.map(d => d.kampus).filter(Boolean))].sort();
      var tahun = [...new Set(data.map(d => d.tahun_mulai).filter(Boolean))].sort();
      var tujuan = [...new Set(data.map(d => d.unit_tujuan).filter(Boolean))].sort();
      
      // Populate dropdowns
      ['Jurusan', 'Jenis', 'Kampus', 'Tahun', 'Tujuan'].forEach(function(type, idx) {
        var id = 'filter' + type;
        var select = document.getElementById(id);
        if (select) {
          var opts = Array.from(select.options);
          opts[0].textContent = 'Semua ' + type.toLowerCase();
          opts[0].value = '';
          
          var uniqueVals = jurusan;
          switch(type) {
            case 'Jenis': uniqueVals = jenis; break;
            case 'Kampus': uniqueVals = kampus; break;
            case 'Tahun': uniqueVals = tahun; break;
            case 'Tujuan': uniqueVals = tujuan; break;
          }
          
          uniqueVals.forEach(function(val) {
            if (!opts.find(o => o.value === val)) {
              var opt = document.createElement('option');
              opt.value = val;
              opt.textContent = val;
              select.appendChild(opt);
            }
          });
        }
      });
    }

    function applyFilters() {
      var data = window.roadmapData;
      var jurusan = document.getElementById('filterJurusan')?.value || '';
      var jenis = document.getElementById('filterJenis')?.value || '';
      var kampus = document.getElementById('filterKampus')?.value || '';
      var tahun = document.getElementById('filterTahun')?.value || '';
      var tujuan = document.getElementById('filterTujuan')?.value || '';
      var search = (document.getElementById('filterSearch')?.value || '').toLowerCase();
      
      var filtered = data.filter(function(item) {
        return (!jurusan || item.posisi === jurusan) &&
               (!jenis || item.jenis_pendidikan === jenis) &&
               (!kampus || item.kampus === kampus) &&
               (!tahun || item.tahun_mulai === tahun) &&
               (!tujuan || item.unit_tujuan === tujuan) &&
               (!search || 
                 item.posisi.toLowerCase().includes(search) ||
                 item.jenis_pendidikan.toLowerCase().includes(search) ||
                 item.kampus.toLowerCase().includes(search) ||
                 item.unit_tujuan.toLowerCase().includes(search) ||
                 item.tahun_mulai.toLowerCase().includes(search));
      });
      
      renderRoadmapTable(filtered);
      document.getElementById('filterCount').textContent = filtered.length + ' dari ' + data.length + ' hasil';
    }

    function renderRoadmapTable(data) {
      var tbody = document.getElementById('roadmapTable');
      if (!tbody) return;
      
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="' + (isAdminLoggedIn ? 8 : 7) + '" class="text-center text-muted">Tidak ada data yang cocok dengan filter</td></tr>';
        return;
      }
      
      tbody.innerHTML = data.map(function(item, i) {
        var badgeClass = item.status_calon === 'tersedia' ? 'badge-approved' : 'badge-pending';
        return '<tr><td>' + (i+1) + '</td><td><strong>' + escapeHtml(item.posisi) + '</strong></td>' +
          '<td>' + escapeHtml(item.jenis_pendidikan) + '</td><td>' + escapeHtml(item.kampus) + '</td>' +
          '<td><span class="badge ' + badgeClass + '">' + escapeHtml(item.status_calon) + '</span></td>' +
          '<td>' + escapeHtml(item.tahun_mulai) + '</td><td>' + escapeHtml(item.unit_tujuan) + '</td></tr>';
      }).join('');
    }

    function clearFilters() {
      ['filterJurusan', 'filterJenis', 'filterKampus', 'filterTahun', 'filterTujuan'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('filterSearch').value = '';
      applyFilters();
    }

    function submitRepair(e) {
      e.preventDefault();
      var form = document.getElementById('repairForm');
      var formData = new FormData(form);
      if (!confirm('Simpan perbaikan ini? Status akan diubah menjadi "pending" untuk direview ulang.')) return;
      var params = {};
      for (var [key, value] of formData.entries()) {
        if (!(value instanceof File)) params[key] = value;
      }
      params.id = currentRepairId;
      params.status = 'pending';
      apiCallWithData('updateApplication', params, function(res) {
        if (res && res.success) {
          showToast('Perbaikan tersimpan. Mengunggah dokumen...');
          var files = form.querySelectorAll('input[type="file"]');
          var allFiles = [];
          for (var i = 0; i < files.length; i++) {
            if (files[i].files[0]) {
              allFiles.push({fieldName: files[i].getAttribute('name'), file: files[i].files[0]});
            }
          }
          if (allFiles.length > 0) {
            uploadAllFiles(currentRepairId, allFiles, 0, function() {
              showToast('Semua dokumen terunggah!');
              closeModal();
            });
          } else {
            closeModal();
          }
        } else {
          showToast(res ? res.message : 'Gagal', 'error');
        }
      });
    }

    var currentRepairId = null;

    function downloadRekomendasi(id) {
      apiCallWithData('downloadRekomendasi', {id: id}, function(res) {
        if (res && res.success && res.data && res.data.url) {
          window.open(res.data.url, '_blank');
        } else {
          showToast(res ? res.message : 'Gagal download', 'error');
        }
      }, function() {
        showToast('Gagal koneksi ke server', 'error');
      });
    }

    function doLogin() {
      var u = document.getElementById('loginUser').value;
      var p = document.getElementById('loginPass').value;
      apiCallWithData('login', {username: u, password: p}, function(res) {
        if (res && res.success) {
          currentUser = res.data.user;
          isAdminLoggedIn = true;
          localStorage.setItem('adminLoggedIn', 'true');
          showToast('Login berhasil!');
          navigate('admin');
        } else {
          showToast(res ? res.message : 'Login gagal', 'error');
        }
      }, function() {
        showToast('Gagal koneksi', 'error');
      });
    }

    function doLogout() {
      if (!confirm('Logout dari panel admin?')) return;
      currentUser = null;
      isAdminLoggedIn = false;
      localStorage.removeItem('adminLoggedIn');
      showToast('Logout berhasil!');
      navigate('dashboard');
    }

    function populateAdminDropdowns() {
      var instansiSelect = document.getElementById('adminInstansiFilter');
      var jurusanSelect = document.getElementById('adminJurusanFilter');
      
      if (!instansiSelect || !jurusanSelect) return;
      
      // Get unique values
      var instansi = [...new Set(window.allApplications.map(function(app) { return app.unit_tujuan; }).filter(Boolean))].sort();
      var jurusan = [...new Set(window.allApplications.map(function(app) { return app.jurusan_tujuan; }).filter(Boolean))].sort();
      
      // Populate instansi dropdown
      var instansiOptions = '<option value="">Semua Instansi</option>';
      instansi.forEach(function(val) {
        instansiOptions += '<option value="' + escapeHtml(val) + '">' + escapeHtml(val) + '</option>';
      });
      instansiSelect.innerHTML = instansiOptions;
      
      // Populate jurusan dropdown
      var jurusanOptions = '<option value="">Semua Jurusan</option>';
      jurusan.forEach(function(val) {
        jurusanOptions += '<option value="' + escapeHtml(val) + '">' + escapeHtml(val) + '</option>';
      });
      jurusanSelect.innerHTML = jurusanOptions;
    }
    
    function applyAdminFilters() {
      var search = (document.getElementById('adminSearch')?.value || '').toLowerCase();
      var status = document.getElementById('adminStatusFilter')?.value || '';
      var instansi = document.getElementById('adminInstansiFilter')?.value || '';
      var jurusan = document.getElementById('adminJurusanFilter')?.value || '';
      
      var filtered = window.allApplications.filter(function(app) {
        var matchesSearch = !search || 
          (app.full_name && app.full_name.toLowerCase().includes(search)) ||
          (app.nik && app.nik.toLowerCase().includes(search)) ||
          (app.unit_tujuan && app.unit_tujuan.toLowerCase().includes(search)) ||
          (app.jurusan_tujuan && app.jurusan_tujuan.toLowerCase().includes(search)) ||
          (app.application_number && app.application_number.toLowerCase().includes(search));
        
        var matchesStatus = !status || app.status === status;
        var matchesInstansi = !instansi || app.unit_tujuan === instansi;
        var matchesJurusan = !jurusan || app.jurusan_tujuan === jurusan;
        
        return matchesSearch && matchesStatus && matchesInstansi && matchesJurusan;
      });
      
      window.filteredApplications = filtered;
      renderAdminTable(filtered);
      updateFilterCount(filtered.length, window.allApplications.length);
    }
    
    function updateFilterCount(filtered, total) {
      var el = document.getElementById('filterCount');
      if (el) {
        el.textContent = filtered + ' dari ' + total + ' data';
      }
    }

function submitApplication(e) {
  e.preventDefault();
  var form = document.getElementById('applicationForm');
  var formData = new FormData(form);
  var nik = String(formData.get('nik') || '').trim().replace(/\s+/g, '');
  var btn = document.getElementById('submitBtn');
  var originalText = btn.innerHTML;
  
  // Frontend NIK validation (normalize: trim + remove spaces)
  if (!nik || nik.length !== 16 || !/^\d+$/.test(nik)) {
    showToast('NIK harus 16 digit angka', 'error');
    return;
  }
  
  btn.innerHTML = '<span class="spinner"></span> Memeriksa NIK...';
  btn.disabled = true;
  
  // Check NIK uniqueness via API
  apiCallWithData('checkNikExists', {nik: nik}, function(res) {
    if (res && res.success && res.data && res.data.exists) {
      showToast('NIK sudah terdaftar dan tidak dapat digunakan kembali', 'error');
      btn.innerHTML = originalText;
      btn.disabled = false;
      return;
    }
    
    // NIK is unique, proceed with submission
    btn.innerHTML = '<span class="spinner"></span> Mengirim...';
    
    // Validate file sizes
    var files = form.querySelectorAll('input[type="file"]');
    for (var i = 0; i < files.length; i++) {
      var file = files[i].files[0];
      if (file && file.size > 2 * 1024 * 1024) {
        showToast('File ' + file.name + ' melebihi 2MB', 'error');
        btn.innerHTML = originalText;
        btn.disabled = false;
        return;
      }
    }

    // Collect text fields only (exclude files)
    var textParams = new FormData();
    textParams.append('action', 'submitApplication');
    for (var [key, value] of formData.entries()) {
      if (!(value instanceof File)) {
        textParams.append(key, value);
      }
    }

    // Collect file info for later upload
    var allFiles = [];
    for (var i = 0; i < files.length; i++) {
      if (files[i].files[0]) {
        allFiles.push({
          fieldName: files[i].getAttribute('name'),
          file: files[i].files[0]
        });
      }
    }

    // Submit application via POST
    fetch(API_URL, {
      method: 'POST',
      body: textParams
    })
    .then(function(response) {
      if (!response.ok) {
        var err = new Error('Network response was not ok: ' + response.status + ' ' + response.statusText);
        err.status = response.status;
        err.statusText = response.statusText;
        throw err;
      }
      var contentType = response.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        return response.json();
      } else {
        return response.text().then(function(text) {
          try {
            return JSON.parse(text);
          } catch(e) {
            throw new Error('Invalid JSON response: ' + text.substring(0, 200));
          }
        });
      }
    })
    .then(function(res) {
      btn.innerHTML = originalText;
      btn.disabled = false;
      if (res && res.success) {
        showToast('Pengajuan berhasil! No: ' + res.data.application_number);
        form.reset();
        if (allFiles.length > 0) {
          showToast('Mengunggah ' + allFiles.length + ' file...');
          uploadAllFiles(res.data.id, allFiles, 0);
        }
        setTimeout(function() { loadApplications(); }, 2000);
         } else {
          var msg = (res && res.message) || 'Gagal mengirim';
          showToast(msg, 'error');
          console.error('Submission error:', res);
        }
      })
      .catch(function(err) {
        btn.innerHTML = originalText;
        btn.disabled = false;
        console.error('Fetch error details:', err);
        showToast('Error: ' + (err.message || 'Network error'), 'error');
      });
    }

    function uploadAllFiles(appId, files, index, callback) {
      if (index >= files.length) {
        showToast('Semua file terkirim!');
        if (callback) callback();
        loadApplications();
        return;
      }
      var item = files[index];
      uploadFile(appId, item.fieldName, item.file, function(success) {
        if (success) {
          showToast('File terkirim: ' + item.file.name);
        } else {
          showToast('Gagal upload: ' + item.file.name, 'error');
        }
        uploadAllFiles(appId, files, index + 1, callback);
      });
    }

    function uploadFile(appId, fieldName, file, callback) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var base64 = e.target.result.split(',')[1];
        var params = new URLSearchParams();
        params.append('action', 'uploadFile');
        params.append('application_id', appId);
        params.append('file_field', fieldName);
        params.append('file_name', file.name);
        params.append('file_type', file.type);
        params.append('file_data', base64);
        
        fetch(API_URL, {method: 'POST', body: params})
          .then(function(r) {
            var contentType = r.headers.get('content-type') || '';
            if (!r.ok) {
              return contentType.includes('application/json') 
                ? r.json().then(function(errRes) {
                    var err = new Error(errRes.message || 'Upload failed');
                    err.details = errRes;
                    throw err;
                  })
                : r.text().then(function(txt) {
                    throw new Error('Upload failed: ' + txt.substring(0, 100));
                  });
            }
            return contentType.includes('application/json') ? r.json() : r.text();
          })
          .then(function(res) {
            if (res && res.success) {
              if (callback) callback(true);
            } else {
              console.error('Upload failed:', res);
              showToast('Upload gagal: ' + ((res && res.message) || 'unknown error'), 'error');
              if (callback) callback(false);
            }
          })
          .catch(function(err) {
            console.error('Upload error:', err);
            showToast('Upload error: ' + (err.message || 'Unknown error'), 'error');
            if (callback) callback(false);
          });
      };
      reader.readAsDataURL(file);
    }

      var html = '<form id="announcementForm" onsubmit="saveAnnouncement(event, ' + quoteForOnclick(id) + ')">' +
        '<div class="form-group"><label class="form-label">Judul Pengumuman</label><input type="text" id="annTitle" class="form-control" required></div>' +
        '<div class="form-group"><label class="form-label">Konten Pengumuman</label><textarea id="annContent" class="form-control" rows="4" required></textarea></div>' +
        '<div class="form-group"><label class="form-label"><input type="checkbox" id="annActive" checked> Aktif</label></div>' +
        '<button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Simpan</button>' +
      '</form>';
      
      showModal(isEdit ? 'Edit Pengumuman' : 'Tambah Pengumuman', html);
      
      if (isEdit) {
        apiCall('crudAnnouncement&mode=read', function(res) {
          var data = res && res.success && res.data ? res.data.find(function(x) { return x.id == id; }) : null;
          if (data) {
            document.getElementById('annTitle').value = data.title;
            document.getElementById('annContent').value = data.content;
            document.getElementById('annActive').checked = data.active;
          }
        });
      }
    }
    
    function editAnnouncement(id) {
      showAnnouncementForm(id);
    }
    
    function saveAnnouncement(e, id) {
      e.preventDefault();
      var mode = id > 0 ? 'update' : 'create';
      var params = 'mode=' + mode + 
        '&id=' + id +
        '&title=' + encodeURIComponent(document.getElementById('annTitle').value) +
        '&content=' + encodeURIComponent(document.getElementById('annContent').value) +
        '&active=' + (document.getElementById('annActive').checked ? 'true' : 'false');
      
      apiCall('crudAnnouncement&' + params, function(res) {
        if (res && res.success) {
          showToast(res.message || 'Berhasil disimpan');
          closeModal();
          manageAnnouncements();
          loadAnnouncement();
        } else {
          showToast(res ? res.message : 'Gagal', 'error');
        }
      });
    }
    
    function deleteAnnouncement(id) {
      if (!confirm('Hapus pengumuman ini?')) return;
      apiCall('crudAnnouncement&mode=delete&id=' + id, function(res) {
        if (res && res.success) {
          showToast('Dihapus');
          closeModal();
          loadAnnouncement();
        } else {
          showToast('Gagal', 'error');
        }
      });
    }

    // ========================================
    // MODAL
    // ========================================
    function showModal(title, content) {
      var container = document.getElementById('content');
      var modal = document.createElement('div');
      modal.className = 'modal';
      modal.id = 'modal';
      modal.innerHTML = '<div class="modal-content"><div class="modal-header"><h3>' + title + '</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>' + content + '</div>';
      container.appendChild(modal);
    }

    function closeModal() {
      var m = document.getElementById('modal');
      if (m) m.remove();
    }

    // ========================================
    // APPLICATION CRUD (Admin)
    // ========================================
    function showCreateModal() {
      showToast('Fitur buat pengajuan baru belum tersedia. Gunakan formulir di halaman Ajukan Rekomendasi.', 'info');
    }

    function editApplication(id) {
      showToast('Fitur edit pengajuan belum tersedia.', 'info');
    }

    // ========================================
    // UTILITIES
    // ========================================
    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function quoteForOnclick(value) {
      var text = String(value == null ? '' : value)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, '\\'');
      return '\'' + escapeHtml(text) + '\'';
    }

    function showToast(msg, type) {
      var tc = document.getElementById('toastContainer');
      var t = document.createElement('div');
      t.className = 'toast ' + (type || '');
      t.textContent = msg;
      tc.appendChild(t);
      setTimeout(function() { t.remove(); }, 4000);
    }
