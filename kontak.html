<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONTAK - Dashboard Pelaporan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-address-book"></i> KONTAK</h2>
            <button class="close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-page="laporan">
                <i class="fas fa-file-alt"></i>
                <span>Laporan</span>
            </a>
            <a href="#" class="nav-item" data-page="data">
                <i class="fas fa-database"></i>
                <span>Data</span>
            </a>
            <a href="#" class="nav-item" data-page="pengaturan">
                <i class="fas fa-cog"></i>
                <span>Pengaturan</span>
            </a>
        </nav>
    </aside>

    <!-- Overlay for sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="top-header">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1>Dashboard KONTAK</h1>
            <div class="user-info">
                <span class="user-name">Admin</span>
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </header>

        <!-- Dashboard Stats -->
        <section class="stats-container">
            <div class="stat-card total">
                <div class="stat-icon">
                    <i class="fas fa-inbox"></i>
                </div>
                <div class="stat-info">
                    <h3>Jumlah Data</h3>
                    <p class="stat-number" id="totalData">0</p>
                </div>
            </div>
            <div class="stat-card selesai">
                <div class="stat-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-info">
                    <h3>Selesai</h3>
                    <p class="stat-number" id="selesaiData">0</p>
                </div>
            </div>
            <div class="stat-card tindak-lanjut">
                <div class="stat-icon">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3>Tindak Lanjut</h3>
                    <p class="stat-number" id="tindakLanjutData">0</p>
                </div>
            </div>
        </section>

        <!-- Form Section -->
        <section class="form-section">
            <div class="section-header">
                <h2><i class="fas fa-pen-alt"></i> Formulir Laporan</h2>
                <button class="btn btn-primary" id="openFormBtn">
                    <i class="fas fa-plus"></i> Laporan Baru
                </button>
            </div>
            
            <!-- Recent Reports Table -->
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Tanggal</th>
                            <th>Pelapor</th>
                            <th>Subjek</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                        <tr>
                            <td colspan="6" class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>Belum ada data laporan</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Lightbox for Image Preview -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">
            <i class="fas fa-times"></i>
        </button>
        <img src="" alt="Preview" class="lightbox-image" id="lightboxImage">
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <!-- Popup Modal for Form -->
    <div class="popup" id="reportPopup">
        <div class="popup-content">
            <div class="popup-header">
                <h3><i class="fas fa-pen-alt"></i> Formulir Laporan Baru</h3>
                <button class="popup-close" id="popupClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="reportForm" class="report-form">
                <div class="form-group">
                    <label for="pelapor">Nama Pelapor <span class="required">*</span></label>
                    <input type="text" id="pelapor" name="pelapor" required placeholder="Masukkan nama lengkap">
                </div>
                
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="email@example.com">
                </div>
                
                <div class="form-group">
                    <label for="telepon">No. Telepon</label>
                    <input type="tel" id="telepon" name="telepon" placeholder="0812-3456-7890">
                </div>
                
                <div class="form-group">
                    <label for="subjek">Subjek Laporan <span class="required">*</span></label>
                    <input type="text" id="subjek" name="subjek" required placeholder="Judul singkat laporan">
                </div>
                
                <div class="form-group">
                    <label for="kategori">Kategori</label>
                    <select id="kategori" name="kategori">
                        <option value="">Pilih Kategori</option>
                        <option value="pengaduan">Pengaduan</option>
                        <option value="aspirasi">Aspirasi</option>
                        <option value="permintaan">Permintaan</option>
                        <option value="lainnya">Lainnya</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="deskripsi">Deskripsi <span class="required">*</span></label>
                    <textarea id="deskripsi" name="deskripsi" rows="5" required placeholder="Jelaskan keluhan atau laporan Anda secara detail..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="lampiran">Lampiran (Gambar)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="lampiran" name="lampiran" accept="image/*" multiple>
                        <div class="file-input-preview" id="filePreview"></div>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Batal</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Kirim Laporan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast">
        <div class="toast-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="toast-message" id="toastMessage">Laporan berhasil dikirim!</div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Mengirim data...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
