<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEDIKASIH v1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #00a8ff 0%, #00d9ff 50%, #00ff88 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .header h1 { color: #2d3748; font-size: 24px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .stat-value { font-size: 32px; font-weight: bold; color: #00a8ff; }
        .stat-label { color: #718096; font-size: 14px; }
        .nav-links {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-link {
            padding: 10px 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 8px;
            text-decoration: none;
            color: #2d3748;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .nav-link:hover {
            background: linear-gradient(135deg, #00a8ff, #00d9ff);
            color: white;
        }
        .content {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 5px; font-weight: 600; color: #2d3748; }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-input:focus { border-color: #00a8ff; }
        .submit-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #00a8ff, #00d9ff);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .table-container { overflow-x: auto; }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .data-table th { background: linear-gradient(135deg, #00a8ff, #00d9ff); color: white; }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
        }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 DEDIKASIH v1.0 - Dashboard</h1>
        </div>
        
        <div class="nav-links">
            <a href="#dashboard" class="nav-link" onclick="loadPage('dashboard')">Dashboard</a>
            <a href="#pengumuman" class="nav-link" onclick="loadPage('pengumuman')">Pengumuman</a>
            <a href="#formulir" class="nav-link" onclick="loadPage('formulir')">Formulir</a>
            <a href="#cekstatus" class="nav-link" onclick="loadPage('cekstatus')">Cek Status</a>
            <a href="#admin" class="nav-link" onclick="loadPage('admin')">Admin</a>
        </div>
        
        <div id="pageContent" class="content">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalUsulan">--</div><div class="stat-label">Total Usulan</div></div>
                <div class="stat-card"><div class="stat-value" id="totalKegiatan">--</div><div class="stat-label">Total Kegiatan</div></div>
                <div class="stat-card"><div class="stat-value" id="totalPeserta">--</div><div class="stat-label">Total Peserta</div></div>
                <div class="stat-card"><div class="stat-value" id="totalSertifikat">--</div><div class="stat-label">Total Sertifikat</div></div>
            </div>
            <canvas id="statusChart" height="200"></canvas>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <script>
        function showToast(message, type='success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function loadPage(page) {
            document.getElementById('pageContent').innerHTML = '<p>Loading...</p>';
            
            if(page === 'dashboard') loadDashboard();
            else if(page === 'formulir') loadFormulir();
            else if(page === 'cekstatus') loadCekStatus();
            else if(page === 'admin') loadAdmin();
        }
        
        function loadDashboard() {
            google.script.run.withSuccessHandler(data => {
                document.getElementById('totalUsulan').textContent = data.stats.totalUsulan || '--';
                document.getElementById('totalKegiatan').textContent = data.stats.totalKegiatan || '--';
                document.getElementById('totalPeserta').textContent = data.stats.totalPeserta || '--';
                document.getElementById('totalSertifikat').textContent = data.stats.totalSertifikat || '--';
                
                new Chart(document.getElementById('statusChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Disetujui', 'Ditolak', 'Pending'],
                        datasets: [{
                            data: [data.stats.approved||0, data.stats.rejected||0, data.stats.pending||0],
                            backgroundColor: ['#00ff88', '#dc3545', '#ffc107']
                        }]
                    }
                });
            }).getDashboardData();
        }
        
        function loadFormulir() {
            document.getElementById('pageContent').innerHTML = `
                <h2>Formulir Pengajuan</h2>
                <form onsubmit="submitForm(event)">
                    <div class="form-group">
                        <label class="form-label">NIK *</label>
                        <input type="text" class="form-input" id="nik" placeholder="16 digit" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nama Pengusul *</label>
                        <input type="text" class="form-input" id="nama" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nama Kegiatan *</label>
                        <input type="text" class="form-input" id="kegiatan" required>
                    </div>
                    <button type="submit" class="submit-btn">Kirim</button>
                </form>
            `;
        }
        
        function submitForm(e) {
            e.preventDefault();
            const nik = document.getElementById('nik').value;
            if(nik.length !== 16) { showToast('NIK harus 16 digit', 'error'); return; }
            
            google.script.run.withSuccessHandler(res => {
                showToast(res.success ? 'Berhasil! Nomor: '+res.nomor : 'Gagal', res.success ? 'success' : 'error');
            }).saveForm({
                nik: nik,
                nama: document.getElementById('nama').value,
                kegiatan: document.getElementById('kegiatan').value
            });
        }
        
        function loadCekStatus() {
            document.getElementById('pageContent').innerHTML = `
                <h2>Cek Status Usulan</h2>
                <input type="text" class="form-input" id="searchQuery" placeholder="Nomor Registrasi atau NIK" style="margin-bottom:15px;">
                <button class="submit-btn" onclick="cekStatus()">Cari</button>
                <div id="statusResult"></div>
            `;
        }
        
        function cekStatus() {
            const query = document.getElementById('searchQuery').value;
            google.script.run.withSuccessHandler(data => {
                let html = '<div class="table-container"><table class="data-table"><tr><th>Nomor</th><th>Nama</th><th>Status</th></tr>';
                data.forEach(item => {
                    html += `<tr><td>${item['Nomor Registrasi']}</td><td>${item['Nama Pengusul']}</td><td>${item.Status}</td></tr>`;
                });
                document.getElementById('statusResult').innerHTML = html+'</table></div>';
            }).cekStatus(query);
        }
        
        function loadAdmin() {
            document.getElementById('pageContent').innerHTML = `
                <h2>Login Admin</h2>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="adminUser">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="adminPass">
                </div>
                <button class="submit-btn" onclick="adminLogin()">Login</button>
            `;
        }
        
        function adminLogin() {
            google.script.run.withSuccessHandler(res => {
                if(res.success) {
                    showToast('Login berhasil!');
                    document.getElementById('pageContent').innerHTML = '<h2>Panel Admin</h2><p>Selamat datang admin!</p>';
                } else {
                    showToast('Username/password salah', 'error');
                }
            }).adminLogin({
                username: document.getElementById('adminUser').value,
                password: document.getElementById('adminPass').value
            });
        }
        
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
