<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASECAMP FASKES - Health Information System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f7fa, #e3f2fd); min-height: 100vh; color: #333; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header { background: linear-gradient(135deg, #0077be, #00c2cb); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0, 119, 190, 0.3); }
    header h1 { font-size: 1.8rem; font-weight: 700; }
    header p { opacity: 0.9; font-size: 0.95rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .stat-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }
    .stat-card .number { font-size: 2rem; font-weight: 700; color: #0077be; }
    .stat-card .label { font-size: 0.85rem; color: #666; margin-top: 5px; }
    .controls { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }
    .controls .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .search-box, .filter-select { padding: 10px 14px; border-radius: 8px; border: 1px solid #ccc; font-size: 0.9rem; background: white; }
    .search-box { flex: 1; min-width: 200px; }
    .filter-select { min-width: 150px; }
    .btn-add { background: linear-gradient(135deg, #0077be, #00c2cb); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: transform 0.2s; }
    .btn-add:hover { transform: translateY(-2px); }
    .table-wrapper { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #0077be; color: white; font-weight: 600; }
    tr:hover { background: rgba(0, 119, 190, 0.05); cursor: pointer; }
    .actions { display: flex; gap: 8px; }
    .btn-edit, .btn-del { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-edit { background: #ffc107; color: #333; }
    .btn-del { background: #f44336; color: white; }
    .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); display: none; z-index: 2000; align-items: center; justify-content: center; }
    .popup.active { display: flex; }
    .popup-content { background: white; border-radius: 16px; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
    .popup-header { background: linear-gradient(135deg, #0077be, #00c2cb); color: white; padding: 25px; border-radius: 16px 16px 0 0; position: relative; }
    .popup-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
    .popup-header .meta { opacity: 0.9; font-size: 0.9rem; }
    .btn-close { position: absolute; top: 20px; right: 20px; background: white; color: #0077be; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .popup-body { padding: 25px; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .detail-item { background: #f8f9fa; padding: 12px 15px; border-radius: 8px; }
    .detail-item .label { font-size: 0.75rem; color: #666; text-transform: uppercase; }
    .detail-item .value { font-weight: 600; margin-top: 4px; }
    .maps-popup { background: rgba(0, 0, 0, 0.7); position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 3000; }
    .maps-popup.active { display: block; }
    .maps-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90vw; height: 90vh; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
    .maps-header { background: #0077be; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .maps-header h3 { font-weight: 600; }
    #map-container { width: 100%; height: calc(90vh - 65px); }
    .crud-form { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); display: none; }
    .crud-form h3 { margin-bottom: 15px; color: #0077be; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 0.8rem; color: #666; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.9rem; }
    .btn-save { background: #4CAF50; color: white; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
    .btn-cancel { background: #9e9e9e; color: white; padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; }
    @media (max-width: 768px) {
      .container { padding: 10px; }
      header h1 { font-size: 1.3rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-book-medical"></i> BASECAMP FASKES</h1>
      <p>Base Center Profile Fasilitas Kesehatan</p>
    </header>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="controls">
      <div class="row">
        <input type="text" class="search-box" id="searchBox" placeholder="Cari fasilitas...">
        <select class="filter-select" id="filterKecamatan"></select>
        <select class="filter-select" id="filterJenis"></select>
        <button class="btn-add" id="btnAdd"><i class="fas fa-plus"></i> Tambah Data</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr id="tableHeader"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <div class="popup" id="detailPopup">
    <div class="popup-content">
      <div class="popup-header">
        <h2 id="popupTitle"></h2>
        <div class="meta">
          <span id="popupJenis"></span> | <span id="popupKecamatan"></span>
        </div>
        <button class="btn-close" id="closePopup">&times;</button>
      </div>
      <div class="popup-body" id="popupBody"></div>
    </div>
  </div>
  <div class="maps-popup" id="mapsPopup">
    <div class="maps-content">
      <div class="maps-header">
        <h3 id="mapsTitle"></h3>
        <button class="btn-close" id="closeMaps">&times;</button>
      </div>
      <div id="map-container"></div>
    </div>
  </div>
  <div class="crud-form" id="crudForm">
    <h3 id="formTitle"></h3>
    <form id="formData">
      <input type="hidden" id="editId">
      <div class="form-grid" id="formGrid"></div>
      <div style="margin-top: 15px; display: flex; gap: 10px;">
        <button type="submit" class="btn-save">Simpan</button>
        <button type="button" class="btn-cancel" id="cancelForm">Batal</button>
      </div>
    </form>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwpfk1gQ8N9bxGealFz0M0gbgwBY_56WkABEYHDit07QhGGBsCW8h6ooGbB2bXyFCk/exec';
    let currentData = [];
    let editId = null;
    let mapInstance = null;
    let markers = [];

    async function fetchData() {
      try {
        console.log('Fetching data from:', WEB_APP_URL);
        const response = await fetch(WEB_APP_URL);
        console.log('Response status:', response.status);
        const result = await response.json();
        console.log('Result:', result);
        if (result.success) {
          currentData = result.data;
          console.log('Total data loaded:', result.total);
          console.log('Sample data:', currentData[0]);
          renderStats();
          renderTable(currentData);
          populateFilters();
          renderFormFields();
        } else {
          console.error('Failed to load data:', result.error);
          Swal.fire('Error', result.error || 'Gagal memuat data', 'error');
        }
      } catch (error) {
        console.error('Fetch error:', error);
        Swal.fire('Error', 'Gagal memuat data: ' + error.message, 'error');
      }
    }

    function renderStats() {
      const kecamatanCount = {};
      const jenisCount = {};
      const tipeCount = {};
      currentData.forEach(d => {
        kecamatanCount[d.Kecamatan] = (kecamatanCount[d.Kecamatan] || 0) + 1;
        jenisCount[d.Jenis] = (jenisCount[d.Jenis] || 0) + 1;
        tipeCount[d.Tipe] = (tipeCount[d.Tipe] || 0) + 1;
      });
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="number">${currentData.length}</div><div class="label">Total Fasyankes</div></div>
        <div class="stat-card"><div class="number">${Object.keys(kecamatanCount).length}</div><div class="label">Kecamatan</div></div>
        <div class="stat-card"><div class="number">${Object.keys(jenisCount).length}</div><div class="label">Jenis</div></div>
        <div class="stat-card"><div class="number">${Object.keys(tipeCount).length}</div><div class="label">Tipe</div></div>
      `;
    }

    function renderTable(data) {
      const headers = ['No', 'Nama Fasyankes/ TPM', 'Kecamatan', 'Jenis', 'Tipe', 'Penyelenggara', 'Aksi'];
      const visibleHeaders = headers;
      document.getElementById('tableHeader').innerHTML = visibleHeaders.map(h => `<th>${h}</th>`).join('');
      const rows = data.map((d, i) => `
        <tr onclick="showDetail(${i})">
          <td>${d.No || i + 1}</td>
          <td>${d['Nama Fasyankes/ TPM'] || '-'}</td>
          <td>${d.Kecamatan || '-'}</td>
          <td>${d.Jenis || '-'}</td>
          <td>${d.Tipe || '-'}</td>
          <td>${d.Penyelenggara || '-'}</td>
          <td class="actions" onclick="event.stopPropagation()">
            <button class="btn-edit" onclick="editData(${i})"><i class="fas fa-edit"></i></button>
            <button class="btn-del" onclick="deleteData(${i})"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      `).join('');
      document.getElementById('tableBody').innerHTML = rows;
    }

    function showDetail(index) {
      const d = currentData[index];
      document.getElementById('popupTitle').textContent = d['Nama Fasyankes/ TPM'] || 'Detail';
      document.getElementById('popupJenis').textContent = d.Jenis || '-';
      document.getElementById('popupKecamatan').textContent = d.Kecamatan || '-';
      let html = '<div class="detail-grid">';
      const fields = Object.keys(d).filter(k => !['id'].includes(k));
      fields.forEach(key => {
        html += `<div class="detail-item"><div class="label">${key}</div><div class="value">${d[key] || '-'}</div></div>`;
      });
      html += '</div>';
      html += `<div style="margin-top: 20px; text-align: center;"><button class="btn-add" onclick="showMaps(${index})"><i class="fas fa-map-marker-alt"></i> Lihat Peta</button></div>`;
      document.getElementById('popupBody').innerHTML = html;
      document.getElementById('detailPopup').classList.add('active');
    }

    function showMaps(index) {
      const d = currentData[index];
      document.getElementById('detailPopup').classList.remove('active');
      document.getElementById('mapsTitle').textContent = d['Nama Fasyankes/ TPM'] || 'Peta';
      document.getElementById('mapsPopup').classList.add('active');
      setTimeout(() => {
        if (mapInstance) mapInstance.remove();
        mapInstance = L.map('map-container').setView([d['Koordinat Latitude'] || -6.2, d['Koordinat Longitude'] || 106.8], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
        if (d['Koordinat Latitude'] && d['Koordinat Longitude']) {
          const marker = L.marker([d['Koordinat Latitude'], d['Koordinat Longitude']]).addTo(mapInstance);
          marker.bindPopup(`<b>${d['Nama Fasyankes/ TPM']}</b><br>${d.Jenis}<br>${d.Kecamatan}<br><a href="${d['Link Google Maps']}" target="_blank">Buka di Google Maps</a>`).openPopup();
        }
        const group = new L.featureGroup(markers);
        if (group.getLayers().length > 0) mapInstance.fitBounds(group.getBounds());
      }, 300);
    }

    function editData(index) {
      const d = currentData[index];
      editId = index;
      document.getElementById('formTitle').textContent = 'Edit Data';
      document.getElementById('editId').value = index;
      Object.keys(d).forEach(key => {
        const el = document.getElementById(`form_${key}`);
        if (el) el.value = d[key] || '';
      });
      document.getElementById('crudForm').style.display = 'block';
    }

    function deleteData(index) {
      const d = currentData[index];
      Swal.fire({ title: 'Hapus Data?', text: `Yakin hapus "${d['Nama Fasyankes/ TPM']}"?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#f44336' }).then(async (r) => {
        if (r.isConfirmed) {
          await sendCRUD('deleteData', { id: index });
          fetchData();
        }
      });
    }

    async function sendCRUD(action, payload) {
      try {
        const url = WEB_APP_URL + '?action=' + action + (payload.id !== undefined ? '&id=' + payload.id : '');
        const bodyData = payload.id !== undefined ? payload.data : payload;
        const response = await fetch(url, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyData || {})
        });
        const result = await response.json();
        console.log(`${action} status:`, result);
        if (!result.success) {
          Swal.fire('Error', result.error || 'Gagal', 'error');
        }
      } catch (e) { console.error(e); }
    }

    function populateFilters() {
      const kecamatan = [...new Set(currentData.map(d => d.Kecamatan).filter(Boolean))];
      const jenis = [...new Set(currentData.map(d => d.Jenis).filter(Boolean))];
      const filterKec = document.getElementById('filterKecamatan');
      const filterJenis = document.getElementById('filterJenis');
      filterKec.innerHTML = '<option value="">Semua Kecamatan</option>' + kecamatan.map(k => `<option value="${k}">${k}</option>`).join('');
      filterJenis.innerHTML = '<option value="">Semua Jenis</option>' + jenis.map(j => `<option value="${j}">${j}</option>`).join('');
    }

    function renderFormFields() {
      const form = document.getElementById('formGrid');
      const fields = ['No', 'Nama Fasyankes/ TPM', 'Kode SISDMK', 'Kode Pusat', 'Alamat', 'Desa/Kelurahan', 'Kecamatan', 'Tipe', 'Jenis', 'Penyelenggara', 'Nomor Telpon', 'Email', 'Alamat Web', 'Kode Pos', 'Koordinat Longitude', 'Koordinat Latitude', 'Link Google Maps', 'Nomor Izin', 'Pemberi Izin', 'Tanggal Izin Mulai', 'Tanggal Izin Akhir', 'Nama Pimpinan'];
      form.innerHTML = fields.map(f => `
        <div class="form-group">
          <label>${f}</label>
          <input type="text" id="form_${f.replace(/\//g, '_').replace(/\s/g, '_')}" name="${f}">
        </div>
      `).join('');
    }

    document.getElementById('btnAdd').onclick = () => { editId = null; document.getElementById('formTitle').textContent = 'Tambah Data'; document.getElementById('crudForm').style.display = 'block'; };
    document.getElementById('closePopup').onclick = () => document.getElementById('detailPopup').classList.remove('active');
    document.getElementById('closeMaps').onclick = () => { document.getElementById('mapsPopup').classList.remove('active'); if (mapInstance) mapInstance.remove(); };
    document.getElementById('cancelForm').onclick = () => document.getElementById('crudForm').style.display = 'none';
    document.getElementById('searchBox').oninput = (e) => { const term = e.target.value.toLowerCase(); renderTable(currentData.filter(d => JSON.stringify(d).toLowerCase().includes(term))); };
    document.getElementById('filterKecamatan').onchange = (e) => { const val = e.target.value; renderTable(val ? currentData.filter(d => d.Kecamatan === val) : currentData); };
    document.getElementById('filterJenis').onchange = (e) => { const val = e.target.value; renderTable(val ? currentData.filter(d => d.Jenis === val) : currentData); };
    document.getElementById('formData').onsubmit = async (e) => { e.preventDefault(); const data = {}; document.querySelectorAll('#formGrid input').forEach(el => data[el.name] = el.value); await sendCRUD(editId !== null ? 'updateData' : 'addData', { id: editId, data }); fetchData(); document.getElementById('crudForm').style.display = 'none'; };

    fetchData();
  </script>
</body>
</html>
