<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANJA v1.0 - Manajemen Tata Kelola Jabatan Fungsional Kesehatan</title>
    <!-- Inline Font Awesome (SVG path extracted untuk independent file) -->
    <style>
        /* ============================================
           VARIABEL & RESET
           ============================================ */
        :root {
            --biru: #2563EB;
            --biru-muda: #3B82F6;
            --biru-tua: #1E40AF;
            --hijau: #10B981;
            --hijau-muda: #34D399;
            --hijau-tua: #047857;
            --kuning: #F59E0B;
            --kuning-muda: #FBBF24;
            --kuning-tua: #D97706;
            --putih: #ffffff;
            --abu: #F3F4F6;
            --abu-gelap: #6B7280;
            --hitam: #1F2937;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 32px rgba(31, 41, 55, 0.15);
            --radius: 16px;
            --sidebar-width: 280px;
            --sidebar-collapsed: 72px;
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #EFF6FF 0%, #ECFDF5 50%, #FFFBEB 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--hitam);
        }

        /* Scrollbar Modern */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--abu); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--biru), var(--hijau)); border-radius: 4px; }

        /* ============================================
           UTILITAS
           ============================================ */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .btn-biru { background: linear-gradient(135deg, var(--biru), var(--biru-muda)); color: white; }
        .btn-hijau { background: linear-gradient(135deg, var(--hijau), var(--hijau-muda)); color: white; }
        .btn-kuning { background: linear-gradient(135deg, var(--kuning), var(--kuning-muda)); color: white; }
        .btn-merah { background: linear-gradient(135deg, #EF4444, #F87171); color: white; }
        .btn-abu { background: var(--abu); color: var(--hitam); border: 1px solid #E5E7EB; }

        .card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.6);
            transition: var(--transition);
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(31,41,55,0.12); }

        .gradient-text {
            background: linear-gradient(135deg, var(--biru-tua), var(--hijau-tua), var(--kuning-tua));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .animate-fade { animation: fadeIn 0.6s ease forwards; }
        .animate-slide { animation: slideInLeft 0.5s ease forwards; }
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        .delay-3 { animation-delay: 0.3s; opacity: 0; }
        .delay-4 { animation-delay: 0.4s; opacity: 0; }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        #loading-overlay.active { display: flex; }
        .spinner {
            width: 56px; height: 56px;
            border: 4px solid var(--abu);
            border-top-color: var(--biru);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ============================================
           TOAST NOTIFICATION
           ============================================ */
        #toast-container {
            position: fixed;
            top: 24px; right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            background: white;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            animation: fadeInScale 0.3s ease;
            border-left: 4px solid var(--biru);
        }
        .toast.success { border-left-color: var(--hijau); }
        .toast.error { border-left-color: #EF4444; }
        .toast.warning { border-left-color: var(--kuning); }

        /* ============================================
           LANDING PAGE
           ============================================ */
        #landing-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .landing-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        .landing-hero::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%);
            top: -200px; left: -200px;
            border-radius: 50%;
        }
        .landing-hero::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
            bottom: -150px; right: -150px;
            border-radius: 50%;
        }

        .logo-container {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, var(--biru), var(--hijau), var(--kuning));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 12px 30px rgba(37,99,235,0.25);
        }
        .logo-container svg { width: 64px; height: 64px; fill: white; }

        .landing-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        .landing-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.35rem);
            color: var(--abu-gelap);
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Pengumuman Marquee */
        .announcement-bar {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(16,185,129,0.08));
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 32px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(37,99,235,0.15);
        }
        .announcement-content {
            display: flex;
            gap: 40px;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
        }
        .announcement-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--biru-tua);
            font-weight: 500;
            font-size: 14px;
        }

        /* PIC Card */
        .pic-section {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }
        .pic-card {
            background: white;
            padding: 20px 28px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 260px;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .pic-avatar {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--biru), var(--biru-muda));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }
        .pic-info h4 { font-size: 15px; margin-bottom: 4px; }
        .pic-info p { font-size: 13px; color: var(--abu-gelap); }

        .btn-masuk {
            padding: 16px 48px;
            font-size: 16px;
            border-radius: 14px;
            animation: pulse 2s ease-in-out infinite;
        }

        .landing-footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: var(--abu-gelap);
            background: rgba(255,255,255,0.6);
        }

        /* ============================================
           SIDEBAR
           ============================================ */
        #system-page {
            display: none;
            min-height: 100vh;
        }
        #system-page.active { display: flex; }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            background: linear-gradient(180deg, var(--biru-tua) 0%, #1e3a5f 100%);
            color: white;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 100;
            overflow-x: hidden;
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-logo {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--kuning), var(--kuning-muda));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .sidebar-logo svg { width: 24px; height: 24px; fill: white; }
        .sidebar-brand h3 { font-size: 16px; font-weight: 700; white-space: nowrap; }
        .sidebar-brand span { font-size: 11px; opacity: 0.7; white-space: nowrap; }

        .toggle-btn {
            position: absolute;
            right: -14px;
            top: 32px;
            width: 28px; height: 28px;
            background: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            color: var(--biru-tua);
            font-size: 12px;
            transition: var(--transition);
            z-index: 101;
        }
        .toggle-btn:hover { transform: scale(1.1); }
        .sidebar.collapsed .toggle-btn { transform: rotate(180deg); }

        .sidebar-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 6px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            white-space: nowrap;
        }
        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.12);
            color: white;
        }
        .menu-item svg { width: 22px; height: 22px; fill: currentColor; flex-shrink: 0; }
        .menu-item span { font-size: 14px; font-weight: 500; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
        }

        /* ============================================
           CONTENT AREA
           ============================================ */
        .content-area {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 28px 32px;
            transition: var(--transition);
            min-height: 100vh;
        }
        .sidebar.collapsed ~ .content-area { margin-left: var(--sidebar-collapsed); }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .page-title { font-size: 24px; font-weight: 700; }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 8px 16px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            font-size: 14px;
            font-weight: 500;
        }
        .user-avatar {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--hijau), var(--hijau-muda));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 13px;
        }

        .page-section { display: none; animation: fadeIn 0.4s ease; }
        .page-section.active { display: block; }

        /* ============================================
           DASHBOARD
           ============================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 18px;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .stat-icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .stat-icon.biru { background: linear-gradient(135deg, #DBEAFE, #BFDBFE); color: var(--biru); }
        .stat-icon.hijau { background: linear-gradient(135deg, #D1FAE5, #A7F3D0); color: var(--hijau-tua); }
        .stat-icon.kuning { background: linear-gradient(135deg, #FEF3C7, #FDE68A); color: var(--kuning-tua); }
        .stat-icon.merah { background: linear-gradient(135deg, #FEE2E2, #FECACA); color: #B91C1C; }
        .stat-icon svg { width: 28px; height: 28px; fill: currentColor; }
        .stat-value { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
        .stat-label { font-size: 13px; color: var(--abu-gelap); font-weight: 500; }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .chart-container {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .chart-container h3 { font-size: 16px; margin-bottom: 20px; color: var(--hitam); }
        .chart-canvas { width: 100%; max-height: 260px; }

        /* ============================================
           TABLES
           ============================================ */
        .table-wrap {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .table-toolbar {
            padding: 20px 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--abu);
        }
        .search-box {
            position: relative;
            flex: 1;
            min-width: 220px;
            max-width: 400px;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        .search-box input:focus { border-color: var(--biru); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .search-box svg {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            width: 16px; height: 16px;
            fill: var(--abu-gelap);
        }
        .filter-select {
            padding: 10px 14px;
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background: white;
            cursor: pointer;
        }

        table.data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        table.data-table th {
            background: linear-gradient(135deg, #F9FAFB, #F3F4F6);
            padding: 14px 20px;
            text-align: left;
            font-weight: 600;
            color: var(--hitam);
            border-bottom: 2px solid #E5E7EB;
            white-space: nowrap;
        }
        table.data-table td {
            padding: 14px 20px;
            border-bottom: 1px solid #F3F4F6;
            color: #374151;
            vertical-align: middle;
        }
        table.data-table tr:hover td { background: #F9FAFB; }
        table.data-table tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-biru { background: #DBEAFE; color: var(--biru-tua); }
        .badge-hijau { background: #D1FAE5; color: var(--hijau-tua); }
        .badge-kuning { background: #FEF3C7; color: var(--kuning-tua); }
        .badge-merah { background: #FEE2E2; color: #991B1B; }
        .badge-abu { background: #F3F4F6; color: #4B5563; }

        .table-pagination {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--abu);
            font-size: 13px;
            color: var(--abu-gelap);
        }
        .page-btns { display: flex; gap: 6px; }
        .page-btn {
            width: 32px; height: 32px;
            border: 1px solid #E5E7EB;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: var(--transition);
        }
        .page-btn:hover, .page-btn.active { background: var(--biru); color: white; border-color: var(--biru); }

        /* ============================================
           FORMS
           ============================================ */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--hitam);
        }
        .form-group label .req { color: #EF4444; margin-left: 2px; }
        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            background: white;
        }
        .form-control:focus { border-color: var(--biru); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-control.error { border-color: #EF4444; }
        .help-text { font-size: 12px; color: var(--abu-gelap); margin-top: 6px; }
        .error-text { font-size: 12px; color: #EF4444; margin-top: 6px; display: none; }
        .error-text.show { display: block; }

        .file-input-wrap {
            border: 2px dashed #D1D5DB;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .file-input-wrap:hover { border-color: var(--biru); background: #F9FAFB; }
        .file-input-wrap input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .file-input-wrap svg { width: 36px; height: 36px; fill: var(--abu-gelap); margin-bottom: 8px; }
        .file-input-wrap p { font-size: 14px; color: var(--abu-gelap); margin-bottom: 4px; }
        .file-input-wrap span { font-size: 12px; color: #9CA3AF; }
        .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #F3F4F6;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
        }
        .file-item button {
            background: none; border: none; color: #EF4444; cursor: pointer; font-size: 12px; font-weight: 600;
        }

        /* ============================================
           LIGHTBOX / MODAL
           ============================================ */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lightbox-overlay.active { display: flex; opacity: 1; }
        .lightbox-content {
            background: white;
            border-radius: var(--radius);
            width: 100%;
            max-width: 720px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(0,0,0,0.2);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        .lightbox-overlay.active .lightbox-content { transform: scale(1); }
        .lightbox-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--abu);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lightbox-header h3 { font-size: 18px; font-weight: 700; }
        .lightbox-close {
            width: 36px; height: 36px;
            border: none; background: var(--abu);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .lightbox-close:hover { background: #E5E7EB; }
        .lightbox-close svg { width: 18px; height: 18px; }
        .lightbox-body { padding: 28px; }
        .lightbox-footer {
            padding: 20px 28px;
            border-top: 1px solid var(--abu);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* ============================================
           CEK STATUS
           ============================================ */
        .status-search-box {
            max-width: 500px;
            margin: 0 auto 32px;
            display: flex;
            gap: 10px;
        }
        .status-search-box input { flex: 1; }
        .status-result {
            background: white;
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            display: none;
        }
        .status-result.active { display: block; animation: fadeIn 0.4s ease; }
        .status-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--abu);
        }
        .status-avatar {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--biru), var(--hijau));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 700;
        }
        .status-info h4 { font-size: 18px; margin-bottom: 4px; }
        .status-info p { font-size: 14px; color: var(--abu-gelap); }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .status-item { background: #F9FAFB; padding: 14px 16px; border-radius: 10px; }
        .status-item label { font-size: 11px; text-transform: uppercase; color: var(--abu-gelap); font-weight: 600; letter-spacing: 0.5px; }
        .status-item p { font-size: 14px; font-weight: 600; margin-top: 4px; color: var(--hitam); }
        .status-dokumen h5 { font-size: 14px; margin-bottom: 12px; }
        .dokumen-list { display: flex; flex-direction: column; gap: 8px; }
        .dokumen-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #F9FAFB;
            border-radius: 8px;
            font-size: 14px;
        }

        /* ============================================
           LOGIN MODAL
           ============================================ */
        .login-box {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .login-box .logo-container {
            margin: 0 auto 20px;
            width: 80px; height: 80px;
        }
        .login-box .logo-container svg { width: 40px; height: 40px; }
        .login-box h3 { font-size: 20px; margin-bottom: 8px; }
        .login-box p { color: var(--abu-gelap); font-size: 14px; margin-bottom: 24px; }
        .role-select { display: flex; gap: 10px; margin-bottom: 20px; }
        .role-option {
            flex: 1;
            padding: 14px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
            font-weight: 600;
        }
        .role-option:hover { border-color: var(--biru); }
        .role-option.selected {
            border-color: var(--biru);
            background: #EFF6FF;
            color: var(--biru-tua);
        }

        /* ============================================
           ADMIN PANEL
           ============================================ */
        .admin-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .admin-tab {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: var(--transition);
        }
        .admin-tab.active { background: var(--biru); color: white; }
        .admin-tab:hover:not(.active) { background: #F3F4F6; }
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }

        .action-btns { display: flex; gap: 6px; }
        .action-btn {
            width: 32px; height: 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .action-btn svg { width: 16px; height: 16px; }
        .action-btn.edit { background: #DBEAFE; color: var(--biru); }
        .action-btn.delete { background: #FEE2E2; color: #DC2626; }
        .action-btn.verify { background: #D1FAE5; color: var(--hijau-tua); }
        .action-btn:hover { transform: scale(1.1); }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px !important;
            }
            .sidebar.mobile-open { transform: translateX(0); }
            .sidebar.collapsed { width: 280px !important; }
            .toggle-btn { display: none; }
            .content-area { margin-left: 0 !important; padding: 20px; }
            .mobile-menu-btn {
                display: flex !important;
                position: fixed;
                top: 20px; left: 20px;
                z-index: 99;
                width: 44px; height: 44px;
                background: white;
                border: none;
                border-radius: 10px;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 12px rgba(0,0,0,0.1);
                cursor: pointer;
            }
            .charts-row { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
            .lightbox-content { max-width: 100%; }
            .status-grid { grid-template-columns: 1fr; }
            .table-toolbar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
        }
        @media (min-width: 769px) {
            .mobile-menu-btn { display: none !important; }
            .sidebar-overlay { display: none !important; }
        }
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 99;
            display: none;
        }
        .sidebar-overlay.active { display: block; }
